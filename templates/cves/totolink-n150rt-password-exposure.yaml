id: totolink-n150rt-password-exposure
name: TOTOLINK N150RT - Password Exposure
severity: high
confidence: confirmed
description: Detects password exposure vulnerability in TOTOLINK N150RT router where sensitive credentials are exposed in
  the password.htm page.
reference: https://github.com/fizz-is-on-the-way/Iot_vuls/blob/main/N150RT/Information_disclosure_password/imgs/2.png
tags:
- totolink
- router
- exposure
- credentials
- vuln
requests:
- method: GET
  path: /password.htm
  matchers:
  - type: body
    words:
    - orgpassword=
    - orgusername=
  - type: body
    words:
    - orgpassword=''
  - type: status
    status:
    - 200
  condition: and
