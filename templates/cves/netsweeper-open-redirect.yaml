id: netsweeper-open-redirect
name: Netsweeper 4.0.9 - Open Redirect
severity: medium
confidence: tentative
description: Netsweeper 4.0.9 contains an open redirect vulnerability. An attacker can redirect a user to a malicious site
  and possibly obtain sensitive information, modify data, and/or execute unauthorized operations.
reference: CWE-601
tags:
- netsweeper
- redirect
- packetstorm
- vuln
requests:
- method: GET
  path: /webadmin/authportal/bounce.php?url=https://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  condition: or
