id: lucee-unset-credentials
name: Lucee - Unset Credentials
severity: high
confidence: confirmed
description: The Lucee admin panel has a first-time setup page which allows any user to set the administrator password.
reference: CWE-798
tags:
- lucee
- default-login
- unauth
- vuln
requests:
- method: GET
  path: /lucee/admin/web.cfm
  matchers: &id001
  - type: body
    words:
    - Lucee
    - box">New Password</div>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /lucee/admin/server.cfm
  matchers: *id001
  condition: and
