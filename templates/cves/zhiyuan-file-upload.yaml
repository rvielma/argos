id: zhiyuan-file-upload
name: Zhiyuan OA Arbitrary File Upload Vulnerability
severity: critical
confidence: tentative
description: A vulnerability in Zhiyuan OA allows remote unauthenticated attackers to upload arbitrary files to the remote
  server and cause execute arbitrary code to be executed.
reference: https://www.programmersought.com/article/92658169875/
tags:
- zhiyuan
- rce
- fileupload
- seeyon
- intrusive
- vuln
requests:
- method: GET
  path: /seeyon/thirdpartyController.do.css/..;/ajax.do
  matchers:
  - type: body
    words:
    - java.lang.NullPointerException:null
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
