id: drupal7-elfinder-rce
name: Drupal 7 Elfinder - Remote Code Execution
severity: critical
confidence: confirmed
description: Identifies Drupal sites with the elfinder library installed, which could be vulnerable to unrestricted file upload
  through the connector.php file.When this component is detected, the site may be vulnerable to remote code execution attacks
  via PHP file uploads.This template only detects the presence of the vulnerable component and does not perform any exploitation.
reference: CWE-434
tags:
- drupal
- elfinder
- filemanager
- exposure
- vuln
requests:
- method: GET
  path: /sites/all/libraries/elfinder/connectors/php/connector.php
  matchers:
  - type: body
    words:
    - '{"cwd":'
  - type: body
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
