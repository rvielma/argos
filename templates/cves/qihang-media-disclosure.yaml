id: qihang-media-disclosure
name: QiHang Media Web Digital Signage 3.0.9 - Cleartext Credentials Disclosure
severity: high
confidence: tentative
description: QiHang Media Web Digital Signage 3.0.9 suffers from a clear-text credentials disclosure vulnerability that allows
  an unauthenticated attacker to issue a request to an unprotected directory that hosts an XML file /xml/User/User.xml and
  obtain administrative login information that allows for a successful authentication bypass attack.
reference: CWE-522
tags:
- qihang
- exposure
- vuln
requests:
- method: GET
  path: /xml/User/User.xml
  matchers:
  - type: body
    words:
    - <?xml version
    - <Users>
    - account=
    - password=
  condition: or
