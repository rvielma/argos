id: jenkins-stack-trace
name: Detect Jenkins in Debug Mode with Stack Traces Enabled
severity: low
confidence: tentative
description: Module identified that the affected host is running an instance of Jenkins in debug mode, as a result stack traces
  are enabled.
reference: https://hackerone.com/reports/221833
tags:
- jenkins
- hackerone
- vuln
requests:
- method: GET
  path: /adjuncts/3a890183/
  matchers:
  - type: body
    words:
    - java.lang.StringIndexOutOfBoundsException
    - String index out of range
  - type: status
    status:
    - 500
  condition: and
