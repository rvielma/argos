id: wp-arforms-listing
name: WordPress Plugin Arforms Listing
severity: info
confidence: tentative
description: Searches for sensitive directories present in the arforms plugin.
reference: https://www.exploit-db.com/ghdb/6424
tags:
- listing
- plugin
- edb
- wordpress
- vuln
requests:
- method: GET
  path: /wp-content/plugins/arforms/
  matchers:
  - type: body
    words:
    - Index of
    - wp-content/plugins/arforms/
  - type: status
    status:
    - 200
  condition: and
