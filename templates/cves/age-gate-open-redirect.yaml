id: age-gate-open-redirect
name: WordPress Age Gate <2.13.5 - Open Redirect
severity: medium
confidence: confirmed
description: WordPress Age Gate plugin before 2.13.5 contains an open redirect vulnerability via the  _wp_http_referer parameter
  after certain actions and after invalid or missing nonces. An attacker can redirect a user to a malicious site and possibly
  obtain sensitive information, modify data, and/or execute unauthorized operations.
reference: CWE-601
tags:
- agegate
- unauth
- wpscan
- packetstorm
- wp-plugin
- redirect
- wordpress
- wp
- vuln
requests:
- method: POST
  path: /wp-admin/admin-post.php
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?:\/\/|\/\/|\/\\\\|\/\\)(?:[a-zA-Z0-9\-_\.@]*)interact\.sh\/?(\/|[^.].*)?$
  condition: or
  headers:
    Content-Type: application/x-www-form-urlencoded
  body: age_gate%5Bd%5D=10&age_gate%5Bm%5D=10&age_gate%5By%5D=1990&age_gate%5Bremember%5D=1&age_gate%5Bage%5D=TVRnPQ%3D%3D&action=age_gate_submit&age_gate%5Bnonce%5D=48f2b89fed&_wp_http_referer=https://interact.sh
