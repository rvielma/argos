id: deos-open500ems-panel
name: DEOS OPEN 500EMS Controller - Admin Exposure
severity: high
confidence: tentative
description: The DEOS OPEN 500EMS controller exposes administrative functions without authentication.
reference: CWE-284
tags:
- openv500
- disclosure
- panel
- vuln
requests:
- method: GET
  path: /cgi-bin/cosmobdf.cgi?function=0
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - <b>OPENview</b>
    - /cgi-bin/cosmobdf.cgi?function=12
    - /cgi-bin/cosmobdf.cgi?function=2
  condition: and
- method: GET
  path: /cgi-bin/cosmobdf.cgi?function=1
  matchers: *id001
  condition: and
