id: ueditor-file-upload
name: UEditor - Arbitrary File Upload
severity: high
confidence: tentative
description: UEditor contains an arbitrary file upload vulnerability. An attacker can upload arbitrary files to the server,
  which in turn can be used to make the application execute file content as code, As a result, an attacker can possibly obtain
  sensitive information, modify data, and/or execute unauthorized operations.
reference: CWE-434
tags:
- ueditor
- fileupload
- intrusive
- vuln
requests:
- method: GET
  path: /ueditor/net/controller.ashx?action=catchimage&encode=utf-8
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - 没有指定抓取源
  condition: and
