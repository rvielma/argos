id: limesurvey-open-redirect
name: LimeSurvey - Open Redirect via editorLink
severity: medium
confidence: confirmed
description: LimeSurvey before 6.16.11 contains an open redirect vulnerability in the editorLink route. An attacker can craft
  a URL that redirects users to an arbitrary external site, potentially enabling phishing attacks.
reference: CWE-601
tags:
- limesurvey
- redirect
- vuln
requests:
- method: GET
  path: /index.php?r=editorLink&url=http://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  - type: header
    words:
    - LS_AUTH_INIT
  - type: status
    status:
    - 302
  condition: and
