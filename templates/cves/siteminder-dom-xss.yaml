id: siteminder-dom-xss
name: SiteMinder - DOM Cross-Site Scripting
severity: high
confidence: confirmed
description: SiteMinder contains a cross-site scripting vulnerability in the document object model. An attacker can execute
  arbitrary script in the browser of an unsuspecting user in the context of the affected site. This can allow the attacker
  to steal cookie-based authentication credentials and launch other attacks.
reference: CWE-79
tags:
- dom
- xss
- siteminder
- vuln
