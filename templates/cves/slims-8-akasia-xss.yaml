id: slims-8-akasia-xss
name: Senayan Library Management System v8.3.1 (Akasia) - Cross-Site Scripting
severity: medium
confidence: confirmed
description: SLiMS 8.3.1 (Akasia) has a `destination` parameter that is vulnerable to reflected XSS. However, ensure that
  the `p` parameter points to the 'member'. Additional google dork 'intext:"SLiMS 8.3.1 (Akasia)"'.
reference: https://github.com/slims/slims8_akasia/issues/184
tags:
- senayan
- xss
- slims
- vuln
