id: wpml-xss
name: WordPress Plugin WPML Version < 4.6.1 Cross-Site Scripting
severity: medium
confidence: confirmed
description: WordPress Plugin WPML Version < 4.6.1  is vulnerable to RXSS via wp_lang parameter.
reference: https://wpml.org/fr/changelog/2023/03/wpml-4-6-1-important-security-update/
tags:
- xss
- wp
- wordpress
- wpml
- wp-plugin
- vuln
requests:
- method: GET
  path: /wp-login.php?wp_lang=en_US%27
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - '#039;"='
    - wpml_lang
  condition: and
