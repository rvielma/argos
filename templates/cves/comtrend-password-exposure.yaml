id: comtrend-password-exposure
name: Comtrend ADSL - Remote Code Execution
severity: high
confidence: tentative
description: Comtrend ADSL CT-5367 C01_R12 router is susceptible to remote code execution. A remote user can execute arbitrary
  commands via the telnet interface, The password for this interface is leaked to unauthenticated users via the password.cgi
  endpoint.
reference: https://www.exploit-db.com/exploits/16275
tags:
- router
- exposure
- iot
- rce
- edb
- vuln
requests:
- method: GET
  path: /password.cgi
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - pwdAdmin =
    - pwdSupport =
    - pwdUser =
  condition: and
