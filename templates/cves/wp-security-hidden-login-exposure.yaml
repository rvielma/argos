id: wp-security-hidden-login-exposure
name: WordPress All-in-One Security <=4.4.1 - Hidden Login Page Exposure
severity: medium
confidence: confirmed
description: WordPress All-in-One Security plugin through 4.4.1 contains an exposure of the actual URL of the "hidden login
  page" feature.
reference: https://wpscan.com/vulnerability/467673ad-d0ad-46a3-80c7-8ebb3813a4b3/
tags:
- wp-plugin
- exposure
- wordpress
- wp
- wpscan
- vuln
requests:
- method: GET
  path: /?aiowpsec_do_log_out=1&al_additional_data=1
  matchers:
  - type: body
    words:
    - Username or Email Address
    - wp_attempt_focus
  - type: status
    status:
    - 200
  condition: and
