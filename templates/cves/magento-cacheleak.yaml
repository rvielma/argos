id: magento-cacheleak
name: Magento Cacheleak
severity: high
confidence: confirmed
description: Magento Cacheleak is an implementation vulnerability, result of bad implementation of web-server configuration
  for Magento platform. Magento was developed to work under the Apache web-server which natively works with .htaccess files,
  so all needed configuration directives specific for various internal Magento folders were placed in .htaccess files.  When
  Magento is installed on web servers that are ignoring .htaccess files (such as nginx), an attacker can get access to internal
  Magento folders (such as the Magento cache directory) and extract sensitive information from cache files.
reference: https://support.hypernode.com/en/best-practices/security/how-to-secure-magento-cacheleak
tags:
- magento
- vuln
requests:
- method: GET
  path: /var/resource_config.json
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - media_directory
    - allowed_resources
  - type: header
    words:
    - application/json
  condition: and
