id: odoo-cms-redirect
name: Odoo CMS - Open Redirect
severity: medium
confidence: tentative
description: Odoo CMS contains an open redirect vulnerability. An attacker can redirect a user to a malicious site and possibly
  obtain sensitive information, modify data, and/or execute unauthorized operations.
reference: CWE-601
tags:
- odoo
- redirect
- vuln
requests:
- method: GET
  path: /website/lang/en_US?r=https://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)?(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  condition: or
