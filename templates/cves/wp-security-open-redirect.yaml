id: wp-security-open-redirect
name: WordPress All-in-One Security <=4.4.1 - Open Redirect
severity: medium
confidence: confirmed
description: WordPress All-in-One Security plugin through 4.4.1 contains an open redirect vulnerability which can expose the
  actual URL of the hidden login page feature. An attacker can redirect a user to a malicious site and possibly obtain sensitive
  information, modify data, and/or execute unauthorized operations.
reference: CWE-601
tags:
- wp-plugin
- redirect
- wordpress
- wp
- wpscan
- vuln
requests:
- method: GET
  path: /?aiowpsec_do_log_out=1&after_logout=https://interact.sh
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?:\/\/|\/\/|\/\\\\|\/\\)(?:[a-zA-Z0-9\-_\.@]*)interact\.sh\/?(\/|[^.].*)?$
  condition: or
