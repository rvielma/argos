id: eatery-restaurant-open-redirect
name: WordPress Eatery 2.2 - Open Redirect
severity: medium
confidence: tentative
description: WordPress Eatery theme 2.2 contains an open redirect vulnerability. The theme accepts a user-controlled input
  that specifies a link to an external site. An attacker can redirect a user to a malicious site and possibly obtain sensitive
  information, modify data, and/or execute unauthorized operations.
reference: CWE-601
tags:
- wordpress
- wp-theme
- redirect
- wp
- vuln
requests:
- method: GET
  path: /wp-content/themes/eatery/nav.php?-Menu-=https://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)?(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  condition: or
