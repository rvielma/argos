id: netmizer-data-listing
name: NetMizer LogManagement System Data - Directory Exposure
severity: high
confidence: confirmed
description: Directory Exposure vulnerability in the NetMizer log management system of Beijing Lingzhou Network Technology
  Co., Ltd. Due to the loose control of /data, attackers can use this vulnerability to obtain sensitive information.
reference: https://github.com/Threekiii/Awesome-POC/blob/master/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/NetMizer%20%E6%97%A5%E5%BF%97%E7%AE%A1%E7%90%86%E7%B3%BB%E7%BB%9F%20data%20%E7%9B%AE%E5%BD%95%E9%81%8D%E5%8E%86%E6%BC%8F%E6%B4%9E.md
tags:
- netmizer
- exposure
- listing
- vuln
requests:
- method: GET
  path: /data/
  matchers:
  - type: body
    words:
    - Index of /data
    - bin/
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
