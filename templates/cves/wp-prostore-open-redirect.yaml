id: wp-prostore-open-redirect
name: WordPress ProStore <1.1.3 - Open Redirect
severity: low
confidence: tentative
description: WordPress ProStore theme before 1.1.3 contains an open redirect vulnerability. An attacker can redirect a user
  to a malicious site and possibly obtain sensitive information, modify data, and/or execute unauthorized operations.
reference: https://wpscan.com/vulnerability/2e0f8b7f-96eb-443c-a553-550e42ec67dc
tags:
- wordpress
- wp-theme
- redirect
- wpscan
- vuln
requests:
- method: GET
  path: /wp-content/themes/prostore/go.php?https://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)?(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  condition: or
