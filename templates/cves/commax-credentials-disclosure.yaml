id: commax-credentials-disclosure
name: COMMAX Smart Home Ruvie CCTV Bridge DVR - RTSP Credentials Disclosure
severity: critical
confidence: tentative
description: The COMMAX CCTV Bridge for the DVR service allows an unauthenticated attacker to disclose real time streaming
  protocol (RTSP) credentials in plain-text.
reference: https://www.zeroscience.mk/en/vulnerabilities/ZSL-2021-5665.php
tags:
- commax
- exposure
- camera
- iot
- vuln
requests:
- method: GET
  path: /overview.asp
  matchers:
  - type: body
    words:
    - DVR Lists
    - rtsp://
    - login_check.js
    - 'MAX USER :'
  condition: or
