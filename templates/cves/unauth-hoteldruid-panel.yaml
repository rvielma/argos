id: unauth-hoteldruid-panel
name: Hoteldruid Management Panel Access
severity: high
confidence: tentative
description: A vulnerability in Hoteldruid Panel allows remote unauthenticated users access to the management portal without
  authentication.
reference: CWE-522
tags:
- hoteldruid
- panel
- unauth
- vuln
requests:
- method: GET
  path: /hoteldruid/inizio.php
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - <title> HotelDruid </title>
    - <b>INSERT:</b>
    - <b>TABLES:</b>
  condition: and
- method: GET
  path: /inizio.php
  matchers: *id001
  condition: and
