id: pdf-signer-ssti-to-rce
name: PDF Signer 3.0 - Template Injection
severity: critical
confidence: tentative
description: PDF Signer 3.0 is susceptible to a template injection which allows code execution, due to improper cookie handling
  and an improper CSRF implementation. An attacker can execute code on the server in the context of the web server.
reference: CWE-1336
tags:
- ssti
- rce
- csrf
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: status
    status:
    - 200
  - type: regex
    regex:
    - 'root:.*:0:0:'
  condition: and
