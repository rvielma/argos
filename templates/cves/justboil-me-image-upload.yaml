id: justboil-me-image-upload
name: JustBoil.me Images Plugin - Exposed Image Upload
severity: medium
confidence: confirmed
description: JustBoil.me Images Plugin for TinyMCE contains an exposed dialog interface that could lead to potential security
  vulnerabilities. The plugin's dialog-v4.htm file is accessible without proper access controls, which may allow unauthorized
  access to image upload functionality.
reference: https://cxsecurity.com/issue/WLB-2019050108
tags:
- justboil
- tinymce
- plugin
- exposure
- misconfig
- vuln
requests:
- method: GET
  path: /plugins/generic/tinymce/plugins/justboil.me/dialog-v4.htm
  matchers:
  - type: body
    words:
    - JustBoil.me Images Plugin
    - TinyMCE
    - upload_infobar
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
