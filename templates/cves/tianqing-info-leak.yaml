id: tianqing-info-leak
name: Tianqing Info Leak
severity: medium
confidence: tentative
description: Information exposed in Tianqing.
reference: https://mp.weixin.qq.com/s/wH5luLISE_G381W2ssv93g
tags:
- tianqing
- exposure
- vuln
requests:
- method: GET
  path: /api/dbstat/gettablessize
  matchers:
  - type: body
    words:
    - schema_name
    - table_name
    - table_size
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
