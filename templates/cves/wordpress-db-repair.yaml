id: wordpress-db-repair
name: Wordpress DB Repair Exposed
severity: low
confidence: tentative
description: Discover enabled Wordpress repair page.
tags:
- wordpress
- config
- fpd
- vuln
requests:
- method: GET
  path: /wp-admin/maint/repair.php
  matchers:
  - type: body
    words:
    - <title>WordPress
  - type: status
    status:
    - 200
  - type: body
    words:
    - define
    - WP_ALLOW_REPAIR
    - 'true'
  condition: and
