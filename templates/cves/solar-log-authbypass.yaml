id: solar-log-authbypass
name: Solar-Log 500 2.8.2 - Incorrect Access Control
severity: high
confidence: tentative
description: Solar-Log 500 2.8.2 is susceptible to incorrect access control because the web administration server for Solar-Log
  500 all versions prior to 2.8.2 Build 52 does not require authentication, which allows arbitrary remote attackers gain administrative
  privileges by connecting to the server.
reference: CWE-284
tags:
- solarlog
- auth-bypass
- edb
- vuln
requests:
- method: GET
  path: /lan.html
  matchers:
  - type: status
    status:
    - 200
  - type: header
    words:
    - IPC@CHIP
  - type: body
    words:
    - ' Solare Datensysteme GmbH'
    - mailto:info@solar-log.com
  condition: and
