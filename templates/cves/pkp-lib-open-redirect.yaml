id: pkp-lib-open-redirect
name: Open Journal Systems pkp-lib - Open Redirect
severity: medium
confidence: tentative
description: Public Knowledge Project pkp-lib is vulnerable to Open redirect due to a lack of input sanitization in the setLocale
  function.
reference: https://github.com/pkp/pkp-lib/issues/7575
tags:
- pkp
- ojs
- open-journal-system
- pkp-lib
- redirect
- vuln
requests:
- method: GET
  path: /index.php/index/user/setLocale/NEW_LOCALE?source=@oast.me
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?:\/\/|\/\/|\/\\\\|\/\\)?(?:[a-zA-Z0-9\-_\.@]*){{Hostname}}@?(?:[a-zA-Z0-9\-_\.@]*)oast\.me\/?(\/|[^.].*)?$
  condition: or
