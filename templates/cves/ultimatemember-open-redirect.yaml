id: ultimatemember-open-redirect
name: WordPress Ultimate Member <2.1.7 - Open Redirect
severity: medium
confidence: tentative
description: WordPress Ultimate Member plugin before 2.1.7 contains an open redirect vulnerability on the registration and
  login pages via the "redirect_to" GET parameter. An attacker can redirect a user to a malicious site and possibly obtain
  sensitive information, modify data, and/or execute unauthorized operations.
reference: CWE-601
tags:
- wp-plugin
- redirect
- wordpress
- wpscan
- vuln
requests:
- method: GET
  path: /register/?redirect_to=https://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  condition: or
