id: wp-iwp-client-listing
name: WordPress Plugin Iwp-client Listing
severity: info
confidence: tentative
description: Searches for sensitive directories present in the iwp-client plugin.
reference: https://www.exploit-db.com/ghdb/6427
tags:
- wordpress
- listing
- plugin
- edb
- vuln
requests:
- method: GET
  path: /wp-content/plugins/iwp-client/
  matchers:
  - type: body
    words:
    - Index of
    - wp-content/plugins/iwp-client/
  - type: status
    status:
    - 200
  condition: and
