id: brandfolder-open-redirect
name: WordPress Brandfolder - Open Redirect (RFI & LFI)
severity: medium
confidence: tentative
description: WordPress Brandfolder is vulnerable to remote/local file inclusion and allows remote attackers to inject an arbitrary
  URL into the 'callback.php' endpoint via the 'wp_abspath' parameter which will redirect the victim to it.
reference: https://www.exploit-db.com/exploits/39591
tags:
- wp
- brandfolder
- edb
- wpscan
- wp-plugin
- redirect
- rfi
- wordpress
- lfi
- vuln
requests:
- method: GET
  path: /wp-content/plugins/brandfolder/callback.php?wp_abspath=https://interact.sh/
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)?(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  condition: or
