id: tinytiny-rss-redirect
name: TinyTiny RSS Open Redirect
severity: low
confidence: confirmed
description: Detected an open redirect vulnerability in Tiny Tiny RSS where the return parameter in public.php was abused
  to redirect users to an attacker-controlled external URL after the authentication flow.
reference: https://seclists.org/oss-sec/2019/q1/155
tags:
- redirect
- tiny-tiny
- rss
requests:
- method: GET
  path: /public.php?return=http%3a%2f%2finteract.sh%2f&op=login&login=password=&profile=0
  matchers:
  - type: regex
    regex:
    - (?m)^(?:Location\s*?:\s*?)(?:https?://|//)?(?:[a-zA-Z0-9\-_\.@]*)interact\.sh.*$
  - type: status
    status:
    - 302
    - 301
  condition: and
