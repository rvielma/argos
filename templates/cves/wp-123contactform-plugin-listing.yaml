id: wp-123contactform-plugin-listing
name: WordPress 123ContactForm Plugin Directory Listing
severity: info
confidence: tentative
description: Searches for sensitive directories present in the 123contactform-for-wordpress plugin.
reference: https://blog.sucuri.net/2021/01/critical-vulnerabilities-in-123contactform-for-wordpress-wordpress-plugin.html
tags:
- wordpress
- listing
- plugin
- edb
- vuln
requests:
- method: GET
  path: /wp-content/plugins/123contactform-for-wordpress/
  matchers:
