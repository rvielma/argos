id: wordpress-tmm-db-migrate
name: WordPress ThemeMarkers DB Migration File
severity: info
confidence: tentative
description: WordPress ThemeMarkers DB Migration File
tags:
- wordpress
- wp-plugin
- backup
- vuln
requests:
- method: GET
  path: /wp-content/uploads/tmm_db_migrate/tmm_db_migrate.zip
  matchers:
  - type: header
    words:
    - application/zip
  - type: regex
    regex:
    - '[a-z0-9_]+.dat'
  - type: status
    status:
    - 200
  condition: and
