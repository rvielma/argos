id: esphome-dashboard
name: ESPHome Dashboard Exposure
severity: medium
confidence: confirmed
description: ESPHome Dashboard exposes the secrets like wifi password,api keys and internal logs, it also allows users to
  make changes through the dashboard.
tags:
- misconfig
- esphome
- exposure
- iot
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Dashboard - ESPHome
  - type: status
    status:
    - 200
  condition: and
