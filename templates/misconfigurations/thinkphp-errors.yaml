id: thinkphp-errors
name: ThinkPHP Errors - Sensitive Information Exposure
severity: medium
confidence: confirmed
description: ThinkPHP error is leaking sensitive info.
tags:
- thinkphp
- misconfig
- exposure
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - _DATABASE</td>
    - _USERNAME</td>
    - _PASSWORD</td>
  - type: body
    words:
    - <title>系统发生错误</title>
    - <title>System Error</title>
  - type: body
    words:
    - Exception
    - REQUEST_TIME
  - type: status
    status:
    - 200
    - 500
    - 404
  condition: and
