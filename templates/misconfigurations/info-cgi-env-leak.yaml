id: info-cgi-env-leak
name: info.cgi  Environment Variable - Disclosure
severity: medium
confidence: confirmed
description: Detected exposure of server environment variables through the info.cgi script. This can leak sensitive paths,
  internal IPs, software versions, credentials in env, etc.
reference: https://www.acunetix.com/vulnerabilities/web/test-cgi-script-leaking-environment-variables/
tags:
- cgi
- exposure
- info
- env
- disclosure
- generic
requests:
- method: GET
  path: /info.cgi
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - SERVER_SOFTWARE
    - SERVER_NAME
    - GATEWAY_INTERFACE
    - SERVER_PROTOCOL
    - REQUEST_METHOD
    - QUERY_STRING
    - REMOTE_ADDR
    - HTTP_USER_AGENT
  - type: body
    words:
    - PATH=
    - '/bin:'
    - '/usr/bin:'
    - LD_LIBRARY_PATH
    - MYSQL_HOME
    - OPENSSL_CONF
    - DOCUMENT_ROOT
    - SCRIPT_FILENAME
  condition: and
- method: GET
  path: /cgi-bin/info.cgi
  matchers: *id001
  condition: and
- method: GET
  path: /cgi-sys/info.cgi
  matchers: *id001
  condition: and
- method: GET
  path: /scripts/info.cgi
  matchers: *id001
  condition: and
- method: GET
  path: /lite-scripts/info.cgi
  matchers: *id001
  condition: and
