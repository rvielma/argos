id: mysql-history
name: Mysql History - File Disclosure
severity: low
confidence: confirmed
description: The mysql_history file is a history file used by the MySQL command-line client (mysql) to store a record of the
  SQL commands and statements entered by a user during their interactive MySQL sessions. It serves as a command history for
  the MySQL client, allowing users to recall and reuse previously executed SQL commands.
reference: http://doc.docs.sk/mysql-refman-5.5/mysql-history-file.html
tags:
- misconfig
- disclosure
- config
- vuln
requests:
- method: GET
  path: /.mysql_history
  matchers:
  - type: body
    words:
    - _HiStOrY_V2_
    - show databases;
  - type: header
    words:
    - application/octet-stream
    - text/plain
    - filename=".mysql_
  - type: body
    words:
    - <?xml
    - <env
    - application/javascript
    - application/json
    - application/xml
    - html>
    - text/html
    - image/
  - type: status
    status:
    - 200
  condition: and
