id: aem-login-status
name: AEM Login Status
severity: info
confidence: tentative
description: LoginStatusServlet is exposed, it allows to bruteforce credentials.
reference: https://www.slideshare.net/0ang3el/hunting-for-security-bugs-in-aem-webapps-129262212
tags:
- aem
- adobe
- misconfig
- vuln
requests:
- method: GET
  path: /system/sling/loginstatus
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - CREDENTIAL_CHALLENGE
  condition: and
- method: GET
  path: /system/sling/loginstatus.css
  matchers: *id001
  condition: and
- method: GET
  path: /system///sling///loginstatus
  matchers: *id001
  condition: and
