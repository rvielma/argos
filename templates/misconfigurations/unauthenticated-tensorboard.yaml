id: unauthenticated-tensorboard
name: Tensorflow Tensorboard - Unauthenticated Access
severity: high
confidence: tentative
description: Tensorflow Tensorboard was able to be accessed with no authentication requirements in place.
tags:
- tensorflow
- tensorboard
- unauth
- misconfig
- vuln
requests:
- method: GET
  path: /data/plugins_listing
  matchers:
  - type: body
    words:
    - scalars
    - loading_mechanism
    - custom_scalars
  - type: status
    status:
    - 200
  condition: and
