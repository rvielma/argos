id: tomcat-snoop-servlet-exposed
name: Apache Tomcat - Snoop Servlet Information Disclosure
severity: info
confidence: confirmed
description: The Snoop servlet is exposed in the Apache Tomcat examples directory.
reference: https://vulners.com/nessus/TOMCAT_SNOOP.NASL
tags:
- apache
- jakarta
- tomcat
- exposure
- info-leak
- vuln
requests:
- method: GET
  path: /examples/jsp/snp/snoop.jsp
  matchers:
  - type: body
    words:
    - Request Information
    - Path info
    - Server name
    - Remote address
  - type: status
    status:
    - 200
  condition: and
