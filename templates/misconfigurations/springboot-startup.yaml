id: springboot-startup
name: Springboot Actuator startup
severity: low
confidence: confirmed
description: The startup endpoint provides information about the application’s startup sequence.
reference: https://docs.spring.io/spring-boot/docs/current/actuator-api/htmlsingle/
tags:
- misconfig
- springboot
- exposure
- vuln
requests:
- method: GET
  path: /startup
  matchers: &id001
  - type: body
    words:
    - springBootVersion
    - startTime
  - type: header
    words:
    - application/json
    - application/vnd.spring-boot.actuator
    - application/vnd.spring-boot.actuator.v1+json
    - application/vnd.spring-boot.actuator.v2+json
    - application/vnd.spring-boot.actuator.v3+json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /actuator/startup
  matchers: *id001
  condition: and
