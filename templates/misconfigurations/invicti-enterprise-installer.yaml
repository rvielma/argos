id: invicti-enterprise-installer
name: Invicti Enterprise Installation Page - Exposure
severity: high
confidence: confirmed
description: Detects exposed Invicti Enterprise Installation page.
reference: https://www.invicti.com/
tags:
- misconfig
- install
- exposure
- invicti
- vuln
requests:
- method: GET
  path: /wizard/database/
  matchers:
  - type: body
    words:
    - Invicti Enterprise - Installation Wizard
  - type: status
    status:
    - 200
  condition: and
