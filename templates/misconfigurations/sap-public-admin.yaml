id: sap-public-admin
name: SAP ICM Admin Web Interface
severity: low
confidence: confirmed
description: The SAP ICM (Internet Communication Manager) admin monitor interface is often set to public and can be accessed
  without authentication. The interface discloses version information about the underlying operating system, a brief SAP patch
  level overview, running services including their corresponding ports and more.
reference: https://www.saptechnicalguru.com/information-disclosure-sap-web-administration-interface/
tags:
- sap
- misconfig
- admin
- dashboard
- vuln
requests:
- method: GET
  path: /sap/admin/public/index.html
  matchers:
  - type: body
    words:
    - <title>Administration</title>
    - sap.ui
  - type: status
    status:
    - 200
  condition: and
