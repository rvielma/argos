id: unauth-ckfinder
name: CKFinder - Unauthenticated Exposure
severity: high
confidence: confirmed
description: The CKFinder file manager was found to be exposed without authentication, allowing unauthenticated users to directly
  access its web interface. Due to this misconfiguration, attackers were able to browse server directories, upload arbitrary
  files, and manage existing files.
reference: https://cksource.com/ckfinder
tags:
- ckfinder
- misconfig
- unauth
- vuln
requests:
- method: GET
  path: /ckfinder/ckfinder.html
  matchers:
  - type: body
    words:
    - <title>CKFinder</title>
    - CKFinderFrameWindow
    - var ckfinder = new CKFinder
    - CKFinder.start()
  - type: status
    status:
    - 200
  condition: and
