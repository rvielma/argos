id: wp-maintenance-mode-fpd
name: WordPress WP Maintenance Mode - Full Path Disclosure
severity: low
confidence: confirmed
description: WordPress WP Maintenance Mode plugin is vulnerable to full path disclosure via direct access to plugin files.
reference: https://wordpress.org/plugins/wp-maintenance-mode/
tags:
- wp
- wordpress
- wp-plugin
- fpd
- maintenance-mode
- exposure
requests:
- method: GET
  path: /wp-content/plugins/wp-maintenance-mode/includes/classes/class-wp-maintenance-mode.php
  matchers: &id001
  - type: body
    words:
    - Fatal error
    - wp-maintenance-mode
    - 'Uncaught Error:'
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /wp-content/plugins/wp-maintenance-mode/includes/classes/class-wp-maintenance-mode-admin.php
  matchers: *id001
  condition: and
- method: GET
  path: /wp-content/plugins/wp-maintenance-mode/views/maintenance.php
  matchers: *id001
  condition: and
