id: gerrit-account-enum
name: Gerrit Code Review - Account Enumeration
severity: medium
confidence: confirmed
description: Gerrit Code Review exposes the /accounts/ REST API endpoint which can be used to enumerate user accounts.The
  endpoint allows querying for accounts by username, email, or name, potentially revealing sensitive user information including
  account IDs, names, emails, and usernames without authentication.
reference: https://gerrit-review.googlesource.com/Documentation/rest-api-accounts.html
tags:
- gerrit
- enum
- exposure
- misconfig
requests:
- method: GET
  path: /accounts/?q=a&n=10
  matchers: &id001
  - type: body
    words:
    - _account_id
    - username
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /accounts/?suggest&q=a&n=10
  matchers: *id001
  condition: and
