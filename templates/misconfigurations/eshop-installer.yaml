id: eshop-installer
name: EShop Installer Exposure
severity: high
confidence: confirmed
description: EShop is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- eshop
- install
- exposure
- vuln
requests:
- method: GET
  path: /install/
  matchers:
  - type: body
    words:
    - eShop Installer
    - Welcome to Installer
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
