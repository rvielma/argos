id: dokploy-installer
name: Dokploy Installer Exposure
severity: high
confidence: confirmed
description: Dokploy is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- dokploy
- install
- exposure
- vuln
requests:
- method: GET
  path: /register
  matchers:
  - type: body
    words:
    - Setup the server
    - Dokploy
  - type: status
    status:
    - 200
  condition: and
