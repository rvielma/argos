id: springboot-caches
name: Springboot Actuator Caches
severity: low
confidence: confirmed
description: The caches endpoint provides access to the application's caches.
reference: https://docs.spring.io/spring-boot/docs/current/actuator-api/htmlsingle/#caches
tags:
- misconfig
- springboot
- exposure
- vuln
requests:
- method: GET
  path: /caches
  matchers: &id001
  - type: body
    words:
    - cacheManagers
  - type: header
    words:
    - application/json
    - application/vnd.spring-boot.actuator
    - application/vnd.spring-boot.actuator.v1+json
    - application/vnd.spring-boot.actuator.v2+json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /actuator/caches
  matchers: *id001
  condition: and
