id: joomla-fpd
name: Joomla! - Full Path Disclosure
severity: low
confidence: confirmed
description: Detects full path disclosure in Joomla! sending requests to specific paths and identifying fatal error stack
  traces that leaked absolute filesystem paths.
reference: https://developer.joomla.org/security-centre/884-20220801-core-multiple-full-path-disclosures-because-of-missing-jexec-or-die-check.html
tags:
- joomla
- misconfiguration
- fpd
- disclosure
requests:
- method: GET
  path: /administrator/manifests/files/joomla.xml
  matchers: &id001
  - type: body
    words:
    - <version>
    - <creationDate>
    - </metafile>
  - type: regex
    regex:
    - (?:<div[^>]+id="wrapper_r"|<(?:link|script)[^>]+(?:feed|components)/com_|<table[^>]+class="pill)
    - (?i)<meta\s+name=["']generator["']\s+content=["']\s*joomla[^"']*
    - (?i)Joomla_([\d.|\d]+)_version_history
    - FILES_JOOMLA_XML_DESCRIPTION
  condition: or
- method: GET
  path: /language/en-GB/en-GB.xml
  matchers: *id001
  condition: or
- method: GET
  path: /README.txt
  matchers: *id001
  condition: or
- method: GET
  path: /modules/custom.xml
  matchers: *id001
  condition: or
- method: GET
  path: /
  matchers: *id001
  condition: or
- method: GET
  path: /libraries/phputf8/utils/bad.php
  matchers: &id002
  - type: regex
    regex:
    - (?i)in\s+/.*\.php\s+on\s+line\s+\d+
    - (?i)fatal\s+error
    - (?i)warning
    - (?i)notice
  - type: status
    status:
    - 200
  - type: regex
    regex:
    - (/[^\s:]+/joomla[^\s:]*)
    - (/[^\s:]+/libraries[^\s:]*)
  condition: and
- method: GET
  path: /libraries/php-inputfilter/inputfilter.php
  matchers: *id002
  condition: and
- method: GET
  path: /libraries/php-fileupload/fileupload.php
  matchers: *id002
  condition: and
- method: GET
  path: /libraries/joomla/filesystem/archive/archive.php
  matchers: *id002
  condition: and
- method: GET
  path: /libraries/joomla/filesystem/archive/tar.php
  matchers: *id002
  condition: and
- method: GET
  path: /libraries/joomla/filesystem/archive/zip.php
  matchers: *id002
  condition: and
- method: GET
  path: /libraries/phpmailer/phpmailer.php
  matchers: *id002
  condition: and
- method: GET
  path: /libraries/phputf8/utils/unicode.php
  matchers: *id002
  condition: and
