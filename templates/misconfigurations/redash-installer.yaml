id: redash-installer
name: Redash Installer Exposure
severity: high
confidence: confirmed
description: Redash is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- redash
- install
- vuln
requests:
- method: GET
  path: /setup
  matchers:
  - type: body
    words:
    - Redash Initial Setup
    - Admin User
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
