id: x-backend-server-header-detect
name: X-Backend-Server Header - Exposure
severity: low
confidence: confirmed
description: Detected that the website returned the X-Backend-Server header, which included potentially internal or hidden
  IP addresses or hostnames. By exposing these values, attackers might have attempted to circumvent security proxies and access
  these hosts directly.
reference: https://docs.gitlab.com/user/application_security/dast/browser/checks/16.4/
tags:
- headers
- misconfig
- exposure
requests:
- method: GET
  path: /en
  matchers:
  - type: header
    words:
    - X-Backend-Server
  condition: or
