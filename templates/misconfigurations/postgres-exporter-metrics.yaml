id: postgres-exporter-metrics
name: Postgres Exporter Metrics
severity: low
confidence: confirmed
description: Postgres Exporter Metrics is exposed.
tags:
- postgres
- exposure
- debug
- misconfig
- vuln
requests:
- method: GET
  path: /metrics
  matchers:
