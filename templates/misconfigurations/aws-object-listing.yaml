id: aws-object-listing
name: AWS bucket with Object listing
severity: low
confidence: tentative
description: Object listing is enabled in AWS bucket.
reference: https://mikey96.medium.com/cloud-based-storage-misconfigurations-critical-bounties-361647f78a29
tags:
- aws
- misconfig
- bucket
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <ListBucketResult xmlns=
  - type: header
    words:
    - application/xml
  - type: header
    words:
    - x-goog-metageneration
    - x-goog-generation
  condition: and
