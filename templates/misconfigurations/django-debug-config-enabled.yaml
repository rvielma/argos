id: django-debug-config-enabled
name: Django Debug Configuration Enabled
severity: medium
confidence: tentative
description: Django debug configuration is enabled, which allows an attacker to obtain system configuration information such
  as paths or settings.
tags:
- django
- debug
- misconfig
- vuln
requests:
- method: GET
  path: /NON_EXISTING_PATH/
  matchers:
  - type: body
    words:
    - URLconf defined
    - Page not found
    - Django tried these URL patterns, in this order
  - type: status
    status:
    - 404
  condition: and
