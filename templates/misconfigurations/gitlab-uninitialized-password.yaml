id: gitlab-uninitialized-password
name: Uninitialized GitLab instances
severity: high
confidence: tentative
description: 'Prior to version 14, GitLab installations required a root password to be

  set via the web UI. If the administrator skipped this step, any visitor

  could set a password and control the instance.'
reference: https://gitlab.com/gitlab-org/gitlab/-/issues/211328
tags:
- gitlab
- misconfig
- unauth
- vuln
requests:
- method: GET
  path: /users/sign_in
  matchers:
  - type: body
    words:
    - Change your password
    - New password
    - Confirm new password
  - type: header
    words:
    - gitlab_session
  - type: status
    status:
    - 200
  condition: and
