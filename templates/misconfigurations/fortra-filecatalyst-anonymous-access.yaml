id: fortra-filecatalyst-anonymous-access
name: Fortra FileCatalyst - Anonymous Access
severity: low
confidence: confirmed
description: Detects Fortra FileCatalyst web interfaces that allow anonymous or guest access. FileCatalyst is a managed file
  transfer solution, and anonymous access to its portal can expose sensitive files and configuration if not properly secured.
  This template checks for publicly accessible instances with guest or unauthenticated user functionality.
reference: https://www.fortra.com/products/filecatalyst
tags:
- filecatalyst
- fortra
- anonymous
- exposure
- misconfig
requests:
- method: GET
  path: /workflow/jsp/downloadFiles.jsp
  matchers:
  - type: body
    words:
    - </i>Guest
    - Logout</a>
    - FileCatalyst
  - type: status
    status:
    - 200
  condition: and
