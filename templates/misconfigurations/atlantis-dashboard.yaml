id: atlantis-dashboard
name: Atlantis Dashboard - Exposure
severity: medium
confidence: confirmed
description: Atlantis Dashboard was discovered.
tags:
- misconfig
- atlantis
- runatlantis
- exposure
- discovery
requests:
- method: GET
  path: /
  matchers:
