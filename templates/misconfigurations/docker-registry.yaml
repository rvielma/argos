id: docker-registry
name: Docker Registry Listing
severity: medium
confidence: tentative
description: Docker Registry Listing enabled.
reference: https://notsosecure.com/anatomy-of-a-hack-docker-registry
tags:
- misconfig
- docker
- devops
- vuln
requests:
- method: GET
  path: /v2/_catalog
  matchers:
  - type: body
    words:
    - '"repositories":'
  - type: header
    words:
    - application/json
  condition: and
