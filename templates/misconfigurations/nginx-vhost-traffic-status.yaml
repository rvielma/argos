id: nginx-vhost-traffic-status
name: Nginx Vhost Traffic Status
severity: low
confidence: tentative
description: Nginx Vhost Traffic status is exposed.
reference: https://github.com/vozlt/nginx-module-vts
tags:
- status
- nginx
- misconfig
- vuln
requests:
- method: GET
  path: /status
  matchers:
  - type: body
    words:
    - Nginx Vhost Traffic Status
    - Host
    - Zone
  - type: status
    status:
    - 200
  condition: and
