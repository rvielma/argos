id: webalizer-statistics
name: Webalizer Statistics Information Disclosure
severity: low
confidence: confirmed
description: The remote host is running the Webalizer Report generator. Webalizer parses web logs and gives a potential attacker
  information regarding hosts that have accessed the server, resources accessed, total statistics for the Web server, version
  of Web server, and more.
reference: https://www.rapid7.com/db/vulnerabilities/spider-webalizer-stats-disclosure
tags:
- webalizer
- logs
- statistics
- tenable
- misconfig
- vuln
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Generated by The Webalizer
    - Usage Statistics
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /stats/index.html
  matchers: *id001
  condition: and
