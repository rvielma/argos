id: dlink-config-dump
name: D-Link DAP-1325 - Information Disclosure
severity: critical
confidence: tentative
description: Security vulnerability known as Unauthenticated access to settings or Unauthenticated configuration download.
  This vulnerability occurs when a device, such as a repeater, allows the download of user settings without requiring proper
  authentication.
reference: https://www.exploit-db.com/exploits/51556
tags:
- misconfig
- config
- dump
- dlink
- auth-bypass
- disclosure
- vuln
requests:
- method: GET
  path: /cgi-bin/ExportSettings.sh
  matchers:
  - type: body
    words:
    - Password
  - type: regex
    regex:
    - filename="(.*)_Settings.dat
    - application/octet-stream
  - type: status
    status:
    - 200
  condition: and
