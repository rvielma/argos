id: kodbox-installer
name: Kodbox Installation Page - Exposure
severity: high
confidence: confirmed
description: Kodbox is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- exposure
- install
- kodbox
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Kodbox-Installation
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
