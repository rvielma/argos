id: smf-installer
name: SMF Installer
severity: high
confidence: confirmed
description: SMF is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- smf
- install
- exposure
- vuln
requests:
- method: GET
  path: /install.php
  matchers:
  - type: body
    words:
    - SMF Installer
    - Progress
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
