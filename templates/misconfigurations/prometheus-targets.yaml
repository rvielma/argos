id: prometheus-targets
name: Prometheus targets API endpoint
severity: info
confidence: tentative
description: The targets endpoint exposes services belonging to the infrastructure, including their roles and labels. In addition
  to showing the target machine addresses, the endpoint also exposes metadata labels that are added by the target provider.
  These labels are intended to contain non-sensitive values, like the name of the server or its description, but various cloud
  platforms may automatically expose sensitive data in these labels, oftentimes without the developer's knowledge.
reference: https://jfrog.com/blog/dont-let-prometheus-steal-your-fire/
tags:
- prometheus
- misconfig
- vuln
requests:
- method: GET
  path: /api/v1/targets
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - '"status": "success"'
    - '"data":'
    - '"labels":'
  - type: header
    words:
    - application/json
  condition: and
