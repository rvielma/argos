id: weaviate-exposure
name: Weaviate - Exposure
severity: low
confidence: confirmed
description: Detected an exposed Weaviate instance by accessing its API endpoints. Verified exposure by identifying meta information,
  schema details, and specific endpoint references in the response, confirming that the instance was publicly accessible.
tags:
- weaviate
- exposure
- api
- vuln
requests:
- method: GET
  path: /v1/
  matchers:
  - type: body
    words:
    - Meta information about this instance/cluster
    - view complete schema
  - type: regex
    regex:
    - '"href":"/v1/schema"'
  - type: status
    status:
    - 200
  condition: and
