id: aem-groovyconsole
name: AEM Groovy Console Discovery
severity: critical
confidence: tentative
description: An Adobe Experience Manager Groovy console was discovered. This can possibly lead to remote code execution.
reference: https://hackerone.com/reports/672243
tags:
- aem
- adobe
- hackerone
- misconfig
- vuln
requests:
- method: GET
  path: /groovyconsole
  matchers: &id001
  - type: body
    words:
    - <title>Groovy Console</title>
    - Run Script
    - Groovy Web Console
  - type: status
    status:
    - 200
  condition: and
  headers:
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
    Accept-Language: en-US,en;q=0.9,hi;q=0.8
- method: GET
  path: /etc/groovyconsole.html
  matchers: *id001
  condition: and
  headers:
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
    Accept-Language: en-US,en;q=0.9,hi;q=0.8
