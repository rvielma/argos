id: sound4-directory-listing
name: SOUND4 Impact/Pulse/First/Eco <=2.x - Information Disclosure
severity: medium
confidence: confirmed
description: The application is vulnerable to sensitive directory indexing / information disclosure vulnerability. An unauthenticated
  attacker can visit the log directory and disclose the server's log files containing sensitive and system information.
reference: https://packetstormsecurity.com/files/170259/SOUND4-IMPACT-FIRST-PULSE-Eco-2.x-Information-Disclosure.html
tags:
- misconfig
- listing
- sound4
- disclosure
- packetstorm
- vuln
requests:
- method: GET
  path: /log/
  matchers:
  - type: body
    words:
    - <title>Index of /log</title>
    - Parent Directory
  - type: status
    status:
    - 200
  condition: and
