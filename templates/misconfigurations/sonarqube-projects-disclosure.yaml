id: sonarqube-projects-disclosure
name: SonarQube - Information Disclosure
severity: medium
confidence: confirmed
description: Information leakage vulnerability in an interface of SonarQube, you can download the source code through the
  tool.
reference: https://github.com/PeiQi0/PeiQi-WIKI-Book/blob/main/docs/wiki/webapp/SonarQube/SonarQube%20search_projects%20%E9%A1%B9%E7%9B%AE%E4%BF%A1%E6%81%AF%E6%B3%84%E9%9C%B2%E6%BC%8F%E6%B4%9E.md
tags:
- sonarqube
- exposure
- misconfig
- vuln
requests:
- method: GET
  path: /api/components/search_projects
  matchers:
  - type: body
    words:
    - '"visibility":"public"'
    - '{"organization'
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
