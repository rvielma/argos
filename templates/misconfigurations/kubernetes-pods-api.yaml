id: kubernetes-pods-api
name: Kubernetes Pods - API Discovery & Remote Code Execution
severity: critical
confidence: tentative
description: A Kubernetes Pods API was discovered. When the service port is available, unauthenticated users can execute commands
  inside the container.
reference: https://github.com/officialhocc/Kubernetes-Kubelet-RCE
tags:
- k8
- unauth
- kubernetes
- devops
- misconfig
- vuln
requests:
- method: GET
  path: /pods
  matchers: &id001
  - type: body
    words:
    - apiVersion
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /api/v1/pods
  matchers: *id001
  condition: and
