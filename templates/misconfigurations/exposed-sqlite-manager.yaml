id: exposed-sqlite-manager
name: SQLiteManager - Text Display
severity: medium
confidence: tentative
description: SQLiteManager panel contains inconsistent text display in title and text.
reference: https://www.exploit-db.com/ghdb/5003
tags:
- misconfig
- sqlite
- edb
- sqli
- vuln
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - <title>SQLiteManager</title>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /sqlite/
  matchers: *id001
  condition: and
- method: GET
  path: /sqlitemanager/
  matchers: *id001
  condition: and
