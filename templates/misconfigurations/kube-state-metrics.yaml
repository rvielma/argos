id: kube-state-metrics
name: Kube State Metrics Exposure
severity: low
confidence: confirmed
description: An attacker can detect the public instance of a Kube-State-Metrics metrics. The Kubernetes API server exposes
  data about the count, health, and availability of pods, nodes, and other Kubernetes objects.
tags:
- misconfig
- exposure
- kube-state-metrics
- k8s
- kubernetes
- vuln
requests:
- method: GET
  path: /metrics
  matchers:
  - type: body
    words:
    - kube-state-metrics
    - go_goroutines
  - type: status
    status:
    - 200
  condition: and
