id: smarterstats-setup
name: SmarterStats Setup Exposure
severity: high
confidence: confirmed
description: SmarterStats Setup is exposed.
tags:
- misconfig
- smarterstats
- exposure
- vuln
requests:
- method: GET
  path: /Admin/frmWelcome.aspx
  matchers:
