id: ictbroadcast-installer
name: ICTBroadcast Installation Wizard
severity: high
confidence: confirmed
description: ICTBroadcast is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- exposure
- install
- ictbroadcast
- vuln
requests:
- method: GET
  path: /install.php
  matchers:
  - type: body
    words:
    - 'ICTBroadcast[ICTBroadcast :: Installation]'
  - type: body
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
