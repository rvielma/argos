id: dont-panic-traceback
name: DON'T PANIC Traceback
severity: low
confidence: confirmed
description: DON'T PANIC Traceback was detected.
tags:
- traceback
- dont-panic
- misconfig
- vuln
requests:
- method: GET
  path: /
  matchers:
