id: selenium-exposure
name: Selenium - Node Exposure
severity: high
confidence: confirmed
description: Selenium was shown to have an exposed node. If a Selenium node is exposed without any form of authentication,
  remote command execution could be possible if chromium is configured. By default the port is 4444, still, most of the internet
  facing are done through reverse proxies.
reference: https://nutcrackerssecurity.github.io/selenium.html
tags:
- misconfig
- selenium
- misconfiguration
- rce
- chromium
- vuln
requests:
- method: GET
  path: /wd/hub
  matchers:
  - type: body
    words:
    - WebDriverRequest
    - <title>WebDriver Hub</title>
  - type: status
    status:
    - 200
  condition: and
