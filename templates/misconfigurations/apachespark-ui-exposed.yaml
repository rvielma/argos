id: apachespark-ui-exposed
name: Apache Spark Application UI - Exposed
severity: medium
confidence: confirmed
description: Detects exposed PySparkShell Application UI by Apache Spark on port 4040. The UI should not be exposed to the
  internet as it may leak sensitive job and cluster information.
reference: https://spark.apache.org/docs/latest/web-ui.html
tags:
- spark
- pyspark
- ui
- exposed
- panel
- apache
- vuln
requests:
- method: GET
  path: /jobs/
  matchers: &id001
  - type: body
    words:
    - Spark Jobs
    - application UI
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: :4040/jobs/
  matchers: *id001
  condition: and
