id: aem-sling-userinfo
name: Adobe AEM Sling User Info Servlet Exposure
severity: info
confidence: tentative
description: Adobe AEM Sling User Info Servlet Exposure
reference: https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/aem2.txt
tags:
- misconfig
- aem
- adobe
- exposure
- vuln
requests:
- method: GET
  path: /system/sling/info.sessionInfo.json
  matchers: &id001
  - type: body
    words:
    - 'userID:'
  - type: header
    words:
    - text/plain
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /system/sling/info.sessionInfo.txt
  matchers: *id001
  condition: and
