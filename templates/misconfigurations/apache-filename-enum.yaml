id: apache-filename-enum
name: Apache Filename Enumeration
severity: low
confidence: tentative
description: If the client provides an invalid Accept header, the server will respond with a 406 Not Acceptable error containing
  a pseudo directory listing.
reference: https://hackerone.com/reports/210238
tags:
- apache
- misconfig
- hackerone
- vuln
requests:
- method: GET
  path: /index
  matchers:
  - type: status
    status:
    - 406
  - type: body
    words:
    - Not Acceptable
    - 'Available variants:'
    - <address>Apache Server at
  condition: and
  headers:
    Accept: fake/value
