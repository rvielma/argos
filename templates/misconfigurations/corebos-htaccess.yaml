id: corebos-htaccess
name: CoreBos - .htaccess File Exposure
severity: info
confidence: confirmed
description: CoreBos was discovered to have .htaccess file exposed to public which includes sensitive information.
reference: https://huntr.dev/bounties/5b0fe6e3-4ca1-44ae-8875-d7e6c065432e/
tags:
- exposure
- corebos
- huntr
- misconfig
- vuln
requests:
- method: GET
  path: /htaccess.txt
  matchers:
  - type: body
    words:
    - Options -Indexes
    - <FilesMatch
  - type: status
    status:
    - 200
  condition: and
