id: apache-drill-exposure
name: Apache Drill Exposure
severity: low
confidence: confirmed
description: Apache Drill is exposed.
tags:
- misconfig
- exposure
- apache
- drill
- vuln
requests:
- method: GET
  path: /
  matchers:
