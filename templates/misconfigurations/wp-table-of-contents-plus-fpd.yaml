id: wp-table-of-contents-plus-fpd
name: WordPress Table of Contents Plus - Full Path Disclosure
severity: low
confidence: confirmed
description: WordPress Table of Contents Plus plugin is vulnerable to full path disclosure via direct access to plugin files.
reference: https://wordpress.org/plugins/table-of-contents-plus/
tags:
- wp
- wordpress
- wp-plugin
- fpd
- toc
- exposure
requests:
- method: GET
  path: /wp-content/plugins/table-of-contents-plus/includes/class.toc.php
  matchers: &id001
  - type: body
    words:
    - Fatal error
    - table-of-contents-plus
    - 'Uncaught Error:'
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /wp-content/plugins/table-of-contents-plus/admin/class.admin.php
  matchers: *id001
  condition: and
- method: GET
  path: /wp-content/plugins/table-of-contents-plus/front.php
  matchers: *id001
  condition: and
