id: cube-105-install
name: Cube-105 - Exposed Installation
severity: high
confidence: confirmed
description: Cube-105 is susceptible to the Installation page exposure due to misconfiguration.
tags:
- misconfig
- cube
- cube105
- install
- vuln
requests:
- method: GET
  path: /wizard/wizard.cs
  matchers:
