id: laravel-terminal-exposure
name: Laravel Terminal - Exposed
severity: high
confidence: tentative
description: The web application was built on the Laravel framework, with Laravel Terminal enabled and publicly accessible;
  this was detected in the production environment and led to disclosure of sensitive application information.
reference: https://github.com/recca0120/laravel-terminal
tags:
- laravel
- terminal
- exposure
- misconfig
- rce
requests:
- method: GET
  path: /asf/terminal
  matchers:
  - type: body
    words:
    - Laravel Terminal
    - terminal.endpoint
  - type: status
    status:
    - 200
  condition: and
