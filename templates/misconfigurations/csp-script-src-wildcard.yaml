id: csp-script-src-wildcard
name: Content-Security-Policy "script-src" Wildcard Detected
severity: info
confidence: confirmed
description: Detected a wildcard (*) within the script-src directive of the Content-Security-Policy. This allowed scripts
  to load from any origin, weakening the CSP and increasing XSS risk.
reference: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/script-src
tags:
- csp
- misconfig
- headers
requests:
- method: GET
  path: /
  matchers:
  - type: header
    words:
    - Content-Security-Policy
  - type: regex
    regex:
    - (?i)script-src[^;]*\*[^;]*(?:;|$)
  condition: and
