id: simatic-dashboard-exposed
name: Siemens SIMATIC 300 Dashboard - Exposed
severity: high
confidence: confirmed
description: An unauthenticated exposed web interface for Siemens SIMATIC S7-300 was discovered, potentially allowing access
  without any login credentials.
reference: https://new.siemens.com
tags:
- siemens
- simatic
- plc
- scada
- iot
- misconfig
- unauth
- vuln
requests:
- method: GET
  path: /Portal0000.htm
  matchers:
  - type: regex
    regex:
    - SIMATIC\s*300
  - type: body
    words:
    - alt="Simatic S7 CP"
  - type: status
    status:
    - 200
  condition: and
