id: clickhouse-unauth-api
name: ClickHouse API Database Interface - Improper Authorization
severity: high
confidence: confirmed
description: Clickhouse API Database is exposed.
reference: https://github.com/luck-ying/Library-POC/blob/master/ClickHouse%E6%95%B0%E6%8D%AE%E5%BA%93/ClickHouse%E6%95%B0%E6%8D%AE%E5%BA%93%208123%E7%AB%AF%E5%8F%A3%E7%9A%84%E6%9C%AA%E6%8E%88%E6%9D%83%E8%AE%BF%E9%97%AE.py
tags:
- misconfig
- clickhouse
- unauth
- disclosure
- vuln
requests:
- method: GET
  path: /?query=SHOW%20DATABASES
  matchers:
  - type: body
    words:
    - default
    - system
  - type: header
    words:
    - text/tab-separated-values
  - type: status
    status:
    - 200
  condition: and
