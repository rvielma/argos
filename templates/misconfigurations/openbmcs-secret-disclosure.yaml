id: openbmcs-secret-disclosure
name: OpenBMCS 2.4 - Information Disclosure
severity: high
confidence: tentative
description: OpenBMCS 2.4 contains an information disclosure vulnerability. The application allows directory listing and exposure
  of some sensitive files, which can allow an attacker to leverage the disclosed information and gain full access.
reference: CWE-200
tags:
- misconfig
- edb
- openbmcs
- vuln
requests:
- method: GET
  path: /debug/
  matchers:
  - type: body
    words:
    - change_password_sqls
    - Index of /debug
  - type: status
    status:
    - 200
  condition: and
