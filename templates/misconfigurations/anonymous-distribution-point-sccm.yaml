id: anonymous-distribution-point-sccm
name: Microsoft SCCM - Anonymous Distribution Point Access
severity: medium
confidence: tentative
description: Microsoft System Center Configuration Manager (SCCM) can be configured to allow anonymous access to its distribution
  points.This can lead to sensitive data exposure and information gathering by unauthorized users.This misconfiguration is
  exploitable only via HTTP.
reference: https://www.synacktiv.com/en/publications/sccmsecretspy-exploiting-sccm-policies-distribution-for-credentials-harvesting-initial
tags:
- misconfig
- microsoft
- sccm
- anonymous
- distribution-point
- vuln
requests:
- method: GET
  path: /SMS_DP_SMSPKG$/Datalib
  matchers: &id001
  - type: regex
    regex:
    - /SMS_DP_SMSPKG\$\/Datalib/([0-9a-z-]+)\.INI
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: :80/SMS_DP_SMSPKG$/Datalib
  matchers: *id001
  condition: and
