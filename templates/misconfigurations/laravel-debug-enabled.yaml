id: laravel-debug-enabled
name: Laravel Debug Enabled
severity: medium
confidence: tentative
description: Laravel with APP_DEBUG set to true is prone to show verbose errors.
tags:
- debug
- laravel
- misconfig
- vuln
requests:
- method: GET
  path: /_ignition/health-check
  matchers:
  - type: body
    words:
    - can_execute_commands
  - type: status
    status:
    - 200
  condition: and
