id: emcecom-default-login
name: Dell EMC ECOM - Default Login
severity: high
confidence: tentative
description: Dell EMC ECOM default login information "(admin:#1Password)" was discovered.
reference: CWE-798
tags:
- dell
- emc
- ecom
- default-login
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: header
    words:
    - 'Set-Cookie: ECOMSecurity'
  - type: body
    words:
    - Welcome to ECOM
  - type: status
    status:
    - 200
  condition: and
