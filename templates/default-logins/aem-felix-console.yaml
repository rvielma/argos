id: aem-felix-console
name: Adobe Experience Manager Felix Console - Default Login
severity: high
confidence: tentative
description: Adobe Experience Manager Felix Console contains a default admin login vulnerability. An attacker can obtain access
  to user accounts and access sensitive information, modify data, and/or execute unauthorized operations. Remote code execution
  may also be possible via installation of OSGI bundle.
reference: CWE-522
tags:
- default-login
- misconfig
- aem
- adobe
- vuln
requests:
- method: GET
  path: /system/console/bundles
  matchers: &id001
  - type: body
    words:
    - <title>Adobe Experience Manager Web Console - Bundles</title>
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /system///console///bundles
  matchers: *id001
  condition: and
