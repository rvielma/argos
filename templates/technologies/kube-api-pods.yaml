id: kube-api-pods
name: Kube API Pods
severity: info
confidence: tentative
description: Scans for kube pods
tags:
- tech
- k8s
- kubernetes
- devops
- kube
- discovery
requests:
- method: GET
  path: /api/v1/namespaces/default/pods
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - '"PodList":'
    - '"items":'
  condition: and
