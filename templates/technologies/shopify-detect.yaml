id: shopify-detect
name: Shopify Detection
severity: info
confidence: tentative
description: An instance running Shopify is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- shopify
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - X-Shopify-Stage
    - Powered by Shopify
    - cdn.shopify.com
    - Shopify Store
    - Shopify Liquid
  - type: status
    status:
    - 200
    - 403
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /admin
  matchers: *id001
  condition: and
- method: GET
  path: /shopify_app
  matchers: *id001
  condition: and
- method: GET
  path: /shopify_api
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
