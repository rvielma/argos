id: jboss-detect
name: JBoss detected
severity: info
confidence: tentative
description: JBoss detected
tags:
- tech
- jboss
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - JBoss EAP 7
  - type: regex
    regex:
    - <title>Welcome to JBoss(.*)</title>
  condition: or
