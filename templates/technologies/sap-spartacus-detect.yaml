id: sap-spartacus-detect
name: SAP Spartacus detect
severity: info
confidence: confirmed
description: Spartacus is a lean, Angular-based JavaScript storefront for SAP Commerce Cloud that communicates exclusively
  through the Commerce REST API.
reference: https://github.com/SAP/spartacus
tags:
- tech
- sap
- hybris
- angular
- spartacus
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <cx-storefront
  condition: or
