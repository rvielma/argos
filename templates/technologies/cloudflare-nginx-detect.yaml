id: cloudflare-nginx-detect
name: Cloudflare Nginx Detect
severity: info
confidence: confirmed
description: Cloudflare Nginx Detect
reference: https://blog.cloudflare.com/end-of-the-road-for-cloudflare-nginx/
tags:
- cloudflare
- nginx
- tech
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: header
    words:
    - 'Server: cloudflare-nginx'
  - type: status
    status:
    - 200
  condition: and
