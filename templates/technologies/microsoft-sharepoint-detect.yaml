id: microsoft-sharepoint-detect
name: Microsoft SharePoint Detect
severity: info
confidence: tentative
description: Check for SharePoint, using HTTP header MicrosoftSharePointTeamServices
tags:
- sharepoint
- iis
- microsoft
- tech
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - (?i)(Microsoftsharepointteamservices:)
  condition: or
