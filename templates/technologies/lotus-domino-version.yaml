id: lotus-domino-version
name: Lotus Domino Version Extractor
severity: info
confidence: tentative
description: Lotus Domino Version Extractor
tags:
- tech
- lotus
- discovery
requests:
- method: GET
  path: /homepage.nsf
  matchers: &id001
  - type: status
    status:
    - 200
  - type: regex
    regex:
    - ((Domino\s[A-Za-z]+\s[0-9\.]{1,3})|(Forms[0-9\.]{1,3}\.nsf\?OpenDatabase))
  condition: and
- method: GET
  path: /iNotes/Forms5.nsf
  matchers: *id001
  condition: and
- method: GET
  path: /iNotes/Forms6.nsf
  matchers: *id001
  condition: and
- method: GET
  path: /iNotes/Forms7.nsf
  matchers: *id001
  condition: and
- method: GET
  path: /iNotes/Forms8.nsf
  matchers: *id001
  condition: and
- method: GET
  path: /iNotes/Forms85.nsf
  matchers: *id001
  condition: and
- method: GET
  path: /iNotes/Forms9.nsf
  matchers: *id001
  condition: and
