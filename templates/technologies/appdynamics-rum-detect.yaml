id: appdynamics-rum-detect
name: AppDynamics (Cisco) RUM - Detect
severity: info
confidence: confirmed
description: Detects AppDynamics (Cisco) End User Monitoring (EUM) artifacts.
reference: https://docs.appdynamics.com/appd/24.x/latest/en/end-user-monitoring/browser-monitoring/browser-real-user-monitoring
tags:
- tech
- discovery
- rum
- appdynamics
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - adrum-config
    - adrum-start-time
    - adrumExtUrlHttp
    - adrumExtUrlHttps
  - type: status
    status:
    - 200
  condition: and
