id: dwr-index-detect
name: DWR detect test page detection
severity: low
confidence: tentative
description: The index contains the list of exposed Java classes. From here one can navigate to the test page of each class
  where every callable method is described and can be easily tested. This is a great way to find out what methods are exposed
  and learn how they function.
reference: http://aetherlab.net/2012/09/experiences-in-pentesting-dwr/
tags:
- tech
- misconfig
- dwr
- discovery
requests:
- method: GET
  path: /dwr/index.html
  matchers:
  - type: body
    words:
    - <title>DWR Test Index</title>
  - type: status
    status:
    - 200
  condition: and
