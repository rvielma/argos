id: harbor-detect
name: Harbor Detect
severity: info
confidence: confirmed
description: Harbor is an open source trusted cloud native registry project that stores, signs, and scans content.
reference: https://github.com/goharbor/harbor
tags:
- tech
- harbor
- discovery
requests:
- method: GET
  path: /api/v2.0/systeminfo
  matchers:
  - type: body
    words:
    - '"auth_mode"'
    - '"harbor_version"'
  - type: status
    status:
    - 200
  condition: and
