id: oscommerce-detect
name: osCommerce Detection
severity: info
confidence: tentative
description: An instance running osCommerce is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- oscommerce
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by osCommerce
    - oscommerce.com
    - X-Powered-By-osCommerce
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /admin
  matchers: *id001
  condition: and
- method: GET
  path: /includes/modules/
  matchers: *id001
  condition: and
- method: GET
  path: /catalog/includes/javascript/oscommerce.js
  matchers: *id001
  condition: and
- method: GET
  path: /checkout_payment.php
  matchers: *id001
  condition: and
