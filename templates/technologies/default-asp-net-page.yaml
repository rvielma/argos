id: default-asp-net-page
name: ASP.Net Default Page
severity: info
confidence: tentative
description: Detected default ASP.NET application pages including both traditional and modern versions.
tags:
- tech
- asp
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Home Page - My ASP.NET Application
    - ASP.NET is a free web framework for building great Web sites and Web applications
    - My ASP.NET Application
  condition: or
