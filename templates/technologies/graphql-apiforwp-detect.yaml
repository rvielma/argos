id: graphql-apiforwp-detect
name: Graphql apiforwp Detect
severity: info
confidence: tentative
description: Graphql apiforwp Detect
reference: https://github.com/dolevf/graphw00f/blob/main/graphw00f/lib.py
tags:
- tech
- graphql
- wordpress
requests:
- method: POST
  path: /graphql
  matchers: &id001
  - type: status
    status:
    - 200
    - 400
  - type: body
    words:
    - Unexpected token "END"
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query aa#aa { __typename }"}'
- method: POST
  path: /api/graphql
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query aa#aa { __typename }"}'
- method: POST
  path: /query
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query aa#aa { __typename }"}'
- method: POST
  path: /
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query aa#aa { __typename }"}'
