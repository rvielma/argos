id: squarespace-detect
name: Squarespace Detection
severity: info
confidence: tentative
description: An instance running Squarespace is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- squarespace
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by Squarespace
    - X-Squarespace-Request-Id
    - Squarespace Template
  - type: status
    status:
    - 200
    - 403
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /_static/
  matchers: *id001
  condition: and
- method: GET
  path: /squarespace.js
  matchers: *id001
  condition: and
- method: GET
  path: /config.json
  matchers: *id001
  condition: and
- method: GET
  path: /media-cache
  matchers: *id001
  condition: and
