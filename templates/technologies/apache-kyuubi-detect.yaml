id: apache-kyuubi-detect
name: Apache Kyuubi - Detect
severity: info
confidence: tentative
description: Detects a Apache Kyuubi server, a distributed and multi-tenant gateway to provide serverless SQL on data warehouses
  and lakehouses.
reference: https://github.com/apache/kyuubi/
tags:
- tech
- kyuubi
- apache
- detect
- discovery
requests:
- method: GET
  path: /ui/
  matchers:
  - type: body
    words:
    - <title>Apache Kyuubi Dashboard
  - type: status
    status:
    - 200
  condition: and
