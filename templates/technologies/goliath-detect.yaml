id: goliath-detect
name: Goliath Detection
severity: info
confidence: confirmed
description: Goliath is a non-blocking Ruby web server framework
reference: https://github.com/postrank-labs/goliath
tags:
- tech
- goliath
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - Goliath+
  condition: and
