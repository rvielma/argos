id: blogger-detect
name: Blogger Detection
severity: info
confidence: confirmed
description: An instance running Blogger is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- blogger
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by Blogger
    - blogspot.com
    - X-Powered-By-Blogger
    - blogger.com
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /blogger.js
  matchers: *id001
  condition: and
- method: GET
  path: /feeds/posts/default
  matchers: *id001
  condition: and
- method: GET
  path: /search
  matchers: *id001
  condition: and
