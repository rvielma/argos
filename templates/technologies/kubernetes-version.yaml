id: kubernetes-version
name: Kubernetes Version Exposure
severity: info
confidence: tentative
description: Searches for exposed Kubernetes API servers which return version information unauthenticated. For Google Kubernetes
  Engine (GKE) and Amazon Elastic Kubernetes Service (EKS) this template will extract default patch version for you.
reference: https://cloud.google.com/kubernetes-engine/docs/release-notes
tags:
- tech
- k8s
- kubernetes
- devops
- discovery
requests:
- method: GET
  path: /version
  matchers:
  - type: body
    words:
    - gitVersion
    - goVersion
    - platform
  condition: or
