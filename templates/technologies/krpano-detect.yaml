id: krpano-detect
name: Krpano Panorama Viewer - Detection
severity: info
confidence: tentative
description: Detected Krpano Panorama Viewer by identifying known Krpano-specific resources and response patterns.
reference: https://krpano.com/
tags:
- tech
- krpano
- viewer
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - embedpano({
    - passQueryParameters:true
    - swf
  condition: or
- method: GET
  path: /krpano.html
  matchers: *id001
  condition: or
