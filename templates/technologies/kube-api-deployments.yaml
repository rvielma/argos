id: kube-api-deployments
name: Kube API Deployments
severity: info
confidence: tentative
description: Scans for kube deployments
tags:
- tech
- k8s
- kubernetes
- devops
- kube
- discovery
requests:
- method: GET
  path: /apis/apps/v1/namespaces/default/deployments
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - '"DeploymentList":'
    - '"items":'
  condition: and
