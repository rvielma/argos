id: centos-eol
name: CentOS EOL - Detect
severity: info
confidence: tentative
description: Detected CentOS systems that had reached End-of-Life (EOL) status by identifying outdated version information
  in HTTP response.
reference: https://endoflife.date/centos
tags:
- centos
- eol
- tech
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - Apache/(\d+\.\d+\.\d+) \((centos|CentOS)\)
  condition: or
