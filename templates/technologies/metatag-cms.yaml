id: metatag-cms
name: Metatag CMS Detection
severity: info
confidence: tentative
description: Generic CMS Detection using html meta generator tag
reference: https://www.w3schools.com/tags/att_meta_name.asp
tags:
- tech
- cms
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: header
    words:
    - text/html
  - type: regex
    regex:
    - (?i)<meta\s+?name="?generator"?\s+?content="[^"]+?"
  condition: and
