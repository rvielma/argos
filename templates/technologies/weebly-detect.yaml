id: weebly-detect
name: Weebly Detection
severity: info
confidence: tentative
description: An instance running Weebly is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- weebly
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by Weebly
    - weebly.com
    - X-Powered-By-Weebly
  - type: status
    status:
    - 200
    - 403
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /index.php
  matchers: *id001
  condition: and
- method: GET
  path: /weebly/
  matchers: *id001
  condition: and
- method: GET
  path: /site/
  matchers: *id001
  condition: and
