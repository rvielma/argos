id: graphql-gqlgen-detect
name: Graphql Gqlgen Detect
severity: info
confidence: tentative
description: Graphql Gqlgen Detect
reference: https://github.com/dolevf/graphw00f/blob/main/graphw00f/lib.py
tags:
- tech
- graphql
- gqlgen
requests:
- method: POST
  path: /graphql
  matchers: &id001
  - type: status
    status:
    - 200
    - 400
  - type: body
    words:
    - expected at least one definition
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { __typename { }"}'
- method: POST
  path: /api/graphql
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { __typename { }"}'
- method: POST
  path: /query
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { __typename { }"}'
- method: POST
  path: /
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { __typename { }"}'
