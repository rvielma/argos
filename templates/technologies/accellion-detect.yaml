id: accellion-detect
name: Accellion - Detect
severity: info
confidence: confirmed
description: Dectection of Accellion File Transfer Appliance.
tags:
- accellion
- tech
- detect
- discovery
requests:
- method: GET
  path: /cfadmin/
  matchers:
