id: dell-idrac9-detect
name: Detect Dell iDRAC9
severity: info
confidence: tentative
description: The Integrated Dell Remote Access Controller (iDRAC) is designed for secure local and remote server management
  and helps IT administrators deploy, update and monitor Dell EMC PowerEdge servers.
tags:
- tech
- dell
- discovery
requests:
- method: GET
  path: /sysmgmt/2015/bmc/info
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - BuildVersion
    - SystemModelName
  condition: and
