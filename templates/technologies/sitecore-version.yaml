id: sitecore-version
name: Sitecore version detection
severity: info
confidence: tentative
description: Sitecore version detection
reference: https://www.cvedetails.com/vulnerability-list/vendor_id-9609/Sitecore.html
tags:
- sitecore
- tech
- discovery
requests:
- method: GET
  path: /sitecore/shell/sitecore.version.xml
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - Sitecore Corporation
  condition: and
