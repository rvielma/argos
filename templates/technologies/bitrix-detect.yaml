id: bitrix-detect
name: Bitrix Detection
severity: info
confidence: confirmed
description: An instance running Bitrix is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- bitrix
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by Bitrix
    - bitrix.com
    - bitrixjs
    - X-Powered-By-Bitrix
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /bitrix/js/main/core/core_min.js
  matchers: *id001
  condition: and
- method: GET
  path: /bitrix/admin/
  matchers: *id001
  condition: and
- method: GET
  path: /bitrix/templates/
  matchers: *id001
  condition: and
- method: GET
  path: /bitrix/panel/
  matchers: *id001
  condition: and
