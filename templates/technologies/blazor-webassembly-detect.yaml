id: blazor-webassembly-detect
name: Blazor WebAssembly - Detect
severity: info
confidence: confirmed
description: Blazor WebAssembly application was detected.
reference: https://dotnet.microsoft.com/en-us/apps/aspnet/web-apps/blazor
tags:
- blazor
- webassembly
- detect
- discovery
requests:
- method: GET
  path: /_framework/blazor.boot.json
  matchers:
  - type: body
    words:
    - dotnet.wasm
    - '"entryAssembly"'
    - '"Microsoft.JSInterop.WebAssembly.dll"'
  - type: status
    status:
    - 200
  condition: and
