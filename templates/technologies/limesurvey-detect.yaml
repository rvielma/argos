id: limesurvey-detect
name: LimeSurvey Survey Software - Detect
severity: info
confidence: confirmed
description: Limesurvey is the number one open-source survey software. Advanced features like branching and multiple question
  types make it a valuable partner for survey-creation.
reference: https://github.com/LimeSurvey/LimeSurvey
tags:
- tech
- limesurvey
- discovery
requests:
- method: GET
  path: /
  matchers:
