id: cvsweb-detect
name: CVSweb - Detect
severity: info
confidence: confirmed
description: CVSweb is a WWW interface for CVS repositories with which you can browse a file hierarchy on your browser to
  view each file's revision history in a very handy manner.
reference: https://cvsweb.openbsd.org/
tags:
- tech
- cvsweb
- detect
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - content=".*CVSweb.*"
  - type: status
    status:
    - 200
  condition: and
