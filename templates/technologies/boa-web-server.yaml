id: boa-web-server
name: Boa Web Server - Detect
severity: info
confidence: confirmed
description: Boa is a single-tasking HTTP server. That means that unlike traditional web servers, it does not fork for each
  incoming connection, nor does it fork many copies of itself to handle multiple connections.
reference: CWE-200
tags:
- boa
- tech
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - 'Server: Boa/'
  condition: and
