id: nacos-version
name: Nacos - Detect
severity: info
confidence: confirmed
description: Nacos was detected.
reference: CWE-200
tags:
- tech
- detect
- nacos
- discovery
requests:
- method: GET
  path: /v1/console/server/state?accessToken=&username=
  matchers: &id001
  - type: regex
    regex:
    - '"version":"(\d+\.\d+\.\d+)"'
  - type: regex
    regex:
    - application/json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /nacos/v1/console/server/state?accessToken=&username=
  matchers: *id001
  condition: and
