id: flask-detect
name: Flask Detection
severity: info
confidence: tentative
description: An instance running Flask is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- flask
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by Flask
    - flask.palletsprojects.com
    - X-Powered-By-Flask
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /index.php
  matchers: *id001
  condition: and
- method: GET
  path: /static/
  matchers: *id001
  condition: and
- method: GET
  path: /flask/
  matchers: *id001
  condition: and
- method: GET
  path: /health/
  matchers: *id001
  condition: and
