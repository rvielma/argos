id: yourls-detect
name: YOURLS - Detection
severity: info
confidence: confirmed
description: Detects if the target is running a YOURLS (Your Own URL Shortener) server
reference: https://github.com/YOURLS/YOURLS
tags:
- tech
- yourls
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <title>YOURLS
    - content="YOURLS
    - alt="YOURLS
    - /yourls-logo
  - type: status
    status:
    - 200
  condition: and
