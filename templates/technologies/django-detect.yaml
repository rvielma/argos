id: django-detect
name: Django Detection
severity: info
confidence: confirmed
description: An instance running Django is detected by looking for specific HTTP headers, HTML tags, and known endpoints.
tags:
- django
- detect
- tech
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered by Django
    - django-project
    - Django Software Foundation
  - type: status
    status:
    - 200
    - 403
    - 404
  condition: and
- method: GET
  path: /robots.txt
  matchers: *id001
  condition: and
- method: GET
  path: /sitemap.xml
  matchers: *id001
  condition: and
- method: GET
  path: /favicon.ico
  matchers: *id001
  condition: and
- method: GET
  path: /admin/
  matchers: *id001
  condition: and
- method: GET
  path: /static/
  matchers: *id001
  condition: and
- method: GET
  path: /media/
  matchers: *id001
  condition: and
- method: GET
  path: /index.php
  matchers: *id001
  condition: and
- method: GET
  path: /django-admin/
  matchers: *id001
  condition: and
