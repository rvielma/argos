id: zk-framework-detect
name: ZK Framework - Detect
severity: info
confidence: confirmed
description: Detects the presence of ZK JavaFramework and attempts to extract its version.
reference: https://www.zkoss.org/
tags:
- zk
- zkoss
- framework
- detect
- tech
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - ZK Framework
    - zk.wpd
    - zkau/web
    - zkau/zkau
    - zkau/web/js/zk/zk.wpd
    - '<!-- ZK '
  - type: regex
    regex:
    - ZK Framework v?([0-9.]+)
    - <!-- ZK v?([0-9.]+) [\d\s\w]+ -->
    - zkau/web/js/zk/zk\.wpd\?v=([0-9.]+)
    - zkau/web/js/zk/zk\.js\?v=([0-9.]+)
  condition: or
