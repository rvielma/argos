id: apollo-server-detect
name: Apollo Server GraphQL Introspection - Detect
severity: info
confidence: tentative
description: Apollo Server GraphQL introspection was detected.
reference: CWE-200
tags:
- apollo
- detect
- graphql
- tech
- discovery
requests:
- method: POST
  path: /graphql
  matchers:
  - type: header
    words:
    - 'Content-Type: application/json'
  - type: body
    words:
    - GraphQL introspection is not allowed by Apollo Server
  - type: status
    status:
    - 400
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query IntrospectionQuery{__schema{queryType{name}mutationType{name}subscriptionType{name}types{...FullType}directives{name
    description locations args{...InputValue}}}}fragment FullType on __Type{kind name description fields(includeDeprecated:true){name
    description args{...InputValue}type{...TypeRef}isDeprecated deprecationReason}inputFields{...InputValue}interfaces{...TypeRef}enumValues(includeDeprecated:true){name
    description isDeprecated deprecationReason}possibleTypes{...TypeRef}}fragment InputValue on __InputValue{name description
    type{...TypeRef}defaultValue}fragment TypeRef on __Type{kind name ofType{kind name ofType{kind name ofType{kind name ofType{kind
    name ofType{kind name ofType{kind name ofType{kind name}}}}}}}}"}

    '
