id: graphql-wpgraphql-detect
name: Graphql wpgraphql Detect
severity: info
confidence: tentative
description: Graphql wpgraphql Detect
reference: https://github.com/dolevf/graphw00f/blob/main/graphw00f/lib.py
tags:
- tech
- graphql
- wordpress
requests:
- method: POST
  path: /graphql
  matchers: &id001
  - type: status
    status:
    - 200
    - 400
  - type: body
    words:
    - 'Syntax Error: Expected Name, found $'
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { alias1$1:__typename }"}'
- method: POST
  path: /api/graphql
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { alias1$1:__typename }"}'
- method: POST
  path: /query
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { alias1$1:__typename }"}'
- method: POST
  path: /
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query { alias1$1:__typename }"}'
