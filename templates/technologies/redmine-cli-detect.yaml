id: redmine-cli-detect
name: Detect Redmine CLI Configuration File
severity: info
confidence: tentative
description: A small command-line utility to interact with Redmine - https://pypi.org/project/Redmine-CLI/
tags:
- tech
- redmine
- discovery
requests:
- method: GET
  path: /.redmine-cli
  matchers:
  - type: body
    words:
    - default
    - my_id
    - root_url
  - type: status
    status:
    - 200
  condition: and
