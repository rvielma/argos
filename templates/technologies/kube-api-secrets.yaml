id: kube-api-secrets
name: Kube API Secrets
severity: info
confidence: tentative
description: Scans for kube secrets endpoint
tags:
- tech
- k8s
- kubernetes
- devops
- kube
- discovery
requests:
- method: GET
  path: /api/v1/namespaces/default/secrets
  matchers:
  - type: status
    status:
    - 200
  - type: body
    words:
    - '"SecretList":'
    - '"items":'
  condition: and
