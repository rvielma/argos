id: graphql-hasura-detect
name: Graphql Hasura Detect
severity: info
confidence: tentative
description: Graphql Hasura Detect
reference: https://github.com/dolevf/graphw00f/blob/main/graphw00f/lib.py
tags:
- tech
- graphql
- hasura
requests:
- method: POST
  path: /graphql
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - 'field "aa" not found in type: ''query_root'''
  - type: header
    words:
    - 'Content-Type: text/html'
  - type: body
    words:
    - <html
    - <body
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query {aa}"}'
- method: POST
  path: /api/graphql
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query {aa}"}'
- method: POST
  path: /query
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query {aa}"}'
- method: POST
  path: /
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query {aa}"}'
