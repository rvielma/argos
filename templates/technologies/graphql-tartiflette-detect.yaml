id: graphql-tartiflette-detect
name: Graphql Tartiflette Detect
severity: info
confidence: tentative
description: Graphql Tartiflette Detect
reference: https://github.com/dolevf/graphw00f/blob/main/graphw00f/lib.py
tags:
- tech
- graphql
- tartiflette
requests:
- method: POST
  path: /graphql
  matchers: &id001
  - type: status
    status:
    - 200
    - 400
  - type: body
    words:
    - Unknow Directive < @a >.
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query @a { __typename }"}'
- method: POST
  path: /api/graphql
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query @a { __typename }"}'
- method: POST
  path: /query
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query @a { __typename }"}'
- method: POST
  path: /
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"query @a { __typename }"}'
