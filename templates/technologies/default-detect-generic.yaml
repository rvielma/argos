id: default-detect-generic
name: Default Web Application Detection
severity: info
confidence: tentative
description: Catch-all for detecting default installations of web applications using common phrases found in default install
  pages
tags:
- tech
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <title>Default</title>
    - <title>Welcome to</title>
  condition: or
