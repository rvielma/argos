id: graphql-graphene-detect
name: Graphql Graphene Detect
severity: info
confidence: tentative
description: Graphql Graphene Detect
reference: https://github.com/dolevf/graphw00f/blob/main/graphw00f/lib.py
tags:
- tech
- graphql
- graphene
requests:
- method: POST
  path: /graphql
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - Syntax Error GraphQL (1:1)
  - type: header
    words:
    - 'Content-Type: text/html'
  - type: body
    words:
    - <html
    - <body
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"aaa"}'
- method: POST
  path: /api/graphql
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"aaa"}'
- method: POST
  path: /query
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"aaa"}'
- method: POST
  path: /
  matchers: *id001
  condition: and
  headers:
    Content-Type: application/json
  body: '{"query":"aaa"}'
