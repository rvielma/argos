id: mappproxy-detect
name: Mapproxy - Detect
severity: info
confidence: tentative
description: Checks for a running MapProxy instance and obtain version number. Also checks if the demo page is enabled. MapProxy
  is an open source proxy for geospatial data. It caches, accelerates and transforms data from existing map services and serves
  any desktop or web GIS client.
reference: https://github.com/mapproxy/mapproxy
tags:
- tech
- mapproxy
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Welcome to MapProxy
    - MapProxy Demo
  - type: header
    words:
    - text/html
  condition: and
- method: GET
  path: /demo
  matchers: *id001
  condition: and
