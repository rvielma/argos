id: microsoft-iis-version
name: Microsoft IIS version detect
severity: info
confidence: tentative
description: Some Microsoft IIS servers have the version on the response header. Useful when you need to find specific CVEs
  on your targets.
tags:
- tech
- microsoft
- iis
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: header
    words:
    - IIS
  condition: and
