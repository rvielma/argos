id: mysql-config-exposure
name: MySQL Conifg - Exposure
severity: high
confidence: confirmed
description: Detects exposure of MySQL credentials, configuration, and command history via HTTP. Exposure of files such as
  .my.cnf and .mysql_history may lead to leakage of database passwords or SQL history, enabling attackers to compromise databases.
reference: https://dev.mysql.com/doc/refman/8.0/en/option-files.html
tags:
- exposure
- config
- mysql
- database
requests:
- method: GET
  path: /.my.cnf
  matchers:
  - type: regex
    regex:
    - password\s*=\s*["']?[^"'\s]+["']?
  - type: body
    words:
    - '[client]'
  - type: status
    status:
    - 200
  condition: and
