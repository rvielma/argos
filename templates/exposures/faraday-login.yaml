id: faraday-login
name: Faraday Login Panel - Detect
severity: info
confidence: tentative
description: Faraday login panel was detected.
reference: CWE-200
tags:
- panel
- faraday
- discovery
requests:
- method: GET
  path: /#/login
  matchers:
  - type: body
    words:
    - ng-app="faradayApp">
  - type: status
    status:
    - 200
  condition: and
