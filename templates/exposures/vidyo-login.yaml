id: vidyo-login
name: Vidyo Admin Login Panel - Detect
severity: info
confidence: tentative
description: Vidyo admin login panel was detected.
reference: CWE-200
tags:
- panel
- vidyo
- discovery
requests:
- method: GET
  path: /admin/login.html?lang=en
  matchers: &id001
  - type: body
    words:
    - <title>Vidyo Admin</title>
    - <title>VidyoRouter Configuration</title>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /vr2conf/login.html
  matchers: *id001
  condition: and
