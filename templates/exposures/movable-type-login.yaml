id: movable-type-login
name: Movable Type Pro Login Panel - Detect
severity: info
confidence: tentative
description: Movable Type Pro login panel was detected.
reference: CWE-200
tags:
- panel
- movable
- sixapart
- discovery
requests:
- method: GET
  path: /mt/admin
  matchers: &id001
  - type: body
    words:
    - Movable Type Pro
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /mt.cgi
  matchers: *id001
  condition: and
