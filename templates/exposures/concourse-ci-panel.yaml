id: concourse-ci-panel
name: Concourse CI Login Panel - Detect
severity: info
confidence: tentative
description: Concourse CI login panel was detected.
reference: CWE-200
tags:
- panel
- concourse
- oss
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <title>Concourse</title>
    - login to Concourse
  condition: or
