id: backpack-admin-panel
name: Laravel Backpack Admin Login Panel - Detect
severity: info
confidence: confirmed
description: Laravel Backpack admin login panel was detected.
reference: CWE-200
tags:
- panel
- backpack
- admin
- discovery
requests:
- method: GET
  path: /admin/login
  matchers:
  - type: body
    words:
    - Backpack Admin
    - backpack_alerts
  condition: or
