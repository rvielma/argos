id: biotime-panel
name: BioTime Web Login Panel - Detect
severity: info
confidence: confirmed
description: BioTime Web login panel was detected.
reference: CWE-200
tags:
- panel
- biotime
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: regex
    regex:
    - <title>BioTime(.*)</title>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /login/
  matchers: *id001
  condition: and
