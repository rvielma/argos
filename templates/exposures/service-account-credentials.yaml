id: service-account-credentials
name: Service Account Credentials File Disclosure
severity: medium
confidence: confirmed
description: Service Account Credentials internal file is exposed.
reference: https://x.com/KHIZER_JAVED47/status/1864473060109381690
tags:
- privatekey
- exposure
- files
- vuln
requests:
- method: GET
  path: /assets/other/service-account-credentials.json
  matchers: &id001
  - type: body
    words:
    - '"private_key_id":'
    - '"private_key":'
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /service-account-credentials.json
  matchers: *id001
  condition: and
- method: GET
  path: /serviceAccountCredentials.json
  matchers: *id001
  condition: and
