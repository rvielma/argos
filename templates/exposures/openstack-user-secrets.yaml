id: openstack-user-secrets
name: OpenStack User Secrets Exposure
severity: high
confidence: confirmed
description: Internal user_secrets.yml file is exposed in OpenStack.
reference: https://docs.openstack.org/project-deploy-guide/openstack-ansible/stein/configure.html
tags:
- openstack
- config
- exposure
- files
- vuln
requests:
- method: GET
  path: /user_secrets.yml
  matchers: &id001
  - type: body
    words:
    - '_password:'
    - OpenStack environment
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /user_secrets.yml.old
  matchers: *id001
  condition: and
