id: ibm-dcec-panel
name: IBM Decision Center Enterprise Console - Panel Detection
severity: info
confidence: confirmed
description: IBM Decision Center Enterprise Console panel was detected.
reference: https://www.ibm.com/docs/en/odm/8.5.1?topic=console-tutorial-getting-started-decision-center-enterprise
tags:
- panel
- ibm
- login
- detect
- decision-center
- discovery
requests:
- method: GET
  path: /teamserver/faces/login.jsp
  matchers:
  - type: body
    words:
    - <title>Decision Center Enterprise console</title>
    - Sign in to Decision Center
  - type: status
    status:
    - 200
  condition: and
