id: cgit-detect
name: cgit Web Interface - Detection
severity: info
confidence: confirmed
description: Detects cgit web interface for Git repositories. cgit is a hyperfast web frontend for Git repositories written
  in C. It provides a web-based interface to browse Git repositories, view commits, diffs, and files. cgit is designed to
  be publicly accessible for open source projects. However, detecting cgit instances
reference: https://git.zx2c4.com/cgit/about/
tags:
- tech
- cgit
- git
- panel
- detect
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - cgit
    - generated by
  - type: body
    words:
    - repository list
    - class='list nowrap'
    - id='cgit'
    - cgit.css
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /cgit/
  matchers: *id001
  condition: and
