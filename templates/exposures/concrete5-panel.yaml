id: concrete5-panel
name: Concrete5 Login Panel - Detect
severity: info
confidence: tentative
description: Concrete5 login panel was detected.
reference: CWE-200
tags:
- panel
- concrete5
- cms
- discovery
requests:
- method: GET
  path: /index.php/login
  matchers:
  - type: regex
    regex:
    - (?mi)<title>(.*)concrete5(.*)<\/title>
    - (?mi)content="concrete5 - (.*)
  condition: or
