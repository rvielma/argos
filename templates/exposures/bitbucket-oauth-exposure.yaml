id: bitbucket-oauth-exposure
name: Bitbucket OAuth Credentials Exposure
severity: high
confidence: tentative
description: Detects exposed auth.json files containing Bitbucket OAuth credentials
reference: CWE-200
tags:
- exposure
- bitbucket
- oauth
- credentials
- misconfig
- vuln
requests:
- method: GET
  path: /auth.json
  matchers: &id001
  - type: body
    words:
    - bitbucket-oauth
    - bitbucket
  - type: regex
    regex:
    - (?i)consumer[-_]*secret
    - (?i)consumer[-_]*key
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /.auth.json
  matchers: *id001
  condition: and
