id: rg-uac-panel
name: Ruijie RG-UAC Login Panel - Detect
severity: info
confidence: tentative
description: Ruijie RG-UAC login panel was detected.
reference: CWE-200
tags:
- panel
- ruijie
- router
- firewall
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - dkey_check.php
    - get_dkey_passwd
  - type: status
    status:
    - 200
  condition: and
