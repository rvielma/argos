id: calendarix-panel
name: Calendarix Admin Login Panel - Detect
severity: info
confidence: tentative
description: Calendarix admin login panel was detected.
reference: CWE-200
tags:
- panel
- calendarix
- login
- discovery
requests:
- method: GET
  path: /calendarix/admin/cal_login.php
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - Calendarix Admin Login
  condition: and
- method: GET
  path: /calendar/admin/cal_login.php
  matchers: *id001
  condition: and
