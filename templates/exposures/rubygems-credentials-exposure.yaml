id: rubygems-credentials-exposure
name: Ruby Gem::ConfigFile Credential - Exposure
severity: high
confidence: tentative
description: Ruby Gem credentials file is exposed, potentially leaking RubyGems API keys. The ~/.gem/credentials file stores
  authentication tokens for publishing gems to RubyGems.org or private gem servers.
reference: CWE-200
tags:
- exposure
- rubygems
- credentials
- config
- token
requests:
- method: GET
  path: /.gem/credentials
  matchers: &id001
  - type: body
    words:
    - ':rubygems_api_key:'
  - type: body
    words:
    - <html
    - <body
    - <!DOCTYPE
    - <script
    - <?php
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /credentials
  matchers: *id001
  condition: and
- method: GET
  path: /.gem/credentials.yaml
  matchers: *id001
  condition: and
