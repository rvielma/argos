id: dot-credentials-exposure
name: Dot Credentials - Exposure
severity: high
confidence: confirmed
description: Detected the presence of a .credentials file and extracts sensitive authentication tokens, passwords, or API
  keys.
tags:
- exposure
- config
- credentials
- sensitive
- token
requests:
- method: GET
  path: /.credentials
  matchers:
  - type: body
    words:
    - client_id
    - client_secret
    - access_token
    - refresh_token
    - password
    - aws_access_key_id
  - type: body
    words:
    - <html
    - <body
    - <!DOCTYPE
    - <script
    - <?php
  - type: status
    status:
    - 200
  condition: and
