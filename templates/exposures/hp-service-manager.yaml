id: hp-service-manager
name: HP Service Manager Login Panel - Detect
severity: info
confidence: tentative
description: HP Service Manager login panel was detected.
reference: CWE-200
tags:
- panel
- hp
- service
- discovery
requests:
- method: GET
  path: /sm935/index.do
  matchers: &id001
  - type: regex
    regex:
    - (?m)<title>HP Service Manager(.*)<\/title>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /sm/ess.do
  matchers: *id001
  condition: and
