id: kcfinder-exposure
name: KCFinder - Exposure
severity: high
confidence: confirmed
description: Detected publicly accessible KCFinder instances that may have allowed arbitrary file uploads and remote code
  execution (RCE).Exposure of KCFinder could have allowed an attacker to gain unauthorized access to the file manager and
  upload malicious files.
reference: https://github.com/sunhater/kcfinder
tags:
- exposure
- kcfinder
- file-upload
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - '<title>KCFinder:'
    - id="files"
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /kcfinder/browse.php
  matchers: *id001
  condition: and
- method: GET
  path: /assets/kcfinder/browse.php
  matchers: *id001
  condition: and
- method: GET
  path: /lib/kcfinder/browse.php
  matchers: *id001
  condition: and
- method: GET
  path: /admin/kcfinder/browse.php
  matchers: *id001
  condition: and
- method: GET
  path: /includes/kcfinder/browse.php
  matchers: *id001
  condition: and
