id: opensearch-dashboard-panel
name: OpenSearch Dashboard Panel - Detect
severity: info
confidence: confirmed
description: OpenSearch Dashboard is a visualization and management tool for OpenSearch. This template detects the presence
  of the OpenSearch Dashboard login panel, which is the default authentication interface for accessing the dashboard.
reference: https://opensearch.org/docs/latest/dashboards/index/
tags:
- opensearch
- dashboard
- login
- panel
- detect
- discovery
requests:
- method: GET
  path: /app/login?
  matchers:
  - type: body
    words:
    - OpenSearch Dashboard
    - login
  condition: or
