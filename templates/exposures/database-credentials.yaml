id: database-credentials
name: Database Credentials File Exposure
severity: low
confidence: confirmed
description: Internal file exposed containing database credentials.
reference: https://github.com/maurosoria/dirsearch/blob/master/db/dicc.txt
tags:
- exposure
- database
- config
- files
- vuln
requests:
- method: GET
  path: /database_credentials.inc
  matchers:
  - type: body
    words:
    - DATABASE_USER
    - DB_USER
    - USERNAME
    - USER
  - type: body
    words:
    - DATABASE_PASS
    - DB_PASS
    - PASSWORD
    - PASS
  - type: status
    status:
    - 200
    - 401
    - 403
  - type: body
    words:
    - Access denied
    - Unauthorized
  - type: header
    words:
    - 'Content-Type: text/plain'
    - 'Content-Type: application/json'
  condition: and
