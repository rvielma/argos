id: robomongo-credential
name: RoboMongo Credential - Exposure
severity: high
confidence: tentative
description: A MongoDB credentials file used by RoboMongo was detected.
reference: CWE-200
tags:
- mongodb
- robomongo
- disclosure
- config
- exposure
- vuln
requests:
- method: GET
  path: /db/robomongo.json
  matchers: &id001
  - type: body
    words:
    - databaseName
    - userName
    - userPassword
    - serverHost
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /robomongo.json
  matchers: *id001
  condition: and
