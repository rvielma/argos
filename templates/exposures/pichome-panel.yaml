id: pichome-panel
name: Pichome Login Panel - Detect
severity: info
confidence: confirmed
description: Pichome login panel was detected.
reference: CWE-200
tags:
- pichome
- panel
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Powered By oaooa PicHome
    - content="oaooa"
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /user.php?mod=login
  matchers: *id001
  condition: and
