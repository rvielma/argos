id: jfrog-artifactory-build-exposure
name: JFrog Artifactory Build - Exposure
severity: medium
confidence: confirmed
description: Detected exposure of build information in JFrog Artifactory via unauthenticated API endpoints. Access to these
  endpoints may disclose sensitive data such as build names, numbers, CI/CD pipeline details, artifact paths, and internal
  infrastructure information.
reference: https://jfrog.com/help/r/jfrog-rest-apis/builds
tags:
- jfrog
- artifactory
- exposure
- misconfig
- cicd
requests:
- method: GET
  path: /artifactory/api/build
  matchers:
  - type: body
    words:
    - '"builds"'
    - '"uri"'
    - '"lastStarted"'
  - type: body
    words:
    - application/json
    - application/vnd.org.jfrog
  - type: status
    status:
    - 200
  condition: and
