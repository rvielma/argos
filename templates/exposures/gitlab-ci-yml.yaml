id: gitlab-ci-yml
name: GitLab CI YAML - Exposure
severity: medium
confidence: confirmed
description: The gitlab-ci.yml file, used for configuring CI/CD pipelines in GitLab, has been found exposed. This file contains
  crucial details about the build, test, and deployment processes, and may include sensitive information such as API keys,
  tokens, environment variables, and other credentials.
reference: https://x.com/RootMoksha/status/1816571625388818923/photo/1
tags:
- exposure
- config
- cicd
- gitlab
- vuln
requests:
- method: GET
  path: /.gitlab-ci.yml
  matchers: &id001
  - type: body
    words:
    - 'variables:'
    - 'before_script:'
  - type: body
    words:
    - 'stage: build'
    - 'script:'
    - 'image:'
  - type: body
    words:
    - 'variables:'
    - 'releasePath:'
    - 'sshUser:'
  condition: or
- method: GET
  path: /gitlab-ci.yml
  matchers: *id001
  condition: or
- method: GET
  path: /.gitlab-ci/variables.yml
  matchers: *id001
  condition: or
