id: scrutinizer-config
name: Scrutinizer Config - Detect
severity: info
confidence: confirmed
description: Scrutinizer configuration information was detected.
reference: CWE-200
tags:
- exposure
- scrutinizer
- config
- vuln
requests:
- method: GET
  path: /.scrutinizer.yml
  matchers:
