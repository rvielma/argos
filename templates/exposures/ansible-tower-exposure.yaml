id: ansible-tower-exposure
name: Ansible Tower - Detect
severity: info
confidence: tentative
description: Ansible Tower was detected. Ansible Tower is a commercial offering that helps teams manage complex multi-tier
  deployments by adding control, knowledge, and delegation to Ansible-powered environments.
reference: CWE-200
tags:
- panel
- ansible
- redhat
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <title>Ansible Tower</title>
    - ansible-bootstrap
  condition: or
