id: strapi-documentation
name: Strapi CMS Documentation Login Panel - Detect
severity: info
confidence: tentative
description: Strapi CMS Documentation login panel was detected.
reference: CWE-200
tags:
- strapi
- panel
- discovery
requests:
- method: GET
  path: /documentation
  matchers: &id001
  - type: body
    words:
    - x-strapi-config
    - https://strapi.io/documentation/
  - type: body
    words:
    - <title>Swagger UI</title>
    - <title>Login - Documentation</title>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /documentation/login
  matchers: *id001
  condition: and
