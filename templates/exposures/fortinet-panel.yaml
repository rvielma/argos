id: fortinet-panel
name: Fortinet Login Panel - Detect
severity: info
confidence: confirmed
description: Fortinet login panel was detected.
reference: CWE-200
tags:
- panel
- fortinet
- login
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - FORTINET LOGIN</title>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /login
  matchers: *id001
  condition: and
