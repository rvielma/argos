id: fastapi-docs
name: FastAPI Docs Panel - Detect
severity: info
confidence: tentative
description: FastAPI Docs panel was detected.
reference: CWE-200
tags:
- fastapi
- tech
- panel
- discovery
requests:
- method: GET
  path: /docs
  matchers: &id001
  - type: body
    words:
    - <title>FastAPI - Swagger UI</title>
    - <title>FastAPI - ReDoc</title>
    - '{"title":"FastAPI"'
  condition: or
- method: GET
  path: /redoc
  matchers: *id001
  condition: or
- method: GET
  path: /openapi.json
  matchers: *id001
  condition: or
