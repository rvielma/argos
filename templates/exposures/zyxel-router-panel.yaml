id: zyxel-router-panel
name: ZyXel Router Login Panel - Detect
severity: info
confidence: confirmed
description: ZyXel Router login panel was detected.
reference: CWE-200
tags:
- panel
- zyxel
- router
- iot
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - Welcome to the Web-Based Configurator
    - zyxel
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /login
  matchers: *id001
  condition: and
