id: ibm-note-login
name: IBM iNotes Login Panel - Detect
severity: info
confidence: tentative
description: IBM iNotes login panel was detected.
reference: CWE-200
tags:
- ibm
- edb
- panel
- login
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - <title>IBM iNotes Login</title>
    - Lotus iNotes Login Screen
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /names.nsf
  matchers: *id001
  condition: and
- method: GET
  path: /webredir.nsf
  matchers: *id001
  condition: and
