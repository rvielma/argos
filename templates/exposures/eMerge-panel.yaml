id: eMerge-panel
name: Nortek Linear eMerge Panel - Detect
severity: info
confidence: confirmed
description: Nortek Linear eMerge panel was detected.
reference: CWE-200
tags:
- panel
- emerge
- nortek
- nortekcontrol
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - <title>(.*)Linear eMerge(.*)</title>
    - /emerge.ico
  - type: status
    status:
    - 200
  condition: and
