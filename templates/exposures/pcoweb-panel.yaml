id: pcoweb-panel
name: pCOWeb Panel - Detect
severity: info
confidence: confirmed
description: pCOWeb Panel - Detect
reference: https://docs.librenms.org/Support/Device-Notes/Carel-pCOweb-Devices/#:~:text=Accessing%20the%20pCOWeb%20card,-Log%20on%20to&text=The%20default%20username%20and%20password%20is%20admin%2Ffadmin%20.
tags:
- pcoweb
- panel
- login
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: regex
    regex:
    - <title>(.*)pCOWeb(.*)</title>
    - pCOWeb</h2>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /http/index.html
  matchers: *id001
  condition: and
