id: ssh-known-hosts
name: SSH Known Hosts File - Detect
severity: info
confidence: tentative
description: SSH known hosts file was detected.
reference: CWE-200
tags:
- config
- exposure
- ssh
- vuln
requests:
- method: GET
  path: /.ssh/known_hosts
  matchers: &id001
  - type: body
    words:
    - ssh-dss
    - ssh-ed25519
    - ssh-rsa
    - ecdsa-sha2-nistp256
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /.ssh/known_hosts.old
  matchers: *id001
  condition: and
