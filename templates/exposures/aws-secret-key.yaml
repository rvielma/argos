id: aws-secret-key
name: AWS Secret Key
severity: info
confidence: confirmed
description: AWS Secret Key
reference: https://docs.aws.amazon.com/cli/latest/reference/sts/get-access-key-info.html
tags:
- aws
- exposure
- tokens
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - \bAKIA[0-9A-Z]{16}\b
    - \b[A-Za-z0-9/+=]{40}\b
  condition: and
