id: nagios-xi-panel
name: Nagios XI Login Panel - Detect
severity: info
confidence: confirmed
description: Nagios XI login panel was detected.
reference: CWE-200
tags:
- panel
- nagios
- nagios-xi
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
