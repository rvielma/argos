id: exposed-bitkeeper
name: BitKeeper Configuration - Detect
severity: low
confidence: tentative
description: BitKeeper configuration was detected.
reference: https://www.bitkeeper.org/man/config-etc.html
tags:
- config
- exposure
- vuln
requests:
- method: GET
  path: /BitKeeper/etc/config
  matchers:
  - type: body
    words:
    - BitKeeper configuration
    - logging
    - email
    - description
  - type: status
    status:
    - 200
  condition: and
