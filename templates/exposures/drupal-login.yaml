id: drupal-login
name: Drupal Login Panel - Detect
severity: info
confidence: tentative
description: Drupal login panel was detected.
reference: CWE-200
tags:
- panel
- drupal
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: regex
    regex:
    - <(?:link|style)[^>]+"/sites/(?:default|all)/(?:themes|modules)/
    - <[^>]+(?:id="block[_-]commerce[_-]cart[_-]cart|class="commerce[_-]product[_-]field)
  - type: regex
    regex:
    - (?i)x-drupal
    - '(?i)x-generator: drupal'
  condition: or
- method: GET
  path: /user/login
  matchers: *id001
  condition: or
