id: sftp-credentials-exposure
name: SFTP Configuration File - Credentials Exposure
severity: high
confidence: confirmed
description: SFTP configuration file was detected.
reference: CWE-200
tags:
- sftp
- config
- exposure
- vuln
requests:
- method: GET
  path: /sftp-config.json
  matchers: &id001
  - type: body
    words:
    - '"host":'
    - '"user":'
    - '"password":'
    - '"remote_path":'
  - type: body
    words:
    - file_permissions
    - extra_list_connections
  condition: or
- method: GET
  path: /ftpsync.settings
  matchers: *id001
  condition: or
