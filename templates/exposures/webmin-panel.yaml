id: webmin-panel
name: Webmin Admin Login Panel - Detect
severity: info
confidence: tentative
description: Webmin admin login panel was detected.
reference: CWE-200
tags:
- panel
- webmin
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - <title>Login to Webmin</title>
  condition: or
- method: GET
  path: /webmin/
  matchers: *id001
  condition: or
