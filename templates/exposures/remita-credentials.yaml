id: remita-credentials
name: Remita Merchant ID & API Key - Exposure
severity: low
confidence: tentative
description: Detected exposed Remita merchant IDs, API keys, and secret hashes in application source code, configuration files,
  or publicly accessible assets.
reference: https://api.remita.net/
tags:
- exposure
- remita
- fintech
- tinlance
- lloydcoder
- token
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - merchantId["']?\s*[:=]\s*["']?\d{10,}["']?
  - type: body
    words:
    - remita
    - merchantId
    - publicKey
  condition: and
