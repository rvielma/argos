id: vmware-cloud-director
name: VMware Cloud Director Login Panel - Detect
severity: info
confidence: confirmed
description: VMware Cloud Director login panel was detected.
reference: CWE-200
tags:
- panel
- vmware
- discovery
requests:
- method: GET
  path: /login/
  matchers:
  - type: body
    words:
    - <title>Welcome to VMware Cloud Director</title>
  - type: status
    status:
    - 200
  condition: and
