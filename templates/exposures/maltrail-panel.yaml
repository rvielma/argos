id: maltrail-panel
name: Maltrail Panel - Detect
severity: info
confidence: confirmed
description: Maltrail is a malicious traffic detection system, utilizing publicly available (black)lists containing malicious
  and/or generally suspicious trails, along with static trails compiled from various AV reports and custom user defined lists,
  where trail can be anything from domain name, URL (e.g. hXXp://109.162.38.120/harsh02.exe for known malicious executable),
  IP address (e.g. 185.130.5.231 for known attacker) or HTTP User-Agent header value.
tags:
- panel
- maltrail
- detect
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Maltrail</title>
    - /stamparm/maltrail/wiki
    - <b>M</b>altrail
  - type: status
    status:
    - 200
  condition: and
