id: ftp-credentials-exposure
name: FTP Credentials Exposure
severity: high
confidence: confirmed
description: FTP credentials were detected.
reference: CWE-200
tags:
- config
- ftp
- exposure
- vuln
requests:
- method: GET
  path: /ftpsync.settings
  matchers:
  - type: body
    words:
    - FTPSync
    - overwrite_newer_prevention
    - default_folder_permissions
  - type: status
    status:
    - 200
  condition: and
