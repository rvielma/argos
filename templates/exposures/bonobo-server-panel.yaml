id: bonobo-server-panel
name: Bonobo Git Server Login Panel - Detect
severity: info
confidence: confirmed
description: Bonobo Git Server login panel was detected.
tags:
- panel
- bonobo
- git
- login
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - <a href="https://github.com/jakubgarfield/Bonobo-Git-Server">
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /git
  matchers: *id001
  condition: and
