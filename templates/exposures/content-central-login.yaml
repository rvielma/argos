id: content-central-login
name: Content Central Login Panel - Detect
severity: info
confidence: confirmed
description: Content Central login panel was detected.
reference: CWE-200
tags:
- panel
- content-central
- discovery
requests:
- method: GET
  path: /login.aspx
  matchers: &id001
