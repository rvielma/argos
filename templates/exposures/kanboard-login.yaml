id: kanboard-login
name: Kanboard Login Panel - Detect
severity: info
confidence: confirmed
description: Kanboard login panel was detected.
reference: CWE-200
tags:
- panel
- kanboard
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - /?controller=UserAjaxController&amp;action=status
  - type: status
    status:
    - 200
  condition: and
