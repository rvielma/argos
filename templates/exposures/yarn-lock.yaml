id: yarn-lock
name: Yarn Lock File Disclosure
severity: info
confidence: tentative
description: The yarn.lock file stores the versions of each Yarn dependency installed. It's a lock file for package.json.
reference: https://classic.yarnpkg.com/lang/en/docs/yarn-lock/
tags:
- exposure
- files
- yarn
- vuln
requests:
- method: GET
  path: /yarn.lock
  matchers:
  - type: body
    words:
    - '# THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY.'
    - '# yarn lockfile v1'
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
