id: itop-panel
name: Combodo iTop Login Panel - Detect
severity: info
confidence: tentative
description: Combodo iTop login panel was detected.
reference: CWE-200
tags:
- panel
- itop
- combodo
- discovery
requests:
- method: GET
  path: /pages/UI.php
  matchers: &id001
  - type: body
    words:
    - Welcome to iTop
    - iTop login
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /simple/pages/UI.php
  matchers: *id001
  condition: and
