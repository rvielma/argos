id: voipmonitor-panel
name: VoIPmonitor Login Panel - Detect
severity: info
confidence: tentative
description: VoIPmonitor login panel was detected.
reference: CWE-200
tags:
- panel
- voipmonitor
- login
- discovery
requests:
- method: GET
  path: /
  matchers:
