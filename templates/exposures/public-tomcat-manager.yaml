id: public-tomcat-manager
name: Apache Tomcat Manager Login Panel - Detect
severity: info
confidence: tentative
description: Apache Tomcat Manager login panel was detected.
reference: CWE-200
tags:
- panel
- tomcat
- apache
- discovery
requests:
- method: GET
  path: /manager/html
  matchers: &id001
  - type: body
    words:
    - Apache Tomcat
    - Tomcat Manager
  - type: status
    status:
    - 401
    - 200
  condition: and
- method: GET
  path: /host-manager/html
  matchers: *id001
  condition: and
