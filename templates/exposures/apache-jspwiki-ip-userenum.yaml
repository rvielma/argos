id: apache-jspwiki-ip-userenum
name: Apache JSPWiki - User IP Enumeration
severity: low
confidence: confirmed
description: Enumerates the IP Address and users that is currently accessing an Apache JSPWiki web application, leading open
  source WikiWiki engine, feature-rich and built around standard JEE components (Java, servlets, JSP).
tags:
- jspwiki
- apache
- enumeration
- discovery
requests:
- method: GET
  path: /Wiki.jsp?page=SystemInfo
  matchers:
  - type: body
    words:
    - <b>Active Wiki Users</b>
    - Number of active sessions
  - type: status
    status:
    - 200
  condition: and
