id: vmware-horizon-panel
name: VMware Horizon Login Panel - Detect
severity: info
confidence: tentative
description: VMware Horizon login panel was detected.
reference: CWE-200
tags:
- horizon
- vmware
- edb
- panel
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: regex
    regex:
    - (?m)^Missing route token in request$
    - VMware Horizon
  condition: or
- method: GET
  path: /portal/webclient/index.html
  matchers: *id001
  condition: or
