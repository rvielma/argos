id: jenkins-login
name: Jenkins Login Detected
severity: info
confidence: tentative
description: Jenkins is an open source automation server.
reference: CWE-200
tags:
- panel
- jenkins
- discovery
requests:
- method: GET
  path: /login
  matchers:
  - type: body
    words:
    - Sign in [Jenkins]
  - type: status
    status:
    - 200
  condition: and
