id: sap-management-console-panel
name: SAP Management Console - Panel
severity: info
confidence: confirmed
description: Detected the SAP Management Console (SAP MC) web panel by requesting /sapmc/sapmc.html and checking for a gSOAP
  server header the page title.
tags:
- panel
- sap
- sapmc
- ui
- discovery
- login
requests:
- method: GET
  path: /sapmc/sapmc.html
  matchers:
  - type: body
    words:
    - <title>SAP Management Console</title>
  - type: status
    status:
    - 200
  condition: and
