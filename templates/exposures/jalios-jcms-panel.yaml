id: jalios-jcms-panel
name: Jalios JCMS Login Panel - Detect
severity: info
confidence: confirmed
description: Jalios JCMS login panel was detected.
reference: CWE-200
tags:
- panel
- jalios
- jcms
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - content="Jalios JCMS
    - jalios-login
    - JCMS_login
    - /jcms/
  condition: and
- method: GET
  path: /front/privateLogin.jsp
  matchers: *id001
  condition: and
