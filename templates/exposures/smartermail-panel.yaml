id: smartermail-panel
name: SmarterMail Login Panel - Detect
severity: info
confidence: tentative
description: SmarterMail login panel was detected.
reference: CWE-200
tags:
- panel
- smartermail
- login
- detect
- discovery
requests:
- method: GET
  path: /Login.aspx
  matchers:
  - type: body
    words:
    - Login to SmarterMail
    - SmarterTools Inc.
  - type: status
    status:
    - 200
  condition: and
