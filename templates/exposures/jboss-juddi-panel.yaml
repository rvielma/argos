id: jboss-juddi-panel
name: JBoss WS JUDDI Console Panel - Detect
severity: info
confidence: confirmed
description: The jUDDI (Java Universal Description, Discovery and Integration) Registry is a core component of the JBoss Enterprise
  SOA Platform. It is the product's default service registry and comes included as part of the product. In it are stored the
  addresses (end-point references) of all the services connected to the Enterprise Service Bus. It was implemented in JAXR
  and conforms to the UDDI specifications.
reference: CWE-200
tags:
- panel
- jboss
- juddi
- redhat
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - JBoss JUDDI
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /juddi/
  matchers: *id001
  condition: and
