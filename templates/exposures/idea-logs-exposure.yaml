id: idea-logs-exposure
name: Public .idea Folder containing http logs
severity: info
confidence: tentative
description: Searches for .idea Folder for http-requests-log.http and http-client.cookies file
tags:
- phpstorm
- jetbrains
- idea
- exposure
- vuln
requests:
- method: GET
  path: /.idea/httpRequests/http-requests-log.http
  matchers: &id001
  - type: regex
    regex:
    - (?m)^(GET|POST) https?:\/\/
  - type: body
    words:
    - "# domain\tpath\tname\tvalue\tdate"
  condition: or
- method: GET
  path: /.idea/httpRequests/http-client.cookies
  matchers: *id001
  condition: or
