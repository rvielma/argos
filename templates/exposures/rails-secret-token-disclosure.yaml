id: rails-secret-token-disclosure
name: Ruby on Rails Secret Token Disclosure
severity: medium
confidence: tentative
description: Ruby on Rals Secret Token file is exposed.
reference: https://github.com/detectify/ugly-duckling/blob/master/modules/crowdsourced/ruby-on-rails-secret-token-disclosure.json
tags:
- exposure
- files
- rails
- ruby
- token
- vuln
requests:
- method: GET
  path: /config/initializers/secret_token.rb
  matchers:
  - type: body
    words:
    - secret_key_base =
    - config.secret_token =
  - type: status
    status:
    - 200
  condition: and
