id: xxljob-panel
name: XXLJOB Admin Login Panel - Detect
severity: info
confidence: confirmed
description: XXLJOB admin login panel was detected.
reference: CWE-200
tags:
- panel
- xxljob
- login
- xuxueli
- discovery
requests:
- method: GET
  path: /xxl-job-admin/toLogin
  matchers: &id001
  - type: body
    words:
    - <a><b>XXL</b>JOB</a>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /toLogin
  matchers: *id001
  condition: and
