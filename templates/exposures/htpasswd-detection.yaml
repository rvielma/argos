id: htpasswd-detection
name: Apache htpasswd Config - Detect
severity: high
confidence: tentative
description: Apache htpasswd configuration was detected.
reference: CWE-200
tags:
- config
- exposure
- discovery
requests:
- method: GET
  path: /.htpasswd
  matchers:
  - type: body
    words:
    - :{SHA}
    - :$apr1$
    - :$2y$
  - type: status
    status:
    - 200
  condition: and
