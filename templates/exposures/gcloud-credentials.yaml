id: gcloud-credentials
name: Google Cloud Credentials
severity: medium
confidence: confirmed
description: Google Cloud Crdentials file is exposed.
tags:
- google
- cloud
- devops
- exposure
- files
- vuln
requests:
- method: GET
  path: /credentials.db
  matchers: &id001
  - type: body
    words:
    - SQLite
    - client_id
  - type: header
    words:
    - application/octet-stream
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /.config/gcloud/credentials.db
  matchers: *id001
  condition: and
