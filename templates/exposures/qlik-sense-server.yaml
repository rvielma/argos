id: qlik-sense-server
name: Qlik Sense Server Panel - Detect
severity: info
confidence: confirmed
description: Qlik Sense Server panel was detected.
reference: CWE-200
tags:
- panel
- qlik
- discovery
requests:
- method: GET
  path: /hub
  matchers: &id001
  - type: body
    words:
    - alt="Qlik Sense
    - class="qlik-logo"
    - alt="Qlik.Sense"
    - qliksenseserver
  condition: or
- method: GET
  path: /resources/autogenerated/product-info.json
  matchers: *id001
  condition: or
