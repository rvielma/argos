id: oipm-detect
name: One Identity Password Manager Detection
severity: info
confidence: tentative
description: One Identity Password Manager is a secure password manager that gives enterprises control over password management,
  policies, and automated reset functions.
reference: CWE-200
tags:
- panel
- oneidentity
- discovery
requests:
- method: GET
  path: /PMUser/
  matchers:
  - type: body
    words:
    - One Identity Password Manager
  condition: or
