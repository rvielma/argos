id: glpi-status-domain-disclosure
name: GLPI Status Domain Disclosure
severity: info
confidence: tentative
description: GLPI Status Domain Disclosure
tags:
- glpi
- exposure
- status
- files
- vuln
requests:
- method: GET
  path: /status.php
  matchers: &id001
