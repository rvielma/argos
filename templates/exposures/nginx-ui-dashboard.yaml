id: nginx-ui-dashboard
name: Nginx UI Panel - Detect
severity: info
confidence: confirmed
description: Nginx UI panel was detected.
reference: CWE-200
tags:
- panel
- nginx
- exposure
- f5
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Nginx UI
    - Main Config
  - type: status
    status:
    - 200
  condition: and
