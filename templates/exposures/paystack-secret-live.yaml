id: paystack-secret-live
name: Paystack Secret/Live Key - Exposure
severity: info
confidence: tentative
description: Detected exposed Paystack secret keys (test or live) found in application source code, configuration files, or
  client-side assets.
reference: https://support.paystack.com/en/articles/2123458
tags:
- exposure
- token
- paystack
- fintech
- tinlance
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - sk_(live|test)_[0-9a-zA-Z]{50,}
  - type: body
    words:
    - paystack
    - secret_key
    - sk_live
    - sk_test
  condition: and
