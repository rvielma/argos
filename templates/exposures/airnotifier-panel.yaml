id: airnotifier-panel
name: AirNotifier Login Panel - Detect
severity: info
confidence: confirmed
description: AirNotifier login panel was detected.
reference: CWE-200
tags:
- panel
- airnotifier
- discovery
requests:
- method: GET
  path: /auth/login
  matchers:
  - type: body
    words:
    - AirNotifier
    - Stats
    - Server Info
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
