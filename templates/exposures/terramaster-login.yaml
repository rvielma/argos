id: terramaster-login
name: Terramaster Login Panel - Detect
severity: info
confidence: tentative
description: Terramaster login panel was detected.
reference: CWE-200
tags:
- panel
- terramaster
- login
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - <title>TOS Loading</title>
  - type: header
    words:
    - 'Server: TOS'
    - 'X-Powered-By: TerraMaster'
  condition: or
