id: casaos-panel
name: CasaOS Login Panel - Detect
severity: info
confidence: confirmed
description: CasaOS login panel was detected.
reference: CWE-200
tags:
- panel
- casaos
- login
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - /CasaOS-UI/
    - We're sorry but CasaOS
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /#/login
  matchers: *id001
  condition: and
