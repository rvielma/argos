id: redash-panel
name: Redash Login Panel - Detect
severity: info
confidence: tentative
description: Redash login panel was detected.
reference: CWE-200
tags:
- panel
- redash
- discovery
requests:
- method: GET
  path: /login
  matchers:
  - type: body
    words:
    - <title>Login to Redash</title>
    - <title>Login | Redash</title>
  - type: status
    status:
    - 200
  condition: and
