id: gmail-api-client-secrets
name: GMail API - Detect
severity: info
confidence: tentative
description: GMail API was detected.
reference: CWE-200
tags:
- config
- exposure
- vuln
requests:
- method: GET
  path: /client_secrets.json
  matchers:
  - type: body
    words:
    - client_id
    - auth_uri
    - token_uri
  - type: status
    status:
    - 200
  - type: header
    words:
    - application/json
  condition: and
