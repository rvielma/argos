id: wmw-enterprise-panel
name: WMW Enterprise Login Panel - Detect
severity: info
confidence: confirmed
description: WMW Enterprise login panel was detected.
reference: CWE-200
tags:
- panel
- wmw
- detect
- discovery
requests:
- method: GET
  path: /en/login
  matchers:
  - type: body
    words:
    - WMW Enterprise login
    - Welcome to the WMW dashboard
  - type: status
    status:
    - 200
  condition: and
