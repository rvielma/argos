id: ansible-semaphore-panel
name: Ansible Semaphore Panel Detect
severity: info
confidence: tentative
description: An Ansible Semaphore login panel was detected.
reference: CWE-200
tags:
- panel
- ansible
- semaphore
- cicd
- oss
- discovery
requests:
- method: GET
  path: /auth/login
  matchers:
  - type: body
    words:
    - <title>Ansible Semaphore</title>
  - type: regex
    regex:
    - <title(.*)>Semaphore</title>
  condition: or
