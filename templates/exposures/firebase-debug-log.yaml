id: firebase-debug-log
name: Firebase Debug Log File Exposure
severity: low
confidence: confirmed
description: Firebase debug log file was exposed.
reference: https://github.com/maurosoria/dirsearch/blob/master/db/dicc.txt
tags:
- exposure
- firebase
- logs
- debug
- vuln
requests:
- method: GET
  path: /firebase-debug.log
  matchers:
  - type: body
    words:
    - '[debug]'
    - firebase
    - googleapis.com
  - type: status
    status:
    - 200
  condition: and
