id: postgres-credentials-exposure
name: PostgreSQL Credentials - Exposure
severity: high
confidence: tentative
description: Detects the exposure of PostgreSQL credentials and history files (.pgpass) via HTTP. These files may contain
  plaintext database usernames and passwords, and their leakage could allow unauthorized access to sensitive databases or
  internal infrastructure.
reference: https://www.postgresql.org/docs/current/libpq-pgpass.html
tags:
- exposure
- config
- postgres
- database
requests:
- method: GET
  path: /.pgpass
  matchers:
  - type: regex
    regex:
    - ([a-zA-Z0-9.-]+):5432:([a-zA-Z0-9_*-]+):([a-zA-Z0-9_-]+):(.+)
  - type: status
    status:
    - 200
  condition: and
