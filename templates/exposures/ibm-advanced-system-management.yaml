id: ibm-advanced-system-management
name: IBM Advanced System Management Panel - Detect
severity: info
confidence: confirmed
description: IBM Advanced System Management panel was detected.
reference: CWE-200
tags:
- panel
- ibm
- login
- detect
- discovery
requests:
- method: GET
  path: /cgi-bin/cgi?form=1
  matchers: &id001
  - type: body
    words:
    - Advanced System Management
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /cgi-bin/cgi
  matchers: *id001
  condition: and
