id: elmah-log-file
name: ELMAH Exposure
severity: high
confidence: confirmed
description: ELMAH (Error Logging Modules and Handlers) is an application-wide error logging facility that is completely pluggable.
  It can be dynamically added to a running ASP.NET web application, or even all ASP.NET web applications on a machine, without
  any need for re-compilation or re-deployment. In some cases, the logs expose ASPXAUTH cookies allowing to hijack a logged
  in administrator session.
reference: https://code.google.com/archive/p/elmah/
tags:
- logs
- elmah
- exposure
- vuln
requests:
- method: GET
  path: /elmah
  matchers: &id001
  - type: body
    words:
    - Error Log for
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /elmah.axd
  matchers: *id001
  condition: and
