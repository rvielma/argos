id: dwsync-exposure
name: Dreamweaver Dwsync.xml Exposure
severity: info
confidence: tentative
description: The Dreamweaver file dwsync.xml was discovered. The dwsync.xml file is a file generated by Dreamweaver which
  contains information related to what files are in the website directory.
reference: CWE-200
tags:
- dwsync
- exposure
- dreamweaver
- files
- vuln
requests:
- method: GET
  path: /_notes/dwsync.xml
  matchers:
  - type: status
    status:
    - 200
  - type: header
    words:
    - application/xml
  - type: body
    words:
    - <dwsync>
    - </dwsync>
  condition: and
