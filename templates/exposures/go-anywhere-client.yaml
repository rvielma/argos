id: go-anywhere-client
name: GoAnywhere Web Client Login Panel - Detect
severity: info
confidence: tentative
description: GoAnywhere Web Client login panel was detected.
reference: CWE-200
tags:
- panel
- goanywhere
- login
- discovery
requests:
- method: GET
  path: /webclient/Login.xhtml
  matchers:
  - type: body
    words:
    - Powered by GoAnywhere
    - GoAnywhere.com
  condition: or
