id: credentials-json
name: Credentials File Disclosure
severity: medium
confidence: confirmed
description: Internal secret file is exposed.
tags:
- google
- secret
- exposure
- files
- vuln
requests:
- method: GET
  path: /credentials.json
  matchers: &id001
  - type: body
    words:
    - '"client_secret":'
    - '"client_id":'
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /assets/credentials.json
  matchers: *id001
  condition: and
