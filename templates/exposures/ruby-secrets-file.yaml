id: ruby-secrets-file
name: Ruby on Rails secrets.yml File Exposure
severity: high
confidence: confirmed
description: Ruby on Rails internal secret file is exposed.
reference: https://www.exploit-db.com/ghdb/6283
tags:
- cloud
- devops
- files
- exposure
- misconfig
- vuln
requests:
- method: GET
  path: /secrets.yml
  matchers: &id001
  - type: regex
    regex:
    - 'secret_key_base: ([a-z0-9]+)'
  - type: header
    words:
    - application/json
    - text/html
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /config/secrets.yml
  matchers: *id001
  condition: and
- method: GET
  path: /test/config/secrets.yml
  matchers: *id001
  condition: and
- method: GET
  path: /redmine/config/secrets.yml
  matchers: *id001
  condition: and
