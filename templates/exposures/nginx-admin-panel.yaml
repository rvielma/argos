id: nginx-admin-panel
name: Nginx Admin Manager Login Panel - Detect
severity: info
confidence: confirmed
description: Nginx Admin Manager login panel was detected.
reference: CWE-200
tags:
- panel
- nginx
- admin
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: regex
    regex:
    - <title>(.*)Nginx Admin Manager(.*)</title>
  - type: status
    status:
    - 401
    - 200
  condition: and
