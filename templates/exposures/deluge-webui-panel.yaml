id: deluge-webui-panel
name: Deluge WebUI Login Panel - Detect
severity: info
confidence: confirmed
description: Deluge WebUI login panel was detected.
reference: CWE-200
tags:
- panel
- deluge
- deluge-torrent
- discovery
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Deluge WebUI
    - 'author: ''Deluge Team'
  - type: header
    words:
    - text/html
  - type: status
    status:
    - 200
  condition: and
