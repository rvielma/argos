id: cisco-sendgrid
name: Cisco ServiceGrid Login Panel - Detect
severity: info
confidence: tentative
description: Cisco ServiceGrid login panel was detected.
reference: CWE-200
tags:
- panel
- cisco
- discovery
requests:
- method: GET
  path: /pages/sdcall/Login.jsp
  matchers:
  - type: regex
    regex:
    - (?m)^<title>Cisco ServiceGrid (.*)<\/title>$
  - type: status
    status:
    - 200
  condition: and
