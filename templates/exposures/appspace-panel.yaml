id: appspace-panel
name: Appspace Login Panel - Detect
severity: info
confidence: confirmed
description: Appspace is the workplace experience platform for your whole team that lets you manage it all – from employee
  communications to your physical office spaces.
reference: https://www.appspace.com/
tags:
- appspace
- panel
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - .appspace-ui
    - appspace-logo
    - <title>Appspace</title>
    - class="btnSSOAppspace
    - Sign in to Appspace Core
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /app/login.aspx
  matchers: *id001
  condition: and
- method: GET
  path: /signin/#!/login?returnUrl=%2Fapp%2Fdefault.aspx
  matchers: *id001
  condition: and
