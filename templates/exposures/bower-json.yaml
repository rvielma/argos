id: bower-json
name: bower.json File Disclosure
severity: info
confidence: tentative
description: Bower is a package manager which stores package information in the bower.json file
reference: https://github.com/bower/spec/blob/master/json.md
tags:
- exposure
- files
- bower
- vuln
requests:
- method: GET
  path: /bower.json
  matchers:
  - type: body
    words:
    - name
    - description
    - main
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
