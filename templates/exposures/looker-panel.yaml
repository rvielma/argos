id: looker-panel
name: Looker Login Panel - Detect
severity: info
confidence: confirmed
description: Looker login panel was detected.
reference: CWE-200
tags:
- panel
- login
- looker
- discovery
requests:
- method: GET
  path: /login
  matchers:
  - type: body
    words:
    - lookerVersion
    - lookerLocation.title
  - type: status
    status:
    - 200
  condition: and
