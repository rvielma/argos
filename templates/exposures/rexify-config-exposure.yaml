id: rexify-config-exposure
name: Rexify Configuration - Exposure
severity: high
confidence: confirmed
description: Rexfile configuration from the Rex/Rexify automation framework was exposed. These files may contain SSH credentials,
  server hostnames, private key paths, and other sensitive data.
reference: https://www.rexify.org/
tags:
- exposure
- config
- rexify
- rex
- devops
requests:
- method: GET
  path: /Rexfile
  matchers:
  - type: body
    words:
    - use Rex
    - task
    - group
    - user
    - password
    - desc
  - type: status
    status:
    - 200
  condition: and
