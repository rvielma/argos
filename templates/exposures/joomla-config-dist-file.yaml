id: joomla-config-dist-file
name: Joomla! Configuration File - Detect
severity: low
confidence: tentative
description: Joomla! configuration.php-dist file was detected.
tags:
- config
- exposure
- joomla
- vuln
requests:
- method: GET
  path: /configuration.php-dist
  matchers:
  - type: body
    words:
    - Joomla
    - JConfig
    - '@package'
  - type: header
    words:
    - text/plain
  - type: status
    status:
    - 200
  condition: and
