id: commvault-panel
name: Commvault Web Console Panel - Detect
severity: info
confidence: confirmed
description: Commvault web console login panel was detected.
reference: https://www.commvault.com/
tags:
- panel
- commvault
- backup
- login
- detect
- discovery
requests:
- method: GET
  path: /commandcenter/login/preSso.jsp
  matchers:
  - type: body
    words:
    - commandcenter/wcSSO.do
  - type: header
    words:
    - Path=/commandcenter
  - type: status
    status:
    - 200
  condition: and
