- method: GET
  path: /cgi-bin/qmailadmin/qmailadmin
  matchers: *id001
  condition: and
- method: GET
  path: /cgi-bin/qmailadmin
  matchers: *id001
  condition: and
- method: GET
  path: /cgi-ssl/qmailadmin/qmailadmin
  matchers: *id001
  condition: and
