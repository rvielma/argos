id: token-json
name: Token Json File Disclosure
severity: low
confidence: confirmed
description: Internal token.json file is exposed.
tags:
- exposure
- cloud
- google
- devops
- files
- vuln
requests:
- method: GET
  path: /token.json
  matchers: &id001
  - type: body
    words:
    - '"access_token":'
    - '"token_type":'
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /search/token.json
  matchers: *id001
  condition: and
