id: pulse-secure-panel
name: Pulse Secure VPN Login Panel - Detect
severity: info
confidence: tentative
description: Pulse Secure VPN login panel was detected.
reference: CWE-200
tags:
- panel
- pulse
- vpn
- discovery
requests:
- method: GET
  path: /dana-na/auth/url_default/welcome.cgi
  matchers: &id001
  - type: header
    words:
    - /dana-na/auth/welcome.cgi
  - type: regex
    regex:
    - (?i)/dana-na/css/ds(_[a-f0-9]{64})?.css
  condition: or
- method: GET
  path: /dana-na/auth/url_2/welcome.cgi
  matchers: *id001
  condition: or
- method: GET
  path: /dana-na/auth/url_3/welcome.cgi
  matchers: *id001
  condition: or
