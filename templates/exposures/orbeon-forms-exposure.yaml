id: orbeon-forms-exposure
name: Orbeon Forms Exposure
severity: info
confidence: tentative
description: Detects exposed Orbeon Forms interfaces including Form Runner, Form Builder, and Quick Links. Orbeon Forms is
  a web forms solution that may expose sensitive form data and administrative interfaces if not properly secured.
reference: https://doc.orbeon.com/
tags:
- exposure
- orbeon
- forms
- form-runner
requests:
- method: GET
  path: /orbeon/
  matchers: &id001
  - type: body
    words:
    - Orbeon
    - home</a>
    - Quick Links
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /
  matchers: *id001
  condition: and
