id: travis-ci-disclosure
name: Travis CI Disclosure
severity: high
confidence: confirmed
description: Travis CI is a Software as a Service (SaaS) based continuous integration service used to build and test software
  projects. By defining a configuration file named `.travis.yml` in their source code repositories, developers can customize
  their applications build workflows.
reference: https://github.com/maurosoria/dirsearch/blob/master/db/dicc.txt
tags:
- exposure
- file
- config
- tenable
- vuln
requests:
- method: GET
  path: /.travis.yml
  matchers: &id001
  - type: body
    words:
    - 'before_script:'
    - 'jobs:'
    - 'language:'
  - type: header
    words:
    - application/octet-stream
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /matomo/.travis.yml
  matchers: *id001
  condition: and
- method: GET
  path: /ckeditor/.travis.yml
  matchers: *id001
  condition: and
