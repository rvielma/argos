id: salesforce-credentials
name: Salesforce Credentials - Detect
severity: high
confidence: tentative
description: Salesforce credentials information was detected.
reference: CWE-200
tags:
- exposure
- files
- salesforce
- vuln
requests:
- method: GET
  path: /js/salesforce.js
  matchers: &id001
  - type: body
    words:
    - jsforce.Connection
    - conn.login
    - conn.query
  - type: header
    words:
    - text/plain
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /salesforce.js
  matchers: *id001
  condition: and
