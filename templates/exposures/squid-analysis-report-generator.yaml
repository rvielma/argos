id: squid-analysis-report-generator
name: Squid Analysis Report Generator
severity: high
confidence: tentative
description: SARG is an open source tool that allows you to analyse the squid log files and generates beautiful reports in
  HTML format with information about users, IP addresses, top accessed sites, total bandwidth usage, elapsed time, downloads,
  access denied websites, daily reports, weekly reports and monthly reports.
reference: https://sourceforge.net/projects/sarg/
tags:
- sarg
- exposure
- logs
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - Squid User Access Report
    - Squid User's Access Report
  - type: body
    words:
    - <td>Daily reports
    - FILE/PERIOD
  condition: and
