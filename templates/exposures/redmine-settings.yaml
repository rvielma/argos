id: redmine-settings
name: Redmine settings.yml File Disclosure
severity: info
confidence: confirmed
description: Redmine settings.yml File Disclosure
reference: https://www.exploit-db.com/ghdb/5796
tags:
- misconfig
- redmine
- devops
- files
- exposure
- vuln
requests:
- method: GET
  path: /settings.yml
  matchers: &id001
  - type: body
    words:
    - 'format:'
    - 'default:'
    - Redmine
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /config/settings.yml
  matchers: *id001
  condition: and
- method: GET
  path: /redmine/config/settings.yml
  matchers: *id001
  condition: and
