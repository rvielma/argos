id: django-debug-exposure
name: Django Debug Exposure
severity: high
confidence: tentative
description: Django debug mode enabled exposes internal information.
reference: https://twitter.com/Alra3ees/status/1397660633928286208
tags:
- django
- exposure
- vuln
requests:
- method: POST
  path: /admin/login/?next=/admin/
  matchers:
  - type: status
    status:
    - 500
  - type: body
    words:
    - DB_HOST
    - DB_NAME
    - DJANGO
    - ADMIN_PASSWORD
  condition: and
