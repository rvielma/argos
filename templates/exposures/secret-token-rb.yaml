id: secret-token-rb
name: Secret Token Ruby - File Disclosure
severity: medium
confidence: confirmed
description: Ruby Secret token is exposed.
tags:
- redmine
- devops
- exposure
- ruby
- files
- vuln
requests:
- method: GET
  path: /secret_token.rb
  matchers: &id001
  - type: body
    words:
    - ::Application.config.secret
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /config/initializers/secret_token.rb
  matchers: *id001
  condition: and
- method: GET
  path: /redmine/config/initializers/secret_token.rb
  matchers: *id001
  condition: and
