id: threatq-login
name: ThreatQ Login Panel - Detect
severity: info
confidence: tentative
description: ThreatQ login panel was detected.
reference: CWE-200
tags:
- panel
- threatq
- discovery
requests:
- method: GET
  path: /login
  matchers:
  - type: body
    words:
    - <title ng-bind="PageTitle.getTitle()">ThreatQ</title>
    - <script src="/assets/js/threatq.min.js
  - type: status
    status:
    - 200
  condition: and
