id: seeddms-panel
name: SeedDMS Login Panel - Detect
severity: info
confidence: tentative
description: SeedDMS login panel was detected.
reference: CWE-200
tags:
- panel
- seeddms
- login
- discovery
requests:
- method: GET
  path: /out/out.Login.php?referuri=%2Fout%2Fout.ViewFolder.php
  matchers: &id001
  - type: body
    words:
    - href="/out/out.ViewFolder.php">SeedDMS</a>
    - href="../out/out.ViewFolder.php?folderid=1">SeedDMS</a>
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /dms/out/out.Login.php?referuri=%2Fout%2Fout.ViewFolder.php
  matchers: *id001
  condition: and
