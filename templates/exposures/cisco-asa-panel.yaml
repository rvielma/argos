id: cisco-asa-panel
name: Cisco ASA VPN Panel - Detect
severity: info
confidence: tentative
description: Cisco ASA VPN panel was detected.
reference: CWE-200
tags:
- cisco
- panel
- discovery
requests:
- method: GET
  path: /+CSCOE+/logon.html
  matchers:
  - type: body
    words:
    - /+CSCOU+/portal.css
    - SSL VPN Service
  condition: or
