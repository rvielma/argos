id: tikiwiki-cms
name: Tiki Wiki CMS Groupware Login Panel - Detect
severity: info
confidence: tentative
description: Tiki Wiki CMS Groupware login panel was detected.
reference: CWE-200
tags:
- panel
- tikiwiki
- tiki
- discovery
requests:
- method: GET
  path: /tiki-login_scr.php
  matchers: &id001
  - type: status
    status:
    - 200
  - type: body
    words:
    - Tiki Wiki CMS Groupware
  condition: and
- method: GET
  path: /tiki-login.php
  matchers: *id001
  condition: and
