id: laravel-log-file
name: Laravel log file publicly accessible
severity: high
confidence: tentative
description: The log file of this Laravel web app might reveal details on the inner workings of the app, possibly even tokens,
  credentials or personal information.
reference: https://laravel.com/docs/master/logging
tags:
- laravel
- logs
- exposure
- vuln
requests:
- method: GET
  path: /storage/logs/laravel.log
  matchers:
  - type: body
    words:
    - InvalidArgumentException
    - local.ERROR
    - ErrorException
    - syntax error
  - type: header
    words:
    - text/plain
    - text/x-log
  - type: status
    status:
    - 200
  condition: and
