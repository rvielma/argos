id: structurizr-panel
name: Structurizr Panel - Detect
severity: info
confidence: confirmed
description: Structurizr login panel was detected.
reference: CWE-200
tags:
- panel
- structurizr
- detect
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
