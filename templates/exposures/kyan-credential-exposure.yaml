id: kyan-credential-exposure
name: Kyan Credential - Exposure
severity: medium
confidence: tentative
description: Kyan Network login panel was detected. Password and other credential theft is possible via accessing this panel.
reference: CWE-200
tags:
- kyan
- exposure
- config
- vuln
requests:
- method: GET
  path: /hosts
  matchers:
  - type: body
    words:
    - UserName=
    - Password=
  - type: header
    words:
    - text/plain
  - type: status
    status:
    - 200
  condition: and
