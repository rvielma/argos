id: ems-webclient-panel
name: EMS Web Client Login Panel - Detect
severity: info
confidence: tentative
description: EMS Web Client login panel was detected.
reference: CWE-200
tags:
- panel
- ems
- discovery
requests:
- method: GET
  path: /emswebclient/Login.aspx
  matchers: &id001
  - type: body
    words:
    - EMS Web Client - Login
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /Login.aspx
  matchers: *id001
  condition: and
