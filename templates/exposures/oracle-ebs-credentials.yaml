id: oracle-ebs-credentials
name: Oracle E-Business System Credentials Page - Detect
severity: high
confidence: tentative
description: Oracle E-Business System credentials page was detected.
reference: CWE-200
tags:
- config
- exposure
- oracle
- vuln
requests:
- method: GET
  path: /OA_HTML/jtfwrepo.xml
  matchers:
  - type: body
    words:
    - password=
    - <PUSR_LIST>
  - type: header
    words:
    - text/xml
  - type: status
    status:
    - 200
  condition: and
