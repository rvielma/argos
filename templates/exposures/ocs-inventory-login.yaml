id: ocs-inventory-login
name: OCS Inventory Login Panel - Detect
severity: info
confidence: confirmed
description: OCS Inventory login panel was detected.
reference: CWE-200
tags:
- ocs-inventory
- panel
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
