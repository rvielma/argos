id: qualtrics-login
name: Qualtrics Login Panel - Detect
severity: info
confidence: confirmed
description: Qualtrics login panel was detected.
reference: CWE-200
tags:
- panel
- qualtrics
- discovery
requests:
- method: GET
  path: /login
  matchers:
  - type: body
    words:
    - Powered by Qualtrics
    - Welcome to Qualtrics Certification
  - type: status
    status:
    - 200
  condition: and
