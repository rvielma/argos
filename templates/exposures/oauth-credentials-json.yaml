id: oauth-credentials-json
name: Oauth Credentials Json
severity: low
confidence: confirmed
description: Oauth Credentials file is exposed.
tags:
- exposure
- oauth
- files
- vuln
requests:
- method: GET
  path: /oauth-credentials.json
  matchers:
  - type: body
    words:
    - '"client_id":'
    - '"client_secret":'
  - type: status
    status:
    - 200
  condition: and
