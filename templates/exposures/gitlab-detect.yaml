id: gitlab-detect
name: Gitlab Login Panel - Detect
severity: info
confidence: tentative
description: Gitlab login panel was detected.
reference: CWE-200
tags:
- panel
- gitlab
- discovery
requests:
- method: GET
  path: /users/sign_in
  matchers:
  - type: body
    words:
    - GitLab
    - https://about.gitlab.com
  - type: status
    status:
    - 200
  condition: and
