id: dzzoffice-install
name: DzzOffice Installation Panel - Detect
severity: high
confidence: confirmed
description: DzzOffice installation panel was detected.
reference: CWE-200
tags:
- panel
- dzzoffice
- install
- discovery
requests:
- method: GET
  path: /install/index.php
  matchers:
  - type: body
    words:
    - DzzOffice
  - type: body
    words:
    - 简体中文 UTF8 版
    - Simplified Chinese UTF8 version
  - type: status
    status:
    - 200
  condition: and
