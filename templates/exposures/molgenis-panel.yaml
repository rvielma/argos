id: molgenis-panel
name: Molgenis Panel - Exposure
severity: info
confidence: confirmed
description: Molgenis emx2 data platform is a software that provides a web-based interface for managing and analyzing data.
  It might contain sensitive information without authentication.
reference: https://molgenis.org/
tags:
- panel
- molgenis
- login
- emx2
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - molgenis-
    - Welcome to MOLGENIS EMX2 POC
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /api
  matchers: *id001
  condition: and
