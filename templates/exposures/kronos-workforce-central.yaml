id: kronos-workforce-central
name: Kronos Workforce Central Login Panel - Detect
severity: info
confidence: tentative
description: Kronos Workforce Central login panel was detected.
reference: CWE-200
tags:
- panel
- kronos
- discovery
requests:
- method: GET
  path: /wfc/portal
  matchers: &id001
  - type: regex
    regex:
    - Kronos
    - Workforce Central(R)
  condition: or
- method: GET
  path: /wfc/logon
  matchers: *id001
  condition: or
