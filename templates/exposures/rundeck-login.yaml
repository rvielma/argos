id: rundeck-login
name: Rundeck Login Panel - Detect
severity: info
confidence: confirmed
description: Rundeck login panel was detected.
reference: CWE-200
tags:
- panel
- rundeck
- discovery
requests:
- method: GET
  path: /user/login
  matchers:
  - type: body
    words:
    - alt="Rundeck"
    - /assets/rundeck
  - type: status
    status:
    - 200
  condition: and
