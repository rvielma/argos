id: vbulletin-path-disclosure
name: vBulletin - Full Path Disclosure
severity: info
confidence: confirmed
description: vBulletin - Full Path Disclosure
reference: https://github.com/OWASP/vbscan/blob/master/modules/pathdisclure.pl
tags:
- config
- exposure
- fpd
- vbulletin
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - vBulletin
  condition: or
- method: GET
  path: /forumdisplay.php?do[]=[test.dll]
  matchers: &id001
  - type: body
    words:
    - '<strong>Warning</strong>:'
    - Cannot modify header information
    - /strong> on line
    - trim() expects parameter
    - class_core.php
    - header already sent
    - Fatal error
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /calendar.php?do[]=[test.dll]
  matchers: *id001
  condition: and
- method: GET
  path: /search.php?do[]=[test.dll]
  matchers: *id001
  condition: and
- method: GET
  path: /forumrunner/include/album.php
  matchers: *id001
  condition: and
- method: GET
  path: /core/vb5/route/channel.php
  matchers: *id001
  condition: and
- method: GET
  path: /core/vb5/route/conversation.php
  matchers: *id001
  condition: and
- method: GET
  path: /includes/api/interface/noncollapsed.php
  matchers: *id001
  condition: and
- method: GET
  path: /includes/api/interface/collapsed.php
  matchers: *id001
  condition: and
- method: GET
  path: /vbseo_sitemap/addons/vbseo_sm_vba.php
  matchers: *id001
  condition: and
- method: GET
  path: /vbseo_sitemap/addons/vbseo_sm_vba_links.php
  matchers: *id001
  condition: and
