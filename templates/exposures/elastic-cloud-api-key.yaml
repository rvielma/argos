id: elastic-cloud-api-key
name: Elastic Cloud API Key Detection
severity: high
confidence: confirmed
description: Detects Elastic Cloud API keys used for programmatic access to the Elastic Cloud and serverless APIs.
reference: https://www.elastic.co/docs/deploy-manage/api-keys/elastic-cloud-api-keys
tags:
- elastic
- exposure
- tokens
- vuln
requests:
- method: GET
  path: /
  matchers:
  - type: body
    words:
    - essu_
  - type: regex
    regex:
    - essu_[A-Za-z0-9+/]{80}AAAAA[A-Za-z0-9+/=]{7}
  condition: and
