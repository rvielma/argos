id: opencats-panel
name: OpenCATS Login Panel - Detect
severity: info
confidence: confirmed
description: OpenCATS login panel was detected.
reference: CWE-200
tags:
- panel
- opencats
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - <title>opencats - Login</title>
    - <!-- CATS_LOGIN -->
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /opencats/
  matchers: *id001
  condition: and
