id: git-credentials-disclosure
name: Git Credentials - Detect
severity: medium
confidence: tentative
description: Git credentials were detected.
reference: CWE-200
tags:
- exposure
- config
- vuln
requests:
- method: GET
  path: /.git-credentials
  matchers:
  - type: body
    words:
    - https://
    - '@github.com'
  - type: status
    status:
    - 200
  - type: header
    words:
    - text/html
  condition: and
