id: osticket-panel
name: osTicket Login Panel - Detect
severity: info
confidence: confirmed
description: osTicket login panel was detected.
reference: CWE-200
tags:
- panel
- osticket
- discovery
requests:
- method: GET
  path: /
  matchers: &id001
  - type: body
    words:
    - powered by osTicket
    - content="osTicket
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /login.php
  matchers: *id001
  condition: and
