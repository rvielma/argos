id: webshell4-login-panel
name: WebShell4 Login Panel - Detect
severity: info
confidence: confirmed
description: WebShell4 login panel was detected.
reference: CWE-200
tags:
- webshell4
- panel
- discovery
requests:
- method: GET
  path: /webshell4/login.php
  matchers:
  - type: body
    words:
    - /webshell4/index2.php
    - enter login name
  - type: status
    status:
    - 200
  condition: and
