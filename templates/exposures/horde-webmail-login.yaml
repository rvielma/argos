id: horde-webmail-login
name: Horde Webmail Login Panel - Detect
severity: info
confidence: confirmed
description: Horde Webmail login panel was detected.
reference: CWE-200
tags:
- horde
- webmail
- panel
- discovery
requests:
- method: GET
  path: /horde/imp/login.php
  matchers: &id001
  - type: body
    words:
    - Welcome to Horde
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /imp/login.php
  matchers: *id001
  condition: and
