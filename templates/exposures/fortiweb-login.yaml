id: fortiweb-login
name: Fortinet FortiWeb Login Panel - Detect
severity: info
confidence: tentative
description: Fortinet FortiWeb login panel was detected.
reference: CWE-200
tags:
- panel
- fortinet
- fortiweb
- login
- discovery
requests:
- method: GET
  path: /login
  matchers:
  - type: body
    words:
    - Please login
    - ftnt-fortinet-grid
  - type: status
    status:
    - 200
  condition: and
