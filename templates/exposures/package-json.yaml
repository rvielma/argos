id: package-json
name: NPM package.json Disclosure
severity: info
confidence: confirmed
description: All NodeJS packages contain a file, usually in the project root, called package.json - this file holds various
  metadata relevant to the project generated by package managers such as npm, yarn, pnpm.
reference: https://docs.npmjs.com/cli/v9/configuring-npm/package-json
tags:
- config
- exposure
- node
- npm
- vuln
requests:
- method: GET
  path: /package.json
  matchers: &id001
  - type: body
    words:
    - name
    - version
  - type: header
    words:
    - application/json
  - type: status
    status:
    - 200
  condition: and
- method: GET
  path: /package-lock.json
  matchers: *id001
  condition: and
