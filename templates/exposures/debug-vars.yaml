id: debug-vars
name: Golang Expvar - Detect
severity: low
confidence: tentative
description: Golang expvar function exposes multiple public variables via HTTP such as stack trace information and server
  operation counters.
tags:
- go
- debug
- exposure
- vuln
requests:
- method: GET
  path: /debug/vars
  matchers:
  - type: body
    words:
    - '"memstats":'
    - '"cmdline":'
  - type: status
    status:
    - 200
  condition: and
