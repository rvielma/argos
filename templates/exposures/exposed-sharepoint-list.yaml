id: exposed-sharepoint-list
name: Sharepoint List - Detect
severity: medium
confidence: tentative
description: Sharepoint list was detected because of improper configuration. An anonymous user can access SharePoint Web Services.
reference: CWE-200
tags:
- hackerone
- config
- exposure
- sharepoint
- vuln
requests:
- method: GET
  path: /_vti_bin/lists.asmx?WSDL
  matchers:
  - type: body
    words:
    - GetListResponse
    - GetList
  - type: status
    status:
    - 200
  condition: and
