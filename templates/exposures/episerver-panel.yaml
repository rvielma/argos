id: episerver-panel
name: Episerver Login Panel
severity: info
confidence: confirmed
description: Episerver login panel was detected.
reference: CWE-200
tags:
- panel
- optimizely
- episerver
- discovery
requests:
- method: GET
  path: /episerver/cms
  matchers:
  - type: regex
    regex:
    - Util.*%2(f|F)episerver%2(f|F)cms
  - type: status
    status:
    - 302
  condition: and
